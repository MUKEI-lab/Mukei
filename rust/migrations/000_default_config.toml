; Mukei — TRD §12.5 reference default `mukei.toml`.
; The boot path writes this file on first install via
; `mukei_core::config::write_default`. Every field is REQUIRED; the
; validator rejects any missing field, unknown key, or out-of-range
; integer with a typed `MukeiError::ConfigInvalid` whose `field`
; and `reason` strings surface verbatim to the editor's first-run UI.

models_dir        = "/var/mukei/models"
vectors_dir       = "/var/mukei/vectors"
database_path     = "/var/mukei/db/mukei.db"
saf_tokens_db     = "/var/mukei/db/saf_tokens.db"
crashes_dir       = "/var/mukei/crashes"
logs_dir          = "/var/mukei/logs"

gpu_layers        = 32      ; 0 = CPU-only
n_ctx             = 4096    ; [256, 32768]
n_threads         = 4       ; [1, 32]

[max_blocking]
; TRD §2.2 — Android-bounded pool, BUGFIX v0.7.4
max_blocking_threads_android = 6
max_blocking_threads_desktop = 8
tool_slots                   = 2

[watchdog]
max_iterations     = 8       ; REQ-AGT-04
max_token_budget   = 8192
max_wall_seconds   = 600

[storage]
sqlcipher_kdf_iter        = 256000
wal_autocheckpoint_pages  = 1000

[saf]
persist_grants_to_db = true
prompt_on_first_use  = true

[agent]
; Number of consecutive failures on the SAME (tool, fingerprint) pair
; before the abuse blocker fires. Raised from 2 → 5 per the v0.7.5
; audit — the legacy value was too brittle for transient network errors
; on tools like web_search. See `ToolPolicy::DEFAULT_MAX_FAILURES`.
max_failures_per_tool       = 5     ; REQ-AGT-05
recovered_history_window    = 12
; Repeat-output / no-progress detection (TRD §2.5, v0.7.5 audit P7).
repeat_output_window        = 2     ; consecutive identical outputs to trigger backoff
repeat_output_backoff_secs  = 10    ; advisory pause hinted to the LLM

[defaults]
prompt_card_auto_send = false      ; false = fill-only, opt-in (PRD §7.4 + AF §6.6)
thermal_autopause      = true
first_run_completed    = false
