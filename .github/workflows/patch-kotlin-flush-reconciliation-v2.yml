name: patch-kotlin-flush-reconciliation-v2

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/patch-kotlin-flush-reconciliation-v2.yml

permissions:
  contents: write
  statuses: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'patch-kotlin-flush-v2', description: 'Patching await-safe projection flush reconciliation', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Patch selective-port script
        shell: python
        run: |
          from pathlib import Path

          path = Path('scripts/port_kotlin_selected.sh')
          text = path.read_text(encoding='utf-8')
          marker = 'rm -f .github/workflows/kotlin-selective-port-audit.yml'
          patch = """python <<'PY'
          from pathlib import Path

          state_path = Path('rust/crates/mukei-core/src/application_runtime/foundation_state.rs')
          state = state_path.read_text(encoding='utf-8')
          old_command = '''enum PersistenceCommand {
              Save {
                  store: Arc<dyn RuntimeProjectionStore>,
                  key: &'static str,
                  value: Value,
              },
              Barrier(tokio::sync::oneshot::Sender<()>),
          }
          '''
          new_command = '''enum PersistenceCommand {
              Save {
                  store: Arc<dyn RuntimeProjectionStore>,
                  key: &'static str,
                  value: Value,
              },
              Flush {
                  store: Arc<dyn RuntimeProjectionStore>,
                  projections: Vec<(&'static str, Value)>,
                  acknowledgement: tokio::sync::oneshot::Sender<Result<(), MukeiError>>,
              },
              Barrier(tokio::sync::oneshot::Sender<()>),
          }
          '''
          if new_command not in state:
              if old_command not in state:
                  raise SystemExit('missing PersistenceCommand marker')
              state = state.replace(old_command, new_command, 1)

          old_barrier = '''                    PersistenceCommand::Barrier(acknowledgement) => {
                                  let _ = acknowledgement.send(());
                              }
          '''
          new_barrier = '''                    PersistenceCommand::Flush {
                                  store,
                                  projections,
                                  acknowledgement,
                              } => {
                                  let mut result = Ok(());
                                  for (key, value) in projections {
                                      if let Err(error) = store.save(key, value).await {
                                          result = Err(error);
                                          break;
                                      }
                                  }
                                  let _ = acknowledgement.send(result);
                              }
                              PersistenceCommand::Barrier(acknowledgement) => {
                                  let _ = acknowledgement.send(());
                              }
          '''
          if new_barrier not in state:
              if old_barrier not in state:
                  raise SystemExit('missing persistence writer marker')
              state = state.replace(old_barrier, new_barrier, 1)
          state_path.write_text(state, encoding='utf-8')

          flush_path = Path('rust/crates/mukei-core/src/application_runtime/persistence_flush.rs')
          flush_path.write_text('''impl FeatureState {
              async fn flush_projections(&self) -> Result<(), MukeiError> {
                  // Enqueue one authoritative snapshot after all prior saves and before
                  // any later save. The synchronous ordering lock is released before I/O.
                  let acknowledgement = {
                      let _enqueue = self
                          .persistence_enqueue
                          .lock()
                          .unwrap_or_else(|poisoned| poisoned.into_inner());
                      let store = self
                          .projection_store
                          .read()
                          .unwrap_or_else(|poisoned| poisoned.into_inner())
                          .clone();
                      let Some(store) = store else { return Ok(()); };

                      let operations = self
                          .operations
                          .read()
                          .unwrap_or_else(|poisoned| poisoned.into_inner())
                          .values()
                          .cloned()
                          .collect::<Vec<_>>();
                      let models = self
                          .models
                          .read()
                          .unwrap_or_else(|poisoned| poisoned.into_inner())
                          .values()
                          .cloned()
                          .collect::<Vec<_>>();
                      let documents = self
                          .documents
                          .read()
                          .unwrap_or_else(|poisoned| poisoned.into_inner())
                          .values()
                          .cloned()
                          .collect::<Vec<_>>();
                      let conversations = self
                          .conversations
                          .read()
                          .unwrap_or_else(|poisoned| poisoned.into_inner())
                          .iter()
                          .map(|((conversation_id, branch_id), messages)| ConversationProjection {
                              conversation_id: conversation_id.clone(),
                              branch_id: branch_id.clone(),
                              messages: messages.clone(),
                          })
                          .collect::<Vec<_>>();
                      let projections = vec![
                          ("operations", serde_json::to_value(operations)
                              .map_err(|error| MukeiError::Internal(error.to_string()))?),
                          ("models", serde_json::to_value(models)
                              .map_err(|error| MukeiError::Internal(error.to_string()))?),
                          ("documents", serde_json::to_value(documents)
                              .map_err(|error| MukeiError::Internal(error.to_string()))?),
                          ("conversations", serde_json::to_value(conversations)
                              .map_err(|error| MukeiError::Internal(error.to_string()))?),
                      ];
                      let (sender, receiver) = tokio::sync::oneshot::channel();
                      self.persistence_sender
                          .send(PersistenceCommand::Flush {
                              store,
                              projections,
                              acknowledgement: sender,
                          })
                          .map_err(|_| MukeiError::Internal("projection writer unavailable".into()))?;
                      receiver
                  };

                  acknowledgement
                      .await
                      .map_err(|_| MukeiError::Internal("projection writer stopped before flush".into()))??;
                  Ok(())
              }
          }
          ''', encoding='utf-8')
          PY

          """
          if 'PersistenceCommand::Flush' not in text:
              if marker not in text:
                  raise SystemExit('missing insertion marker')
              text = text.replace(marker, patch + marker, 1)
          path.write_text(text, encoding='utf-8')
      - name: Commit patched script
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add scripts/port_kotlin_selected.sh
          git rm .github/workflows/patch-kotlin-flush-reconciliation-v2.yml
          git rm -f .github/workflows/patch-kotlin-flush-reconciliation.yml
          git commit -m "fix(ci): reconcile projection flush through ordered writer command"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'patch-kotlin-flush-v2', description: 'Await-safe flush reconciliation patched', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'patch-kotlin-flush-v2', description: 'Flush reconciliation patch failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
