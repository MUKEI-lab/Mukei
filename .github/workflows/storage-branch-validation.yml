name: storage-branch-validation

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
  workflow_dispatch:

concurrency:
  group: storage-branch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  storage-core:
    name: storage core checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.82 with clippy and rustfmt
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy,rustfmt
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Check storage feature set
        run: cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
      - name: Test storage feature set
        run: cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
      - name: Clippy storage feature set
        run: cargo clippy -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings

  embedded-migrations:
    name: embedded storage migrations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.82
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Embedded migration contract
        run: cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite --test universal_storage_embedded_migrations -- --nocapture

  publish-status:
    name: publish storage validation status
    if: always()
    needs:
      - storage-core
      - embedded-migrations
    runs-on: ubuntu-latest
    steps:
      - name: Publish commit status
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              storageCore: '${{ needs.storage-core.result }}',
              embeddedMigrations: '${{ needs.embedded-migrations.result }}'
            };
            const success = Object.values(results).every(result => result === 'success');
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'storage-branch-validation',
              description: success
                ? 'Storage Cargo checks passed'
                : `storage=${results.storageCore}, migrations=${results.embeddedMigrations}`.slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
            if (!success) core.setFailed('Storage branch validation failed');
