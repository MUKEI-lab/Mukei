name: storage-branch-validation

# Connector-authored pushes validate bot-produced source fixes on the isolated storage branch.
on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
  workflow_dispatch:

concurrency:
  group: storage-branch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  statuses: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  publish-pending:
    name: publish pending storage status
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending commit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'storage-branch-validation',
              description: 'Storage, Android OCR, Clippy, and migrations running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

  source-hygiene:
    name: source hygiene self-fix
    needs: publish-pending
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Elide needless indexing transaction lifetime
        shell: python
        run: |
          from pathlib import Path

          path = Path("rust/crates/mukei-core/src/rag/indexer.rs")
          text = path.read_text()
          old = "impl<'a> Drop for IndexingTransaction<'a> {"
          new = "impl Drop for IndexingTransaction<'_> {"
          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text)
          elif new not in text:
              raise SystemExit("indexing transaction Drop anchor not found")
      - name: Commit source hygiene fix when needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Source hygiene fix already present."
            exit 0
          fi
          test "$(git diff --name-only)" = "rust/crates/mukei-core/src/rag/indexer.rs"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rust/crates/mukei-core/src/rag/indexer.rs
          git commit -m "fix(rag): elide needless indexing transaction lifetime"
          git push origin HEAD:temp/universal-storage-workspace-v0.1

  storage-core:
    name: storage core checks
    needs: publish-pending
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.82 with Clippy
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Cargo check
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../ci-storage-validation
          cargo check --locked -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets \
            2>&1 | tee ../ci-storage-validation/check.log
      - name: Targeted staged-import tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --locked -p mukei-core --no-default-features --features std,tokio,rusqlite staged_import -- --nocapture \
            2>&1 | tee ../ci-storage-validation/staged-import.log
      - name: Cargo tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --locked -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets \
            2>&1 | tee ../ci-storage-validation/test.log
      - name: Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --locked -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings \
            2>&1 | tee ../ci-storage-validation/clippy.log
      - name: Upload Cargo diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-validation-${{ github.sha }}
          path: ci-storage-validation
          if-no-files-found: warn
          retention-days: 7

  embedded-migrations:
    name: embedded storage migrations
    needs: publish-pending
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.82
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Embedded migration contract
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../ci-storage-migrations
          cargo test --locked -p mukei-core --no-default-features --features std,tokio,rusqlite \
            --test universal_storage_embedded_migrations -- --nocapture \
            2>&1 | tee ../ci-storage-migrations/test.log
      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-migration-validation-${{ github.sha }}
          path: ci-storage-migrations
          if-no-files-found: warn
          retention-days: 7

  android-ocr:
    name: Android OCR integration
    needs: publish-pending
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"
      - name: Compile, test, lint, and assemble OCR integration
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-android-ocr
          gradle -p android \
            :core:protocol:testDebugUnitTest \
            :core:native:testDebugUnitTest \
            :app:lintDebug \
            :app:assembleDebug \
            :app:assembleOffline \
            --stacktrace 2>&1 | tee ci-android-ocr/gradle.log
      - name: Upload Android OCR diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ocr-validation-${{ github.sha }}
          path: ci-android-ocr
          if-no-files-found: warn
          retention-days: 7

  publish-status:
    name: publish storage validation status
    if: always()
    needs:
      - storage-core
      - embedded-migrations
      - android-ocr
    runs-on: ubuntu-latest
    steps:
      - name: Publish commit status
        uses: actions/github-script@v7
        with:
          script: |
            const storage = '${{ needs.storage-core.result }}';
            const migrations = '${{ needs.embedded-migrations.result }}';
            const android = '${{ needs.android-ocr.result }}';
            const results = [storage, migrations, android];
            const success = results.every(result => result === 'success');
            const cancelled = results.some(result => result === 'cancelled');
            const details = `storage=${storage}, migrations=${migrations}, android=${android}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : cancelled ? 'error' : 'failure',
              context: 'storage-branch-validation',
              description: success
                ? 'Storage, Android OCR, Clippy, and migrations passed'
                : cancelled
                  ? `Validation superseded or cancelled: ${details}`.slice(0, 140)
                  : details.slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
            if (!success && !cancelled) core.setFailed(`Storage validation failed: ${details}`);
