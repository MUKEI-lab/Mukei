name: storage-branch-validation

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
  workflow_dispatch:

concurrency:
  group: storage-branch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  storage-core:
    name: storage core checks
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.82 with Clippy
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Cargo check
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../ci-storage-validation
          cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets \
            2>&1 | tee ../ci-storage-validation/check.log
      - name: Cargo tests
        shell: bash
        run: |
          set -o pipefail
          cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets \
            2>&1 | tee ../ci-storage-validation/test.log
      - name: Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings \
            2>&1 | tee ../ci-storage-validation/clippy.log
      - name: Upload Cargo diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-validation-${{ github.sha }}
          path: ci-storage-validation
          if-no-files-found: warn
          retention-days: 7

  embedded-migrations:
    name: embedded storage migrations
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.82
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Embedded migration contract
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../ci-storage-migrations
          cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite \
            --test universal_storage_embedded_migrations -- --nocapture \
            2>&1 | tee ../ci-storage-migrations/test.log
      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-migration-validation-${{ github.sha }}
          path: ci-storage-migrations
          if-no-files-found: warn
          retention-days: 7

  publish-status:
    name: publish storage validation status
    if: always()
    needs:
      - storage-core
      - embedded-migrations
    runs-on: ubuntu-latest
    steps:
      - name: Publish commit status
        uses: actions/github-script@v7
        with:
          script: |
            const storage = '${{ needs.storage-core.result }}';
            const migrations = '${{ needs.embedded-migrations.result }}';
            const success = storage === 'success' && migrations === 'success';
            const details = `storage=${storage}, migrations=${migrations}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'storage-branch-validation',
              description: success ? 'Storage check, tests, Clippy, and migrations passed' : details.slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
            if (!success) core.setFailed(`Storage validation failed: ${details}`);
