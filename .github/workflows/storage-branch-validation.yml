name: storage-branch-validation

# Connector-authored pushes validate bot-produced source fixes on the isolated storage branch.
on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
  workflow_dispatch:

concurrency:
  group: storage-branch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  publish-pending:
    name: publish pending storage status
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending commit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'storage-branch-validation',
              description: 'Storage, Android OCR, Clippy, and migrations running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

  storage-core:
    name: storage core checks
    needs: publish-pending
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.82 with Clippy
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Cargo check
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../ci-storage-validation
          cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets \
            2>&1 | tee ../ci-storage-validation/check.log
      - name: Targeted staged-import tests
        shell: bash
        run: |
          set -o pipefail
          cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite staged_import -- --nocapture \
            2>&1 | tee ../ci-storage-validation/staged-import.log
      - name: Cargo tests
        shell: bash
        run: |
          set -o pipefail
          cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets \
            2>&1 | tee ../ci-storage-validation/test.log
      - name: Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings \
            2>&1 | tee ../ci-storage-validation/clippy.log
      - name: Upload Cargo diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-validation-${{ github.sha }}
          path: ci-storage-validation
          if-no-files-found: warn
          retention-days: 7

  embedded-migrations:
    name: embedded storage migrations
    needs: publish-pending
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.82
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Embedded migration contract
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../ci-storage-migrations
          cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite \
            --test universal_storage_embedded_migrations -- --nocapture \
            2>&1 | tee ../ci-storage-migrations/test.log
      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-migration-validation-${{ github.sha }}
          path: ci-storage-migrations
          if-no-files-found: warn
          retention-days: 7

  android-ocr:
    name: Android OCR integration
    needs: publish-pending
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"
      - name: Compile, test, lint, and assemble OCR integration
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-android-ocr
          gradle -p android \
            :core:protocol:testDebugUnitTest \
            :core:native:testDebugUnitTest \
            :app:lintDebug \
            :app:assembleDebug \
            :app:assembleOffline \
            --stacktrace 2>&1 | tee ci-android-ocr/gradle.log
      - name: Upload Android OCR diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ocr-validation-${{ github.sha }}
          path: ci-android-ocr
          if-no-files-found: warn
          retention-days: 7

  publish-status:
    name: publish storage validation status
    if: always()
    needs:
      - storage-core
      - embedded-migrations
      - android-ocr
    runs-on: ubuntu-latest
    steps:
      - name: Publish commit status
        uses: actions/github-script@v7
        with:
          script: |
            const storage = '${{ needs.storage-core.result }}';
            const migrations = '${{ needs.embedded-migrations.result }}';
            const android = '${{ needs.android-ocr.result }}';
            const success = storage === 'success' && migrations === 'success' && android === 'success';
            const details = `storage=${storage}, migrations=${migrations}, android=${android}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'storage-branch-validation',
              description: success ? 'Storage, Android OCR, Clippy, and migrations passed' : details.slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
            if (!success) core.setFailed(`Storage validation failed: ${details}`);
