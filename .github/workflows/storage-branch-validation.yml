name: storage-branch-validation

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
  workflow_dispatch:

concurrency:
  group: storage-branch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  storage-core:
    name: storage core checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      fmt_exit: ${{ steps.cargo.outputs.fmt_exit }}
      check_exit: ${{ steps.cargo.outputs.check_exit }}
      test_exit: ${{ steps.cargo.outputs.test_exit }}
      clippy_exit: ${{ steps.cargo.outputs.clippy_exit }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.82 with clippy and rustfmt
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy,rustfmt
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run Cargo diagnostics
        id: cargo
        shell: bash
        run: |
          set +e
          mkdir -p ../ci-logs

          cargo fmt --all -- --check > ../ci-logs/fmt.log 2>&1
          fmt_exit=$?
          echo "fmt_exit=$fmt_exit" >> "$GITHUB_OUTPUT"

          cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets > ../ci-logs/check.log 2>&1
          check_exit=$?
          echo "check_exit=$check_exit" >> "$GITHUB_OUTPUT"

          cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets > ../ci-logs/test.log 2>&1
          test_exit=$?
          echo "test_exit=$test_exit" >> "$GITHUB_OUTPUT"

          cargo clippy -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings > ../ci-logs/clippy.log 2>&1
          clippy_exit=$?
          echo "clippy_exit=$clippy_exit" >> "$GITHUB_OUTPUT"

          printf 'fmt=%s\ncheck=%s\ntest=%s\nclippy=%s\n' \
            "$fmt_exit" "$check_exit" "$test_exit" "$clippy_exit" \
            > ../ci-logs/summary.txt
          exit 0
      - name: Upload Cargo diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-cargo-logs-${{ github.sha }}
          path: ci-logs
          if-no-files-found: error
          retention-days: 7
      - name: Enforce Cargo results
        shell: bash
        run: |
          test '${{ steps.cargo.outputs.fmt_exit }}' = '0'
          test '${{ steps.cargo.outputs.check_exit }}' = '0'
          test '${{ steps.cargo.outputs.test_exit }}' = '0'
          test '${{ steps.cargo.outputs.clippy_exit }}' = '0'

  embedded-migrations:
    name: embedded storage migrations
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      migration_exit: ${{ steps.migrations.outputs.migration_exit }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.82
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Run embedded migration contract
        id: migrations
        shell: bash
        run: |
          set +e
          mkdir -p ../ci-migration-logs
          cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite \
            --test universal_storage_embedded_migrations -- --nocapture \
            > ../ci-migration-logs/embedded-migrations.log 2>&1
          migration_exit=$?
          echo "migration_exit=$migration_exit" >> "$GITHUB_OUTPUT"
          echo "migration=$migration_exit" > ../ci-migration-logs/summary.txt
          exit 0
      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-migration-logs-${{ github.sha }}
          path: ci-migration-logs
          if-no-files-found: error
          retention-days: 7
      - name: Enforce migration result
        run: test '${{ steps.migrations.outputs.migration_exit }}' = '0'

  publish-status:
    name: publish storage validation status
    if: always()
    needs:
      - storage-core
      - embedded-migrations
    runs-on: ubuntu-latest
    steps:
      - name: Publish commit status
        uses: actions/github-script@v7
        with:
          script: |
            const codes = {
              fmt: '${{ needs.storage-core.outputs.fmt_exit }}',
              check: '${{ needs.storage-core.outputs.check_exit }}',
              test: '${{ needs.storage-core.outputs.test_exit }}',
              clippy: '${{ needs.storage-core.outputs.clippy_exit }}',
              migrations: '${{ needs.embedded-migrations.outputs.migration_exit }}'
            };
            const success = Object.values(codes).every(code => code === '0');
            const details = Object.entries(codes).map(([key, value]) => `${key}=${value || '?'}`).join(',');
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'storage-branch-validation',
              description: success ? 'Storage Cargo checks passed' : details.slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
            if (!success) core.setFailed(`Storage validation failed: ${details}`);
