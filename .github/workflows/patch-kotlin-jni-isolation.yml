name: patch-kotlin-jni-isolation

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/patch-kotlin-jni-isolation.yml

permissions:
  contents: write
  statuses: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Publish pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'patch-kotlin-jni-isolation', description: 'Reconciling JNI child-module imports', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Patch selective-port JNI imports
        shell: python
        run: |
          from pathlib import Path

          path = Path('scripts/port_kotlin_selected.sh')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              "    '    guarded_bytes, invalid_handle_payload, runtime_entry, runtime_services, serialize,\\n'\n",
              "    '    error_payload, guarded_bytes, invalid_handle_payload, runtime_entry, runtime_services,\\n'\n    '    serialize,\\n'\n",
              1,
          )
          text = text.replace(
              "secure_imports = (\n    'use jni::objects::{JByteArray, JObject};\\n'\n",
              "secure_imports = (\n    'use jni::objects::JObject;\\n'\n",
              1,
          )
          path.write_text(text, encoding='utf-8')
      - name: Commit patched script
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add scripts/port_kotlin_selected.sh
          git rm .github/workflows/patch-kotlin-jni-isolation.yml
          git commit -m "fix(ci): reconcile JNI child imports during Kotlin port"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'patch-kotlin-jni-isolation', description: 'JNI child imports reconciled', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'patch-kotlin-jni-isolation', description: 'JNI import reconciliation failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
