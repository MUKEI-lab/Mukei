name: android-kotlin-ci

on:
  push:
    branches: [ Kotlin ]
    paths:
      - "android/**"
      - "rust/Cargo.toml"
      - "rust/crates/mukei-core/**"
      - "rust/crates/mukei-android-jni/**"
      - "rust/migrations/**"
      - "rust/llama-cpp-prebuilt/**"
      - ".github/workflows/android-kotlin-ci.yml"
      - ".github/workflows/android-release-candidate.yml"
  pull_request:
    branches: [ Kotlin ]
    paths:
      - "android/**"
      - "rust/Cargo.toml"
      - "rust/crates/mukei-core/**"
      - "rust/crates/mukei-android-jni/**"
      - "rust/migrations/**"
      - "rust/llama-cpp-prebuilt/**"
      - ".github/workflows/android-kotlin-ci.yml"
      - ".github/workflows/android-release-candidate.yml"
  workflow_dispatch:
  workflow_call:
    inputs:
      checkout_ref:
        description: "Git ref to validate; defaults to the triggering commit."
        required: false
        type: string
      status_sha:
        description: "Commit SHA that receives the legacy android-kotlin-ci status."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: android-kotlin-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: "1.86.0"
  ANDROID_NDK_VERSION: "27.2.12479018"
  CARGO_NDK_VERSION: "4.1.2"

jobs:
  rust-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.86.0
      - name: Install native build dependencies
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y clang cmake ninja-build pkg-config libssl-dev perl make
      - name: Run Rust core and security feature matrix
        shell: bash
        run: |
          set -o pipefail
          {
            cd rust
            cargo test -p mukei-core --lib
            cargo test -p mukei-core --lib tools::
            cargo check -p mukei-core \
              --no-default-features \
              --features std,tokio,sqlcipher,runtime_hardening
            cargo test -p mukei-android-jni --lib \
              --no-default-features \
              --features secure_runtime,runtime_hardening
            cargo check -p mukei-android-jni \
              --no-default-features \
              --features secure_runtime,rag_runtime,runtime_hardening
            cd ..
            cmake -S rust/llama-cpp-prebuilt \
              -B build/llama-host \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DMUKEI_LLAMA_FORCE_REBUILD=ON
            cmake --build build/llama-host --target mukei_llama_native_smoke
            ctest --test-dir build/llama-host --output-on-failure
            cd rust
            MUKEI_LLAMA_NATIVE_LIB_DIR="$GITHUB_WORKSPACE/rust/llama-cpp-prebuilt/prebuilt/host" \
              cargo check -p mukei-android-jni \
                --no-default-features \
                --features native_inference
          } 2>&1 | tee "$RUNNER_TEMP/mukei-rust-security.log"
      - name: Upload Rust security failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: rust-security-failure-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 7
          path: ${{ runner.temp }}/mukei-rust-security.log

  android-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"
      - name: Test, lint and assemble Android modules
        shell: bash
        run: |
          set -o pipefail
          gradle -p android \
            :core:protocol:testDebugUnitTest \
            :core:native:testDebugUnitTest \
            :app:lintDebug \
            :app:assembleDebug \
            :app:assembleOffline \
            --stacktrace 2>&1 | tee "$RUNNER_TEMP/mukei-android-debug.log"
      - name: Upload Android debug failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-failure-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: error
          retention-days: 7
          path: ${{ runner.temp }}/mukei-android-debug.log
      - name: Verify offline APK removes INTERNET
        shell: bash
        run: |
          set -euo pipefail
          apk="$(find android/app/build/outputs/apk/offline -type f -name '*.apk' | head -n 1)"
          test -n "$apk"
          if apkanalyzer manifest permissions "$apk" | grep -q 'android.permission.INTERNET'; then
            echo "offline APK unexpectedly declares INTERNET" >&2
            exit 1
          fi

  release-hardening:
    needs: [ rust-security, android-debug ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"
      - name: Install pinned Android native build tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build perl make
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;${ANDROID_NDK_VERSION}"
          cargo install cargo-ndk --version "${CARGO_NDK_VERSION}" --locked
      - name: Build ABI-matched native runtime and inference capsules
        shell: bash
        run: |
          set -euo pipefail
          ndk="$ANDROID_HOME/ndk/${ANDROID_NDK_VERSION}"
          test -d "$ndk"
          output="$GITHUB_WORKSPACE/android/core/native/src/main/jniLibs"
          rm -rf "$output"
          mkdir -p "$output"
          for abi in arm64-v8a x86_64; do
            cmake -S rust/llama-cpp-prebuilt \
              -B "build/llama-$abi" \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE="$ndk/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="$abi" \
              -DANDROID_PLATFORM=android-26 \
              -DANDROID_STL=c++_static \
              -DMUKEI_LLAMA_FORCE_REBUILD=ON
            cmake --build "build/llama-$abi" --target mukei_llama_native
            export MUKEI_LLAMA_NATIVE_LIB_DIR="$GITHUB_WORKSPACE/rust/llama-cpp-prebuilt/prebuilt/$abi"
            (
              cd rust
              cargo ndk -t "$abi" -o ../android/core/native/src/main/jniLibs \
                build -p mukei-android-jni --release \
                --no-default-features \
                --features runtime_production,runtime_hardening
            )
            cp "$MUKEI_LLAMA_NATIVE_LIB_DIR/libmukei_llama_native.so" "$output/$abi/"
          done
      - name: Build R8-shrunk ABI release APKs
        run: >-
          gradle -p android
          :app:lintRelease
          :app:assembleRelease
          --stacktrace
      - name: Verify ABI, JNI and R8 outputs
        shell: bash
        run: |
          set -euo pipefail
          release_dir="android/app/build/outputs/apk/release"
          mapfile -t apks < <(find "$release_dir" -type f -name "*.apk" | sort)
          test "${#apks[@]}" -eq 2
          arm_apk="$(printf '%s\n' "${apks[@]}" | grep 'arm64-v8a')"
          x86_apk="$(printf '%s\n' "${apks[@]}" | grep 'x86_64')"
          unzip -l "$arm_apk" | grep -q 'lib/arm64-v8a/libmukei_android.so'
          unzip -l "$arm_apk" | grep -q 'lib/arm64-v8a/libmukei_llama_native.so'
          unzip -l "$x86_apk" | grep -q 'lib/x86_64/libmukei_android.so'
          unzip -l "$x86_apk" | grep -q 'lib/x86_64/libmukei_llama_native.so'
          test -s android/app/build/outputs/mapping/release/mapping.txt
      - uses: actions/upload-artifact@v4
        with:
          name: android-release-hardening-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/mapping/release/mapping.txt
            android/app/build/reports/lint-results-release.html

  report-status:
    if: ${{ always() }}
    needs: [ rust-security, android-debug, release-hardening ]
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish observable commit status
        uses: actions/github-script@v7
        with:
          script: |
            const explicitSha = '${{ inputs.status_sha }}';
            const sha = explicitSha ||
              (context.eventName === 'pull_request'
                ? context.payload.pull_request.head.sha
                : context.sha);
            const results = {
              rustSecurity: '${{ needs.rust-security.result }}',
              androidDebug: '${{ needs.android-debug.result }}',
              releaseHardening: '${{ needs.release-hardening.result }}',
            };
            const succeeded = Object.values(results).every(
              (value) => value === 'success'
            );
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: succeeded ? 'success' : 'failure',
              context: 'android-kotlin-ci',
              description: succeeded
                ? 'Rust, Android and release-hardening checks passed'
                : 'One or more Android CI jobs failed or were skipped',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
