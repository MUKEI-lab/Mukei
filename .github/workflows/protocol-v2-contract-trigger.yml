name: protocol-v2-contract-trigger

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'checkpoint/stabilization-2026-07-12'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: checkpoint/stabilization-2026-07-12
          fetch-depth: 0
      - name: Execute reviewed exact-anchor patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/protocol-v2-contract-patcher.yml').read_text()
          start_marker = "          python3 <<'PY'\n"
          end_marker = "          PY\n\n          git config user.name"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          block = source[start:end]
          lines = []
          for line in block.splitlines():
              if line.startswith('          '):
                  line = line[10:]
              lines.append(line)
          Path('/tmp/protocol_v2_contract_patch.py').write_text('\n'.join(lines) + '\n')
          PY
          python3 /tmp/protocol_v2_contract_patch.py
          rm -f .github/workflows/protocol-v2-contract-trigger.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "protocol: canonicalize V2 chat payload scope"
          git push origin HEAD:checkpoint/stabilization-2026-07-12
