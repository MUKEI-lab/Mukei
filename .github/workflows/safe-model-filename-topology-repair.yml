name: safe-model-filename-topology-repair

on:
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/safe-model-filename-topology-repair.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: safe-model-filename-topology-repair-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: false

env:
  EXPECTED_SOURCE_HEAD: d7d68a61734ecde8fc861628ecc8c3155404624a
  RUNNER_PATH: .github/workflows/safe-model-filename-topology-repair.yml

jobs:
  apply-source-correct-topology-repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Prove exact repair base
        shell: bash
        run: |
          set -euo pipefail
          git merge-base --is-ancestor "$EXPECTED_SOURCE_HEAD" HEAD
          mapfile -t changed < <(git diff --name-only "$EXPECTED_SOURCE_HEAD"..HEAD)
          if [[ "${#changed[@]}" -ne 1 || "${changed[0]}" != "$RUNNER_PATH" ]]; then
            printf 'Unexpected files changed since exact source head:\n' >&2
            printf '  %s\n' "${changed[@]}" >&2
            exit 1
          fi
          echo "RUNNER_HEAD=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Apply one-line compile-topology repair
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('rust/crates/mukei-bridge/src/lib.rs')
          content = path.read_text()
          old = '\nfn safe_model_filename(filename: &str) -> mukei_core::error::Result<&str> {'
          new = '\n#[cfg(any(debug_assertions, test))]\nfn safe_model_filename(filename: &str) -> mukei_core::error::Result<&str> {'
          count = content.count(old)
          if count != 1:
              raise RuntimeError(f'expected exactly one safe_model_filename definition, found {count}')
          path.write_text(content.replace(old, new, 1))
          PY
          git diff --check
          mapfile -t changed < <(git diff --name-only)
          if [[ "${#changed[@]}" -ne 1 || "${changed[0]}" != "rust/crates/mukei-bridge/src/lib.rs" ]]; then
            printf 'Unexpected source diff:\n' >&2
            printf '  %s\n' "${changed[@]}" >&2
            exit 1
          fi

      - name: Verify Rust formatting
        run: cargo fmt --manifest-path rust/Cargo.toml --all -- --check

      - name: Commit only the source repair
        shell: bash
        run: |
          set -euo pipefail
          git add rust/crates/mukei-bridge/src/lib.rs
          git diff --cached --check
          mapfile -t staged < <(git diff --cached --name-only)
          if [[ "${#staged[@]}" -ne 1 || "${staged[0]}" != "rust/crates/mukei-bridge/src/lib.rs" ]]; then
            printf 'Unexpected staged files:\n' >&2
            printf '  %s\n' "${staged[@]}" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: compile debug model filename guard only where consumed"
          git fetch origin checkpoint/stabilization-2026-07-12
          remote_head=$(git rev-parse origin/checkpoint/stabilization-2026-07-12)
          if [[ "$remote_head" != "$RUNNER_HEAD" ]]; then
            echo "Branch moved during repair; refusing to overwrite $remote_head" >&2
            exit 1
          fi
          git push origin HEAD:checkpoint/stabilization-2026-07-12
