name: storage-release-gate

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - 'rust/**'
      - 'scripts/storage-release-gate.sh'
      - '.github/workflows/storage-release-gate.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: storage-release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-pending:
    name: publish pending release status
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending commit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'storage-release-gate',
              description: 'Universal Storage release gate is running'
            });

  release-gate:
    name: release-gate
    needs: publish-pending
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.86.0 --profile minimal --component rustfmt --component clippy
          rustup override set 1.86.0
          rustc --version --verbose
          cargo --version

      - name: Run storage release gate
        shell: bash
        run: bash scripts/storage-release-gate.sh

  publish-result:
    name: publish release result
    needs: release-gate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish final commit status
        uses: actions/github-script@v7
        env:
          GATE_RESULT: ${{ needs.release-gate.result }}
        with:
          script: |
            const passed = process.env.GATE_RESULT === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'storage-release-gate',
              description: passed
                ? 'Universal Storage release gate passed'
                : `Universal Storage release gate ${process.env.GATE_RESULT}`
            });
