name: rag-embedder-runtime-slice-runner-v3

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: rag-embedder-runtime-slice-v3-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

env:
  EXPECTED_BASE: 4e0e29224e4efc82c2bc52290fafd938f911cc56
  BRANCH_NAME: checkpoint/stabilization-2026-07-12
  PATCH_SHA256: 1c2311e8686206f4006c2c3233ad6d690e9db7a5edef7d7159e32ae27f5b5a74
  RUSTFLAGS: "-D warnings"
  QT_VERSION: 6.5.3

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Gate exact staging commit
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          parent="$(git rev-parse HEAD^)"
          changed="$(git diff --name-only HEAD^ HEAD)"
          if [[ "$parent" == "$EXPECTED_BASE" && "$changed" == ".github/workflows/rag-embedder-runtime-slice-runner-v3.yml" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install stable toolchain
        if: steps.gate.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt 6.5
        if: steps.gate.outputs.run == 'true'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true

      - name: Export Qt toolchain paths
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          echo "$QT_ROOT_DIR/bin" >> "$GITHUB_PATH"
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> "$GITHUB_ENV"

      - name: Verify and apply reviewed patch payload
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cat .github/remediation/rag-embedder-runtime/patch.b64.part0{1,2,3,4} \
            | tr -d '\n' \
            | base64 --decode > /tmp/rag-embedder-runtime-patch.py
          echo "$PATCH_SHA256  /tmp/rag-embedder-runtime-patch.py" | sha256sum --check --strict
          python3 -m py_compile /tmp/rag-embedder-runtime-patch.py
          python3 /tmp/rag-embedder-runtime-patch.py

      - name: Repair non-Candle compile topology
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("rust/crates/mukei-bridge/src/app_runtime/rag_runtime.rs")
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one topology anchor, found {count}: {old!r}")
              text = text.replace(old, new, 1)

          replace_once(
              'use mukei_core::error::{MukeiError, Result};',
              '#[cfg(any(feature = "candle", test))]\nuse mukei_core::error::{MukeiError, Result};',
          )
          replace_once(
              '    Embedder, IndexCompatibilityState,',
              '    IndexCompatibilityState,',
          )
          replace_once(
              '    RetrieverResult, StructuredRetriever, VerifiedEmbeddingArtifacts,\n};\n#[cfg(feature = "candle")]',
              '    RetrieverResult, StructuredRetriever,\n};\n#[cfg(any(feature = "candle", test))]\nuse mukei_core::rag::{Embedder, VerifiedEmbeddingArtifacts};\n#[cfg(feature = "candle")]',
          )
          replace_once(
              '    Unavailable(UnavailableState),\n    EmbedderReady {',
              '    Unavailable(UnavailableState),\n    #[cfg(any(feature = "candle", test))]\n    EmbedderReady {',
          )
          replace_once(
              '\n    fn install_verified_embedder(',
              '\n    #[cfg(any(feature = "candle", test))]\n    fn install_verified_embedder(',
          )
          replace_once(
              '            RuntimeState::EmbedderReady { .. } => Err(RetrieverError::IndexUnavailable),',
              '            #[cfg(any(feature = "candle", test))]\n            RuntimeState::EmbedderReady { .. } => Err(RetrieverError::IndexUnavailable),',
          )
          replace_once(
              '            RuntimeState::EmbedderReady {\n                embedder,\n                artifacts,\n            } => {',
              '            #[cfg(any(feature = "candle", test))]\n            RuntimeState::EmbedderReady {\n                embedder,\n                artifacts,\n            } => {',
          )
          path.write_text(text)
          PY

      - name: Format and validate exact diff
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd rust
          cargo fmt --all
          cargo fmt --all --check
          cd ..
          git diff --check
          mapfile -t changed < <(git diff --name-only | sort)
          expected=(
            rust/crates/mukei-bridge/src/agent_runtime.rs
            rust/crates/mukei-bridge/src/app_runtime/rag_runtime.rs
            rust/crates/mukei-core/src/rag/embedder.rs
          )
          [[ "${changed[*]}" == "${expected[*]}" ]] || {
            printf 'Unexpected diff:\n%s\n' "${changed[*]}" >&2
            exit 1
          }

      - name: Build bridge persistence tuple
        id: persistence
        if: steps.gate.outputs.run == 'true'
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo build -p mukei-bridge --features "sqlcipher,network" \
            2>&1 | tee /tmp/rag-embedder-persistence-build.log

      - name: Upload persistence build failure evidence
        if: steps.persistence.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rag-embedder-persistence-build-failure
          path: /tmp/rag-embedder-persistence-build.log
          if-no-files-found: error
          retention-days: 3

      - name: Check no-persistence bridge tuple
        id: no_persistence
        if: steps.gate.outputs.run == 'true'
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo check -p mukei-bridge --no-default-features --features runtime_development \
            2>&1 | tee /tmp/rag-embedder-no-persistence-check.log

      - name: Upload no-persistence failure evidence
        if: steps.no_persistence.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rag-embedder-no-persistence-failure
          path: /tmp/rag-embedder-no-persistence-check.log
          if-no-files-found: error
          retention-days: 3

      - name: Check Candle and HNSW bridge tuple
        if: steps.gate.outputs.run == 'true'
        working-directory: rust
        run: cargo check -p mukei-bridge --no-default-features --features "runtime_development,candle,usearch_hnsw"

      - name: Run focused runtime tests
        if: steps.gate.outputs.run == 'true'
        working-directory: rust
        run: cargo test -p mukei-bridge --lib --features "sqlcipher,network" rag_runtime

      - name: Commit only verified source files
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          staging_head="$(git rev-parse HEAD)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            rust/crates/mukei-bridge/src/agent_runtime.rs \
            rust/crates/mukei-bridge/src/app_runtime/rag_runtime.rs \
            rust/crates/mukei-core/src/rag/embedder.rs
          mapfile -t staged < <(git diff --cached --name-only | sort)
          expected=(
            rust/crates/mukei-bridge/src/agent_runtime.rs
            rust/crates/mukei-bridge/src/app_runtime/rag_runtime.rs
            rust/crates/mukei-core/src/rag/embedder.rs
          )
          [[ "${staged[*]}" == "${expected[*]}" ]]
          git commit -m "feat: construct verified process-owned RAG embedder"
          remote_head="$(git ls-remote origin "refs/heads/$BRANCH_NAME" | cut -f1)"
          [[ "$remote_head" == "$staging_head" ]] || {
            echo "Remote source head moved: expected $staging_head, found $remote_head" >&2
            exit 1
          }
          git push origin "HEAD:refs/heads/$BRANCH_NAME"
