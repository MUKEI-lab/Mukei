name: android-apk-preflight

on:
  push:
    branches: [ main, "agent/**", "checkpoint/**" ]
  pull_request:
    branches: [ main, "checkpoint/**" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Android APK packaging preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Python and shell syntax
        shell: bash
        run: |
          python3 -m py_compile \
            scripts/android/prepare-branding.py \
            scripts/android/preflight.py
          bash -n scripts/android/build-apk.sh
          bash -n scripts/android/validate-apk.sh

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint Android build scripts
        run: shellcheck scripts/android/build-apk.sh scripts/android/validate-apk.sh

      - name: Validate launcher, Qt manifest, assets, and build contract
        run: python3 scripts/android/preflight.py

      - name: Exercise lossless branding materialization lifecycle
        shell: bash
        run: |
          set -Eeuo pipefail
          sandbox="$(mktemp -d)"
          state="${sandbox}/branding-state.json"
          python3 scripts/android/prepare-branding.py materialize \
            --repo-root "${sandbox}" \
            --state "${state}"
          png_count="$(find "${sandbox}/qml/android/res" -type f -name '*.png' | wc -l)"
          test "${png_count}" -eq 10
          python3 scripts/android/prepare-branding.py cleanup \
            --repo-root "${sandbox}" \
            --state "${state}"
          if find "${sandbox}/qml/android/res" -type f -name '*.png' | grep -q .; then
            echo "Branding cleanup left generated PNG files behind." >&2
            exit 1
          fi

      - name: Validate Android CMake cache accepts arm64
        run: >-
          cmake
          -DANDROID_ABI=arm64-v8a
          -P qml/cmake/MukeiAndroidApkInitialCache.cmake

      - name: Validate Android CMake cache rejects other ABIs
        shell: bash
        run: |
          if cmake -DANDROID_ABI=x86_64 -P qml/cmake/MukeiAndroidApkInitialCache.cmake; then
            echo "Expected the APK-first cache to reject x86_64." >&2
            exit 1
          fi
