name: storage-workflow-cleanup

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-workflow-cleanup.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: storage-workflow-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Remove one-shot storage repair workflows
        run: |
          rm -f \
            .github/workflows/storage-baseline-compile-fix.yml \
            .github/workflows/storage-branch-repair.yml \
            .github/workflows/storage-finalizer-import-fix.yml \
            .github/workflows/storage-migration-registration.yml \
            .github/workflows/storage-quality-finalize-v2.yml \
            .github/workflows/storage-quality-finalize.yml \
            .github/workflows/storage-quality-fix.yml \
            .github/workflows/storage-quality-scope-fix.yml \
            .github/workflows/storage-workflow-cleanup.yml
      - name: Commit workflow cleanup
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add -A .github/workflows
          git diff --cached --check
          git commit -m "chore(storage): remove one-shot repair workflows"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
