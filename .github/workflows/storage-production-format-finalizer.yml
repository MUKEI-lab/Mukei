name: storage-production-format-finalizer

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-production-format-finalizer.yml

permissions:
  contents: write
  statuses: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      CARGO_TERM_COLOR: never
      RUST_BACKTRACE: 1
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy,rustfmt
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'storage-production-format-finalizer', description: 'Normalizing secure storage production source', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Normalize production source
        shell: python
        run: |
          from pathlib import Path

          def exact(path, old, new, label):
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  if new in text:
                      return
                  raise SystemExit(f"missing marker: {label}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          backend = Path("android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt")
          old = "\n".join([
              "                val summary = listOf(",
              "                    security.optString(\"sqlcipher\", \"unknown\"),                    security.optString(\"projections\", \"unknown\"),",
              "          security.optString(\"object_store\", \"unknown\"),",
              "          security.optString(\"rag\", \"unknown\"),",
              "                    if (security.optBoolean(\"panic_hook\", false)) {",
          ])
          new = "\n".join([
              "                val summary = listOf(",
              "                    security.optString(\"sqlcipher\", \"unknown\"),",
              "                    security.optString(\"projections\", \"unknown\"),",
              "                    security.optString(\"object_store\", \"unknown\"),",
              "                    security.optString(\"rag\", \"unknown\"),",
              "                    if (security.optBoolean(\"panic_hook\", false)) {",
          ])
          exact(backend, old, new, "backend summary")

          gateway = Path("android/core/native/src/main/kotlin/ai/mukei/android/core/nativebridge/MukeiNativeGateway.kt")
          old = "\n".join([
              "        }        fun createSecure(",
              "  configJson: ByteArray,",
              "  databaseKey: ByteArray,",
              "  objectStoreKey: ByteArray,",
              "        ): RustNativeGateway {",
              "  require(configJson.isNotEmpty()) { \"Runtime configuration must not be empty\" }",
              "  require(databaseKey.size == 32) { \"SQLCipher key must be exactly 32 bytes\" }",
              "  require(objectStoreKey.size == 32) { \"Object-store key must be exactly 32 bytes\" }",
              "  val handle = NativeBindings.createSecureRuntime(configJson, databaseKey, objectStoreKey)",
              "            check(handle > 0L) { \"Secure native runtime creation failed\" }",
              "            return RustNativeGateway(handle, secureRuntime = true)",
              "        }",
          ])
          new = "\n".join([
              "        }",
              "",
              "        fun createSecure(",
              "            configJson: ByteArray,",
              "            databaseKey: ByteArray,",
              "            objectStoreKey: ByteArray,",
              "        ): RustNativeGateway {",
              "            require(configJson.isNotEmpty()) { \"Runtime configuration must not be empty\" }",
              "            require(databaseKey.size == 32) { \"SQLCipher key must be exactly 32 bytes\" }",
              "            require(objectStoreKey.size == 32) { \"Object-store key must be exactly 32 bytes\" }",
              "            val handle = NativeBindings.createSecureRuntime(configJson, databaseKey, objectStoreKey)",
              "            check(handle > 0L) { \"Secure native runtime creation failed\" }",
              "            return RustNativeGateway(handle, secureRuntime = true)",
              "        }",
          ])
          exact(gateway, old, new, "gateway secure factory")

          factory = Path("android/core/native/src/main/kotlin/ai/mukei/android/core/nativebridge/SecureRuntimeFactory.kt")
          text = factory.read_text(encoding="utf-8")
          start = text.index("        val databaseKeyFile = secureFile(filesRoot, DATABASE_KEY_FILE)")
          end = text.index("        return try {", start)
          key_lines = [
              "        val databaseKeyFile = secureFile(filesRoot, DATABASE_KEY_FILE)",
              "        val databaseKey = if (databaseKeyFile.exists()) {",
              "            unwrapDatabaseKey(databaseKeyFile)",
              "        } else {",
              "            createAndPersistDatabaseKey(databaseKeyFile)",
              "        }",
              "        val objectKeyFile = secureFile(filesRoot, OBJECT_STORE_KEY_FILE)",
              "        val objectStoreKey = try {",
              "            if (objectKeyFile.exists()) {",
              "                unwrapObjectStoreKey(objectKeyFile)",
              "            } else {",
              "                createAndPersistObjectStoreKey(objectKeyFile)",
              "            }",
              "        } catch (failure: Throwable) {",
              "            databaseKey.fill(0)",
              "            throw failure",
              "        }",
              "        val gateway = try {",
              "            RustNativeGateway.createSecure(configJson, databaseKey, objectStoreKey)",
              "        } finally {",
              "            databaseKey.fill(0)",
              "            objectStoreKey.fill(0)",
              "        }",
              "",
          ]
          text = text[:start] + "\n".join(key_lines) + text[end:]
          start = text.index("    private fun createAndPersistObjectStoreKey")
          end = text.index("    private fun unwrapSecretFile", start)
          function_lines = [
              "    private fun createAndPersistObjectStoreKey(keyFile: File): ByteArray {",
              "        val rawKey = try {",
              "            NativeBindings.generateObjectStoreKey()",
              "        } catch (failure: Throwable) {",
              "            throw SecurityBootstrapException(\"object_store_key_generation_failed\", failure)",
              "        }",
              "        if (rawKey.size != OBJECT_STORE_KEY_BYTES) {",
              "            rawKey.fill(0)",
              "            throw SecurityBootstrapException(\"object_store_key_generation_failed\")",
              "        }",
              "        return try {",
              "            val wrapped = wrap(rawKey)",
              "            try {",
              "                writeAtomically(keyFile, wrapped)",
              "            } finally {",
              "                wrapped.fill(0)",
              "            }",
              "            rawKey",
              "        } catch (failure: Exception) {",
              "            rawKey.fill(0)",
              "            if (failure is SecurityBootstrapException) throw failure",
              "            throw SecurityBootstrapException(\"object_store_key_creation_failed\", failure)",
              "        }",
              "    }",
              "",
              "    private fun unwrapObjectStoreKey(keyFile: File): ByteArray {",
              "        val raw = unwrapSecretFile(keyFile)",
              "        if (raw.size != OBJECT_STORE_KEY_BYTES) {",
              "            raw.fill(0)",
              "            throw SecurityBootstrapException(\"object_store_key_length_invalid\")",
              "        }",
              "        return raw",
              "    }",
              "",
          ]
          text = text[:start] + "\n".join(function_lines) + text[end:]
          factory.write_text(text, encoding="utf-8")

          secure = Path("rust/crates/mukei-android-jni/src/secure_runtime_jni.rs")
          text = secure.read_text(encoding="utf-8")
          start = text.index("            super::super::serialize(&json!({", text.index("securityStatus"))
          end = text.index("        });", start)
          status_lines = [
              "            super::super::serialize(&json!({",
              "                \"sqlcipher\": status_tag(resources.encryption_status),",
              "                \"panic_hook\": mukei_core::diagnostics::panic_hook::is_installed(),",
              "                \"crash_sink\": \"app_private\",",
              "                \"telemetry\": \"local_only\",",
              "                \"projections\": \"encrypted\",",
              "                \"object_store\": if resources.object_store_ready { \"encrypted\" } else { \"unavailable\" },",
              "                \"staged_plaintext_cleanup\": {",
              "                    \"removed\": resources.staged_cleanup_removed,",
              "                    \"unsafe_paths\": resources.staged_cleanup_unsafe_paths,",
              "                },",
              "                \"rag\": if resources.rag_ready { \"ready\" } else { \"artifacts_required\" },",
              "            }))",
          ]
          secure.write_text(text[:start] + "\n".join(status_lines) + "\n" + text[end:], encoding="utf-8")
      - name: Format Rust
        working-directory: rust
        run: rustfmt --edition 2021 crates/mukei-android-jni/src/secure_runtime_jni.rs
      - name: Verify whitespace
        run: git diff --check
      - name: Core check and tests
        working-directory: rust
        run: |
          cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
          cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
          cargo clippy -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings
      - name: Secure JNI tests
        working-directory: rust
        run: cargo test -p mukei-android-jni --lib --no-default-features --features secure_runtime
      - name: Kotlin compile
        run: gradle -p android :core:native:compileDebugKotlin :app:compileDebugKotlin --stacktrace
      - name: Commit normalized source
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt
          git add android/core/native/src/main/kotlin/ai/mukei/android/core/nativebridge/MukeiNativeGateway.kt
          git add android/core/native/src/main/kotlin/ai/mukei/android/core/nativebridge/SecureRuntimeFactory.kt
          git add rust/crates/mukei-android-jni/src/secure_runtime_jni.rs
          git rm .github/workflows/storage-production-format-finalizer.yml
          git diff --cached --check
          git commit -m "style(storage): normalize secure Android composition"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'storage-production-format-finalizer', description: 'Secure storage production source normalized and verified', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'storage-production-format-finalizer', description: 'Secure storage production normalization failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});