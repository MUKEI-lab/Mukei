name: one-shot-storage-workspace-m1-android

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/storage-workspace-m1-android-trigger.txt

concurrency:
  group: storage-workspace-m1-android
  cancel-in-progress: true

permissions:
  contents: write
  statuses: write

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"pending","context":"storage-workspace-m1-android","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Validating Universal Storage M1 Android UI"}'
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Apply guarded Android bridge patch
        run: |
          set -euo pipefail
          python3 .github/scripts/patch_storage_workspace_m1_android.py 2>&1 | tee storage-workspace-m1-android.log
          git diff --check 2>&1 | tee -a storage-workspace-m1-android.log
      - name: Compile lint and assemble
        run: |
          set -o pipefail
          gradle -p android :app:compileDebugKotlin :app:lintDebug :app:assembleDebug --stacktrace 2>&1 | tee -a storage-workspace-m1-android.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-workspace-m1-android-${{ github.sha }}
          path: storage-workspace-m1-android.log
          retention-days: 7
      - name: Commit validated Android bridge
        if: success()
        run: |
          set -euo pipefail
          git config user.name 'mukei-storage-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt
          git commit -m 'Wire Android Universal Storage workspace commands'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"success","context":"storage-workspace-m1-android","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Universal Storage M1 Android UI validated"}'
      - name: Publish failure status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"failure","context":"storage-workspace-m1-android","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Universal Storage M1 Android UI failed validation"}'
