name: patch-kotlin-flush-barrier

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/patch-kotlin-flush-barrier.yml

permissions:
  contents: write
  statuses: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Publish pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'patch-kotlin-flush-barrier', description: 'Removing obsolete projection barrier', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Patch selective-port script
        shell: python
        run: |
          from pathlib import Path
          path = Path('scripts/port_kotlin_selected.sh')
          text = path.read_text(encoding='utf-8')
          marker = 'rm -f .github/workflows/kotlin-selective-port-audit.yml'
          patch = """python <<'PY'
          from pathlib import Path

          state_path = Path('rust/crates/mukei-core/src/application_runtime/foundation_state.rs')
          state = state_path.read_text(encoding='utf-8')
          state = state.replace(
              '    Barrier(tokio::sync::oneshot::Sender<()>),\n',
              '',
              1,
          )
          state = state.replace(
              '''                    PersistenceCommand::Barrier(acknowledgement) => {\n                        let _ = acknowledgement.send(());\n                    }\n''',
              '',
              1,
          )
          state_path.write_text(state, encoding='utf-8')
          PY

          """
          if 'Removing the obsolete Barrier variant' not in text:
              patch = '# Removing the obsolete Barrier variant after installing Flush.\n' + patch
              if marker not in text:
                  raise SystemExit('missing insertion marker')
              text = text.replace(marker, patch + marker, 1)
          path.write_text(text, encoding='utf-8')
      - name: Commit patched script
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add scripts/port_kotlin_selected.sh
          git rm .github/workflows/patch-kotlin-flush-barrier.yml
          git commit -m "fix(ci): remove obsolete projection barrier during Kotlin port"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'patch-kotlin-flush-barrier', description: 'Obsolete barrier removed from reconciliation', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'patch-kotlin-flush-barrier', description: 'Barrier reconciliation patch failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
