name: diagnostic-errors

on:
  push:
    branches: [ agent/diagnose-current-ci ]

permissions:
  contents: write

concurrency:
  group: diagnostic-errors-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/diagnose-current-ci
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Capture workspace test diagnostics
        working-directory: rust
        shell: bash
        run: |
          set +e
          cargo test --workspace --exclude mukei-bridge > /tmp/workspace-test.log 2>&1
          echo $? > /tmp/workspace-test.status
          exit 0
      - name: Capture workspace Clippy diagnostics
        working-directory: rust
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --all-targets --exclude mukei-bridge -- -D warnings > /tmp/workspace-clippy.log 2>&1
          echo $? > /tmp/workspace-clippy.status
          exit 0
      - name: Write bounded diagnostic report
        shell: bash
        run: |
          {
            echo 'WORKSPACE TEST EXIT:'
            cat /tmp/workspace-test.status
            echo
            echo '=== WORKSPACE TEST TAIL ==='
            tail -n 260 /tmp/workspace-test.log
            echo
            echo 'WORKSPACE CLIPPY EXIT:'
            cat /tmp/workspace-clippy.status
            echo
            echo '=== WORKSPACE CLIPPY TAIL ==='
            tail -n 260 /tmp/workspace-clippy.log
          } > ci-diagnostics.txt
      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-diagnostics.txt
          git commit -m "chore(ci): capture failing workspace diagnostics"
          git push origin HEAD:agent/diagnose-current-ci
