name: sandbox-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------
  # Architectural guardrails — these grep-style checks defend the four
  # invariants flagged in the v0.7.5 architecture audit. They MUST run
  # before any compile step so a regression fails fast and obviously.
  # ---------------------------------------------------------------------
  invariants:
    name: architectural invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: P0 — panic must remain unwind on every profile
        run: |
          # Strip comments first, THEN grep. The comment block in
          # rust/Cargo.toml explains *why* panic must stay unwind and
          # therefore legitimately contains the string `panic = "abort"`
          # as a tripwire reference — we must not fail on that.
          violation=$(sed 's/#.*$//' rust/Cargo.toml | grep -nE 'panic[[:space:]]*=[[:space:]]*"abort"' || true)
          if [ -n "$violation" ]; then
            echo "::error::panic = \"abort\" found in active config of rust/Cargo.toml — this disables std::panic::catch_unwind and defeats the entire FFI safety lattice (TRD §1.3 / PRD G1)."
            echo "$violation"
            exit 1
          fi

      - name: P0b — every shipped profile must explicitly pin panic = unwind
        run: |
          # Strip comments, then verify each profile we ship sets panic = unwind
          stripped=$(sed 's/#.*$//' rust/Cargo.toml)
          for profile in 'profile.release' 'profile.android-release' 'profile.dev'; do
            block=$(echo "$stripped" | awk -v p="[$profile]" '
              $0 ~ "^\\[" { in_block=($0==p); next }
              in_block { print }
            ')
            if ! echo "$block" | grep -qE 'panic[[:space:]]*=[[:space:]]*"unwind"' ; then
              echo "::error::[$profile] in rust/Cargo.toml is missing an explicit panic = \"unwind\" pin (TRD §1.3 / PRD G1)."
              exit 1
            fi
          done

      - name: P1 — agent loop must not hard-abort on tool block
        run: |
          if grep -n 'return Err(blocked' rust/crates/mukei-core/src/agent/loop_.rs ; then
            echo "::error::AgentLoop::run hard-aborts on tool block — REQ-AGT-04 mandates graceful degrade via supervisor directive."
            exit 1
          fi

      - name: P2 — exactly one CallbackGuard impl in the workspace
        run: |
          # Match `pub struct CallbackGuard` ONLY as a whole identifier
          # — i.e. followed by `(`, `{`, `<`, or whitespace. This
          # excludes legitimate opaque newtype wrappers like
          # `CallbackGuardHandle` which only carry a typed pointer back
          # into the canonical mukei_core::guard::Inner.
          shim_impl=$(grep -nE '^pub struct CallbackGuard($|[[:space:]]|[(<{])' rust/crates/mukei-ffi-shim/src/lib.rs || true)
          if [ -n "$shim_impl" ]; then
            echo "::error::mukei-ffi-shim re-declared CallbackGuard. The canonical impl in mukei_core::guard MUST be the only one."
            echo "$shim_impl"
            exit 1
          fi

      - name: P3 — SecretLeaked variant must not carry a String payload
        run: |
          if grep -nE 'SecretLeaked\(String\)' rust/crates/mukei-core/src/error.rs ; then
            echo "::error::SecretLeaked must carry redacted byte-length (usize), never raw plaintext."
            exit 1
          fi

      - name: P3b — Android release bridge builds must enable SQLCipher
        run: |
          # Any future Android/release build command that ships
          # mukei-bridge must include the fail-closed SQLCipher feature.
          # Plain SQLite is allowed only for non-release development
          # builds.
          hits=$(grep -RInE 'cargo[[:space:]]+build.*mukei-bridge.*(aarch64-linux-android|android-release)|(aarch64-linux-android|android-release).*cargo[[:space:]]+build.*mukei-bridge' \
            .github README.md SECURITY.md qml/README.md rust/README.md rust/docs 2>/dev/null \
            | grep -v '.github/workflows/sandbox-check.yml' || true)
          violations=$(echo "$hits" | grep -v 'sqlcipher' || true)
          if [ -n "$violations" ]; then
            echo "::error::Android/release bridge build command missing --features sqlcipher:"
            echo "$violations"
            exit 1
          fi

      - name: P4 — tool execution policy default threshold must be at least 5
        run: |
          # The legacy default of 2 was too brittle for transient errors.
          # The audit set the floor at 5; CI defends against accidental
          # regressions back to a tighter default.
          line=$(grep -E 'pub const DEFAULT_MAX_FAILURES: u32' rust/crates/mukei-core/src/agent/tools/policy.rs | head -1)
          val=$(echo "$line" | grep -oE '[0-9]+' | head -1)
          if [ -z "$val" ] || [ "$val" -lt 5 ]; then
            echo "::error::ToolExecutionPolicy::DEFAULT_MAX_FAILURES is '$val' — must be ≥ 5 per the v0.7.5 audit recommendation."
            exit 1
          fi

      - name: P5 — DuckDuckGo is permanently removed from the search architecture
        run: |
          # Migration document §2: DDG is gone from production. CI
          # blocks any reintroduction — file, type variant, or runtime
          # selector entry.
          if find rust/crates/mukei-core/src/search -name 'ddg*.rs' -o -name 'duck*.rs' | grep -q . ; then
            echo "::error::DDG file present under search/. Migration §2 forbids reintroduction."
            exit 1
          fi
          if grep -REn 'SearchEngineKind::(Ddg|Duck|DuckDuckGo)' rust/crates/mukei-core/src/ ; then
            echo "::error::SearchEngineKind variant for DDG detected. Migration §2 forbids reintroduction."
            exit 1
          fi

      - name: P7 — every untrusted <external_data> interpolation must be sentinel-escaped
        run: |
          # Issue #1: untrusted strings interpolated into
          # <external_data> wrappers MUST flow through
          # crate::tools::sentinel::escape_untrusted, otherwise a
          # hostile web page / RAG snippet can forge a closing tag and
          # impersonate a trust="trusted" block.
          #
          # The four production interpolation sites are:
          #   tools/web_search.rs
          #   tools/file_tool.rs
          #   agent/context.rs       (RAG block)
          #   agent/tools/feedback.rs
          # Every one of them must `use crate::tools::sentinel::escape_untrusted;`.
          missing=$(for f in \
            rust/crates/mukei-core/src/tools/web_search.rs \
            rust/crates/mukei-core/src/tools/file_tool.rs \
            rust/crates/mukei-core/src/agent/context.rs \
            rust/crates/mukei-core/src/agent/tools/feedback.rs ; do
            if ! grep -q 'tools::sentinel::escape_untrusted' "$f" ; then
              echo "$f"
            fi
          done)
          if [ -n "$missing" ]; then
            echo "::error::Untrusted <external_data> interpolation site is missing escape_untrusted import (Issue #1):"
            echo "$missing"
            exit 1
          fi

      - name: P8 — agent loop must not propagate ? from validator/parse paths
        run: |
          # Issue #10: parse / validation errors must be converted to
          # structured `tool_error` envelopes, not propagated via `?`
          # to abort the whole turn.
          violation=$(grep -nE 'parse_gbnf_output\(&assistant_text\)\?|validate_tool_calls\([a-z_]+\)\?' rust/crates/mukei-core/src/agent/loop_.rs || true)
          if [ -n "$violation" ]; then
            echo "::error::AgentLoop::run hard-aborts on parse/validate failure — REQ-AGT-04 mandates graceful degrade via structured envelope (Issue #10)."
            echo "$violation"
            exit 1
          fi

      - name: P9 — duplicate MAX_FAILURES_PER_TOOL constant must stay deleted
        run: |
          # Issue #18: two `MAX_FAILURES_PER_TOOL` constants with
          # DIFFERENT VALUES existed in the codebase. The one under
          # `crate::tools` (stale value `2`) was removed. CI defends
          # against accidental reintroduction.
          if grep -nE '^[[:space:]]*pub const MAX_FAILURES_PER_TOOL' rust/crates/mukei-core/src/tools/mod.rs ; then
            echo "::error::tools/mod.rs reintroduced the duplicate MAX_FAILURES_PER_TOOL constant — Issue #18. Use ToolExecutionPolicy::max_failures_per_tool."
            exit 1
          fi

      - name: P10 — PermissionMatrix must cover every ALLOWED_TOOLS entry
        run: |
          # Issue scaffold (user priority #4): the permission matrix is
          # the authoritative declaration of what each tool can do. Any
          # new tool added to ALLOWED_TOOLS must also gain a row in the
          # default matrix; the unit test enforces this, but CI fails
          # fast on the structural mismatch even if tests are skipped.
          if [ ! -f rust/crates/mukei-core/src/tools/permission.rs ]; then
            echo "::error::PermissionMatrix scaffold file is missing."
            exit 1
          fi

      - name: P6 — every FailureKind variant must have a remediation hint
        run: |
          # Each variant's hint is what the LLM sees on failure. A blank
          # hint defeats the structured-feedback design (REQ-AGT-04).
          missing=$(awk '
            /pub fn remediation_hint/ { in_fn=1; next }
            in_fn && /^}/ { in_fn=0 }
            in_fn && /=>/ {
              # Capture the right-hand side; if it is the empty string
              # literal we flag this variant.
              if ($0 ~ /=>[[:space:]]*""/) print NR": "$0
            }
          ' rust/crates/mukei-core/src/agent/tools/policy.rs)
          if [ -n "$missing" ]; then
            echo "::error::FailureKind::remediation_hint has blank arms:"
            echo "$missing"
            exit 1
          fi

  # ---------------------------------------------------------------------
  # The sandbox-buildable feature set — no Qt, no llama.cpp, no candle.
  # This mirrors what every contributor can run locally before pushing.
  # ---------------------------------------------------------------------
  test:
    name: cargo test (sandbox features)
    runs-on: ubuntu-latest
    needs: invariants
    steps:
      - uses: actions/checkout@v5
        with:
          # llama.cpp is shipped as a submodule under
          # rust/llama-cpp-prebuilt/vendor/llama.cpp. We do NOT need it to
          # run the sandbox-feature test suite (the bridge build is
          # gated by feature = "llama_cpp"), but checking it out makes
          # any future llama-aware test trivial to enable.
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: cargo test mukei-core (unit + integration)
        working-directory: rust
        run: cargo test -p mukei-core --no-default-features --features "std,tokio"

      - name: cargo test mukei-ffi-shim
        working-directory: rust
        env:
          CARGO_BUILD_JOBS: "1"
        run: cargo test -p mukei-ffi-shim --lib
