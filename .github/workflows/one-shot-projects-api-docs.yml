name: one-shot-projects-api-docs

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-projects-api-docs.yml'

permissions:
  contents: write
  statuses: write

jobs:
  fix-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'projects-api-docs', description: 'Fixing strict Project protocol docs gate', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.82.0'
      - name: Add public field documentation
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          p = Path('rust/crates/mukei-core/src/ui_protocol.rs')
          s = p.read_text(encoding='utf-8')
          old = '''pub struct ProjectCreatePayload {
    pub name: String,
    #[serde(default)]
    pub description: String,
}

/// Mutable project metadata payload.
#[derive(Clone, Debug, PartialEq, Eq, Serialize, Deserialize)]
pub struct ProjectUpdatePayload {
    pub project_id: String,
    pub name: String,
    #[serde(default)]
    pub description: String,
}

/// Payload containing one project identity.
#[derive(Clone, Debug, PartialEq, Eq, Serialize, Deserialize)]
pub struct ProjectPayload {
    pub project_id: String,
}
'''
          new = '''pub struct ProjectCreatePayload {
    /// User-visible project name, trimmed and bounded by protocol validation.
    pub name: String,
    /// Optional user-authored project description.
    #[serde(default)]
    pub description: String,
}

/// Mutable project metadata payload.
#[derive(Clone, Debug, PartialEq, Eq, Serialize, Deserialize)]
pub struct ProjectUpdatePayload {
    /// Stable project identity allocated by the native runtime.
    pub project_id: String,
    /// Replacement user-visible project name.
    pub name: String,
    /// Replacement optional project description.
    #[serde(default)]
    pub description: String,
}

/// Payload containing one project identity.
#[derive(Clone, Debug, PartialEq, Eq, Serialize, Deserialize)]
pub struct ProjectPayload {
    /// Stable project identity allocated by the native runtime.
    pub project_id: String,
}
'''
          if s.count(old) != 1:
              raise SystemExit(f'Project payload anchor count={s.count(old)}')
          p.write_text(s.replace(old, new, 1), encoding='utf-8')
          PY
          cargo fmt --manifest-path rust/Cargo.toml --all
          git diff --check
      - name: Enforce strict Rust gate
        shell: bash
        env:
          RUSTFLAGS: -D warnings
        run: |
          set -euo pipefail
          cargo check --manifest-path rust/Cargo.toml -p mukei-core --all-features
      - name: Commit strict-gate fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'mukei-projects-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add rust/crates/mukei-core/src/ui_protocol.rs
          git commit -m 'Document Project protocol payload fields'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'projects-api-docs', description: 'Strict Project protocol docs gate passed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'projects-api-docs', description: 'Project protocol docs gate failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
