name: one-shot-chat-branch-diagnostics-v2

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-chat-branch-diagnostics-v2.yml'

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'chat-branch-diagnostics', description: 'Mapping chat UI/runtime', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
      - name: Capture chat implementation map
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          {
            echo '=== ANDROID FILES ==='
            find android/app/src/main/kotlin/ai/mukei/android -type f -name '*.kt' | sort
            echo
            echo '=== CHAT REFERENCES ==='
            rg -n --glob '*.kt' 'chat\.send_message|recovery\.regenerate|ChatMessage|conversationId|branchId|Regenerate|Copy|clipboard|MessageBubble|message' android/app/src/main/kotlin/ai/mukei/android || true
            echo
            echo '=== RUST CHAT REFERENCES ==='
            rg -n 'ChatSendMessage|RecoveryRegenerate|remove_last_assistant|last_user_message|append_message|ConversationProjection|BranchId|parent' rust/crates/mukei-core/src/application_runtime rust/crates/mukei-core/src/ui_protocol.rs rust/crates/mukei-core/src/types/mod.rs || true
          } > diagnostics/chat-map.txt
          cat diagnostics/chat-map.txt
      - uses: actions/upload-artifact@v4
        with:
          name: chat-branch-diagnostics-${{ github.sha }}
          path: diagnostics/chat-map.txt
          if-no-files-found: error
          retention-days: 2
      - name: Publish success status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'chat-branch-diagnostics', description: 'Chat UI/runtime map captured', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
