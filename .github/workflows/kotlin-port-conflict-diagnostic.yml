name: Temporary Cargo lock remediation

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/kotlin-port-conflict-diagnostic.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temp-cargo-lock-remediation
  cancel-in-progress: false

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0

      - name: Verify isolated branch
        run: |
          test "$(git branch --show-current)" = "temp/universal-storage-workspace-v0.1"
          test "$(git rev-parse --abbrev-ref HEAD)" != "Kotlin"

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Resolve pinned wiremock dependency
        working-directory: rust
        run: cargo update -p wiremock --precise 0.6.4

      - name: Verify resolved storage test graph
        working-directory: rust
        run: >-
          cargo check -p mukei-core
          --no-default-features
          --features std,tokio,rusqlite
          --all-targets

      - name: Verify lock-only change
        run: |
          git diff --check
          changed="$(git diff --name-only)"
          if [ -z "$changed" ]; then
            echo "Cargo.lock already synchronized."
            exit 0
          fi
          test "$changed" = "rust/Cargo.lock"

      - name: Commit synchronized lockfile
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rust/Cargo.lock
          git commit -m "build(rust): synchronize pinned dependency lockfile"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
