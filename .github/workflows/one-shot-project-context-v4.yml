name: one-shot-project-context-v4

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-project-context-v4.yml'

permissions:
  contents: write
  statuses: write

jobs:
  wire-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'project-context-v4', description: 'Building isolated Project memory and instructions', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.82.0'
          components: rustfmt,clippy
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Execute corrected semantic patch
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import textwrap
          source=Path('.github/workflows/one-shot-project-context-v3.yml').read_text()
          start_marker="          python3 <<'PY'\n"
          end_marker="\n          PY\n"
          start=source.index(start_marker)+len(start_marker)
          end=source.index(end_marker,start)
          script=textwrap.dedent(source[start:end])
          old="edit('rust/crates/mukei-core/src/application_runtime/documents_snapshot.rs',patch_router)"
          new="edit('rust/crates/mukei-core/src/application_runtime/foundation_context.rs',patch_router)"
          if script.count(old) != 1:
              raise SystemExit(f'router target count={script.count(old)}')
          script=script.replace(old,new,1)
          exec(compile(script,'project-context-semantic-patch','exec'),{'__name__':'__main__'})
          PY
          cargo fmt --manifest-path rust/Cargo.toml --all
          git diff --check
      - name: Strict Rust checks and isolation tests
        shell: bash
        env:
          RUSTFLAGS: -D warnings
        run: |
          set -euo pipefail
          cargo check --manifest-path rust/Cargo.toml -p mukei-core --all-features
          cargo test --manifest-path rust/Cargo.toml -p mukei-core project_context_tests --all-features
      - name: Compile Android Project UI
        shell: bash
        run: gradle -p android :app:compileDebugKotlin --stacktrace
      - name: Commit Project context feature
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'mukei-project-context-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add rust/crates/mukei-core/src/ui_protocol.rs rust/crates/mukei-core/src/application_runtime/foundation_state.rs rust/crates/mukei-core/src/application_runtime/base.rs rust/crates/mukei-core/src/application_runtime/foundation_context.rs android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt android/app/src/main/kotlin/ai/mukei/android/ProjectsSurface.kt
          git commit -m 'Wire Project instructions and isolated memory'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'project-context-v4', description: 'Project memory/instructions gates passed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'project-context-v4', description: 'Project memory/instructions gate failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
