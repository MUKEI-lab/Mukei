name: one-shot-build-signed-apk

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/signed-apk-build-trigger.txt

permissions:
  contents: read
  statuses: write

jobs:
  build-sign:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"pending","context":"signed-apk-build","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Building and signing ARM64 offline APK"}'

      - name: Checkout exact source candidate
        uses: actions/checkout@v4
        with:
          ref: 85fc66d72216de7678b1745a09e98d5126d50c88
          fetch-depth: 1

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 9.4.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Build offline APKs
        run: |
          set -euo pipefail
          gradle -p android :app:assembleOffline --stacktrace 2>&1 | tee signed-apk-build.log

      - name: Locate Android signing tools and ARM64 APK
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          BUILD_TOOLS="$(find "$SDK_ROOT/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          test -x "$BUILD_TOOLS/apksigner"
          test -x "$BUILD_TOOLS/zipalign"
          echo "APKSIGNER=$BUILD_TOOLS/apksigner" >> "$GITHUB_ENV"
          echo "ZIPALIGN=$BUILD_TOOLS/zipalign" >> "$GITHUB_ENV"

          APK="$(find android/app/build/outputs/apk -type f -name '*arm64-v8a*offline*unsigned*.apk' | head -n 1)"
          if [ -z "$APK" ]; then
            echo "ARM64 offline unsigned APK not found" >&2
            find android/app/build/outputs/apk -type f -name '*.apk' -print || true
            exit 1
          fi
          echo "UNSIGNED_APK=$APK" >> "$GITHUB_ENV"

      - name: Generate disposable CI test signing key
        run: |
          set -euo pipefail
          keytool -genkeypair \
            -keystore mukei-ci-test.keystore \
            -storepass mukei-ci-test-pass \
            -keypass mukei-ci-test-pass \
            -alias mukei-ci-test \
            -keyalg RSA \
            -keysize 3072 \
            -validity 3650 \
            -dname 'CN=Mukei CI Test,O=MUKEI-lab Test Build,C=US'

      - name: Align sign and verify APK
        run: |
          set -euo pipefail
          mkdir -p signed-apk
          "$ZIPALIGN" -f -p 4 "$UNSIGNED_APK" signed-apk/mukei-arm64-offline-aligned.apk
          "$APKSIGNER" sign \
            --ks mukei-ci-test.keystore \
            --ks-key-alias mukei-ci-test \
            --ks-pass pass:mukei-ci-test-pass \
            --key-pass pass:mukei-ci-test-pass \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out signed-apk/mukei-arm64-offline-test-signed.apk \
            signed-apk/mukei-arm64-offline-aligned.apk
          "$APKSIGNER" verify \
            --verbose \
            --print-certs \
            --min-sdk-version 26 \
            signed-apk/mukei-arm64-offline-test-signed.apk \
            | tee signed-apk/APKSIGNER-VERIFY.txt
          sha256sum signed-apk/mukei-arm64-offline-test-signed.apk | tee signed-apk/SHA256SUMS
          cat > signed-apk/SOURCE.txt <<'EOF'
          Source branch: temp/universal-storage-workspace-v0.1
          Source commit: 85fc66d72216de7678b1745a09e98d5126d50c88
          Variant: offline, arm64-v8a
          Signing identity: disposable CI test key; not production/Play Store signing identity
          EOF

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: mukei-arm64-offline-test-signed-85fc66d72216de7678b1745a09e98d5126d50c88
          path: |
            signed-apk/mukei-arm64-offline-test-signed.apk
            signed-apk/mukei-arm64-offline-test-signed.apk.idsig
            signed-apk/APKSIGNER-VERIFY.txt
            signed-apk/SHA256SUMS
            signed-apk/SOURCE.txt
            signed-apk-build.log
          retention-days: 7

      - name: Publish success status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"success","context":"signed-apk-build","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Signed ARM64 offline APK verified"}'

      - name: Publish failure status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"failure","context":"signed-apk-build","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Signed APK build failed"}'
