name: one-shot-project-context

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-project-context.yml'

permissions:
  contents: write
  statuses: write

jobs:
  wire-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'project-context-wire', description: 'Wiring isolated Project memory and instructions', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.82.0'
          components: rustfmt,clippy
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Wire Project context protocol and Android bridge
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              s = p.read_text(encoding='utf-8')
              count = s.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected anchor once, found {count}: {old[:100]!r}')
              p.write_text(s.replace(old, new, 1), encoding='utf-8')

          # Backward-compatible encrypted Project projection fields.
          replace_once(
              'rust/crates/mukei-core/src/application_runtime/foundation_state.rs',
              '''#[derive(Clone, Debug, Serialize, Deserialize)]
          struct ProjectProjection {
              project_id: String,
              name: String,
              description: String,
              status: ProjectStatus,
              created_at: DateTime<Utc>,
              updated_at: DateTime<Utc>,
          }
          ''',
              '''#[derive(Clone, Debug, Serialize, Deserialize)]
          struct ProjectMemoryEntry {
              memory_id: String,
              content: String,
              created_at: DateTime<Utc>,
              updated_at: DateTime<Utc>,
          }

          #[derive(Clone, Debug, Serialize, Deserialize)]
          struct ProjectProjection {
              project_id: String,
              name: String,
              description: String,
              #[serde(default)]
              instructions: String,
              #[serde(default)]
              memory: Vec<ProjectMemoryEntry>,
              status: ProjectStatus,
              created_at: DateTime<Utc>,
              updated_at: DateTime<Utc>,
          }
          ''',
          )

          # Protocol minor generation.
          replace_once(
              'rust/crates/mukei-core/src/ui_protocol.rs',
              'pub const PROTOCOL_MINOR: u16 = 2;',
              'pub const PROTOCOL_MINOR: u16 = 3;',
          )

          replace_once(
              'rust/crates/mukei-core/src/ui_protocol.rs',
              '''    /// Archive a project without deleting its durable identity.
              ProjectArchive,
              /// Persist one product setting.
          ''',
              '''    /// Archive a project without deleting its durable identity.
              ProjectArchive,
              /// Replace the persistent instructions owned by one active project.
              ProjectInstructionsUpdate,
              /// Add one isolated memory entry to an active project.
              ProjectMemoryAdd,
              /// Update one isolated memory entry inside its owning project.
              ProjectMemoryUpdate,
              /// Delete one isolated memory entry inside its owning project.
              ProjectMemoryDelete,
              /// Persist one product setting.
          ''',
          )

          replace_once(
              'rust/crates/mukei-core/src/ui_protocol.rs',
              '''            "project.archive" => Some(Self::ProjectArchive),
              "settings.update" => Some(Self::SettingsUpdate),
          ''',
              '''            "project.archive" => Some(Self::ProjectArchive),
              "project.instructions.update" => Some(Self::ProjectInstructionsUpdate),
              "project.memory.add" => Some(Self::ProjectMemoryAdd),
              "project.memory.update" => Some(Self::ProjectMemoryUpdate),
              "project.memory.delete" => Some(Self::ProjectMemoryDelete),
              "settings.update" => Some(Self::SettingsUpdate),
          ''',
          )

          replace_once(
              'rust/crates/mukei-core/src/ui_protocol.rs',
              '''            Self::ProjectArchive => "project.archive",
              Self::SettingsUpdate => "settings.update",
          ''',
              '''            Self::ProjectArchive => "project.archive",
              Self::ProjectInstructionsUpdate => "project.instructions.update",
              Self::ProjectMemoryAdd => "project.memory.add",
              Self::ProjectMemoryUpdate => "project.memory.update",
              Self::ProjectMemoryDelete => "project.memory.delete",
              Self::SettingsUpdate => "settings.update",
          ''',
          )

          replace_once(
              'rust/crates/mukei-core/src/ui_protocol.rs',
              '''                | Self::ProjectArchive
              | Self::RecoveryResume
          ''',
              '''                | Self::ProjectArchive
              | Self::ProjectInstructionsUpdate
              | Self::ProjectMemoryAdd
              | Self::ProjectMemoryUpdate
              | Self::ProjectMemoryDelete
              | Self::RecoveryResume
          ''',
          )

          replace_once(
              'rust/crates/mukei-core/src/ui_protocol.rs',
              '''/// Product setting mutation payload.
          #[derive(Clone, Debug, PartialEq, Serialize, Deserialize)]
          pub struct SettingUpdatePayload {
          ''',
              '''/// Persistent instructions owned by one project.
          #[derive(Clone, Debug, PartialEq, Eq, Serialize, Deserialize)]
          pub struct ProjectInstructionsPayload {
              /// Stable project identity allocated by the native runtime.
              pub project_id: String,
              /// Replacement instructions. Empty content explicitly clears instructions.
              pub instructions: String,
          }

          /// New isolated memory entry owned by one project.
          #[derive(Clone, Debug, PartialEq, Eq, Serialize, Deserialize)]
          pub struct ProjectMemoryCreatePayload {
              /// Stable project identity that owns the memory entry.
              pub project_id: String,
              /// User-authored memory content.
              pub content: String,
          }

          /// Mutable isolated project-memory payload.
          #[derive(Clone, Debug, PartialEq, Eq, Serialize, Deserialize)]
          pub struct ProjectMemoryUpdatePayload {
              /// Stable project identity that owns the memory entry.
              pub project_id: String,
              /// Stable memory identity allocated inside the owning project.
              pub memory_id: String,
              /// Replacement user-authored memory content.
              pub content: String,
          }

          /// Identity pair for one memory entry inside one project.
          #[derive(Clone, Debug, PartialEq, Eq, Serialize, Deserialize)]
          pub struct ProjectMemoryPayload {
              /// Stable project identity that owns the memory entry.
              pub project_id: String,
              /// Stable memory identity that must resolve inside that project only.
              pub memory_id: String,
          }

          /// Product setting mutation payload.
          #[derive(Clone, Debug, PartialEq, Serialize, Deserialize)]
          pub struct SettingUpdatePayload {
          ''',
          )

          replace_once(
              'rust/crates/mukei-core/src/ui_protocol.rs',
              '''    /// Existing project identity.
              Project(ProjectPayload),
              /// Setting mutation.
          ''',
              '''    /// Existing project identity.
              Project(ProjectPayload),
              /// Replacement project instructions.
              ProjectInstructions(ProjectInstructionsPayload),
              /// New project-memory content.
              ProjectMemoryCreate(ProjectMemoryCreatePayload),
              /// Updated project-memory content.
              ProjectMemoryUpdate(ProjectMemoryUpdatePayload),
              /// Existing project-memory identity pair.
              ProjectMemory(ProjectMemoryPayload),
              /// Setting mutation.
          ''',
          )

          replace_once(
              'rust/crates/mukei-core/src/ui_protocol.rs',
              '''            | CommandType::ProjectCreate
              | CommandType::ProjectUpdate
              | CommandType::ProjectArchive
              | CommandType::SettingsUpdate,
          ''',
              '''            | CommandType::ProjectCreate
              | CommandType::ProjectUpdate
              | CommandType::ProjectArchive
              | CommandType::ProjectInstructionsUpdate
              | CommandType::ProjectMemoryAdd
              | CommandType::ProjectMemoryUpdate
              | CommandType::ProjectMemoryDelete
              | CommandType::SettingsUpdate,
          ''',
          )

          replace_once(
              'rust/crates/mukei-core/src/ui_protocol.rs',
              '''        CommandType::ProjectArchive => {
              let value: ProjectPayload = serde_json::from_value(envelope.payload.clone())
                  .map_err(|_| RejectionReason::InvalidPayload)?;
              if !valid_protocol_id(&value.project_id, MAX_PROTOCOL_ID_LEN) {
                  return Err(RejectionReason::InvalidPayload);
              }
              ValidatedCommandPayload::Project(value)
          }
          CommandType::SettingsUpdate => {
          ''',
              '''        CommandType::ProjectArchive => {
              let value: ProjectPayload = serde_json::from_value(envelope.payload.clone())
                  .map_err(|_| RejectionReason::InvalidPayload)?;
              if !valid_protocol_id(&value.project_id, MAX_PROTOCOL_ID_LEN) {
                  return Err(RejectionReason::InvalidPayload);
              }
              ValidatedCommandPayload::Project(value)
          }
          CommandType::ProjectInstructionsUpdate => {
              let value: ProjectInstructionsPayload = serde_json::from_value(envelope.payload.clone())
                  .map_err(|_| RejectionReason::InvalidPayload)?;
              if !valid_protocol_id(&value.project_id, MAX_PROTOCOL_ID_LEN)
                  || value.instructions.len() > 4 * 1024
                  || value.instructions.chars().any(|character| character == '\0')
              {
                  return Err(RejectionReason::InvalidPayload);
              }
              ValidatedCommandPayload::ProjectInstructions(value)
          }
          CommandType::ProjectMemoryAdd => {
              let value: ProjectMemoryCreatePayload = serde_json::from_value(envelope.payload.clone())
                  .map_err(|_| RejectionReason::InvalidPayload)?;
              if !valid_protocol_id(&value.project_id, MAX_PROTOCOL_ID_LEN)
                  || !non_empty_bounded(&value.content, 1024)
                  || value.content.chars().any(|character| character == '\0')
              {
                  return Err(RejectionReason::InvalidPayload);
              }
              ValidatedCommandPayload::ProjectMemoryCreate(value)
          }
          CommandType::ProjectMemoryUpdate => {
              let value: ProjectMemoryUpdatePayload = serde_json::from_value(envelope.payload.clone())
                  .map_err(|_| RejectionReason::InvalidPayload)?;
              if !valid_protocol_id(&value.project_id, MAX_PROTOCOL_ID_LEN)
                  || !valid_protocol_id(&value.memory_id, MAX_PROTOCOL_ID_LEN)
                  || !non_empty_bounded(&value.content, 1024)
                  || value.content.chars().any(|character| character == '\0')
              {
                  return Err(RejectionReason::InvalidPayload);
              }
              ValidatedCommandPayload::ProjectMemoryUpdate(value)
          }
          CommandType::ProjectMemoryDelete => {
              let value: ProjectMemoryPayload = serde_json::from_value(envelope.payload.clone())
                  .map_err(|_| RejectionReason::InvalidPayload)?;
              if !valid_protocol_id(&value.project_id, MAX_PROTOCOL_ID_LEN)
                  || !valid_protocol_id(&value.memory_id, MAX_PROTOCOL_ID_LEN)
              {
                  return Err(RejectionReason::InvalidPayload);
              }
              ValidatedCommandPayload::ProjectMemory(value)
          }
          CommandType::SettingsUpdate => {
          ''',
          )

          # Advertise and dispatch the new commands.
          replace_once(
              'rust/crates/mukei-core/src/application_runtime/base.rs',
              '''            CommandType::ProjectArchive,
              CommandType::SettingsUpdate,
          ''',
              '''            CommandType::ProjectArchive,
              CommandType::ProjectInstructionsUpdate,
              CommandType::ProjectMemoryAdd,
              CommandType::ProjectMemoryUpdate,
              CommandType::ProjectMemoryDelete,
              CommandType::SettingsUpdate,
          ''',
          )

          replace_once(
              'rust/crates/mukei-core/src/application_runtime/documents_snapshot.rs',
              '''            CommandType::ProjectArchive => runtime.archive_project(command),
              CommandType::SettingsUpdate => runtime.update_setting(command),
          ''',
              '''            CommandType::ProjectArchive => runtime.archive_project(command),
              CommandType::ProjectInstructionsUpdate => runtime.update_project_instructions(command),
              CommandType::ProjectMemoryAdd => runtime.add_project_memory(command),
              CommandType::ProjectMemoryUpdate => runtime.update_project_memory(command),
              CommandType::ProjectMemoryDelete => runtime.delete_project_memory(command),
              CommandType::SettingsUpdate => runtime.update_setting(command),
          ''',
          )

          # Android bridge commands use Protocol 2.3.
          replace_once(
              'android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt',
              '''fun archiveProject(projectId: String): ProjectCommandSubmission = submitProjectCommand(
              commandType = "project.archive",
              payload = JSONObject().put("project_id", projectId),
          )

          private fun submitProjectCommand(
          ''',
              '''fun archiveProject(projectId: String): ProjectCommandSubmission = submitProjectCommand(
              commandType = "project.archive",
              payload = JSONObject().put("project_id", projectId),
          )

          fun updateProjectInstructions(
              projectId: String,
              instructions: String,
          ): ProjectCommandSubmission = submitProjectCommand(
              commandType = "project.instructions.update",
              payload = JSONObject()
                  .put("project_id", projectId)
                  .put("instructions", instructions),
          )

          fun addProjectMemory(
              projectId: String,
              content: String,
          ): ProjectCommandSubmission = submitProjectCommand(
              commandType = "project.memory.add",
              payload = JSONObject()
                  .put("project_id", projectId)
                  .put("content", content),
          )

          fun updateProjectMemory(
              projectId: String,
              memoryId: String,
              content: String,
          ): ProjectCommandSubmission = submitProjectCommand(
              commandType = "project.memory.update",
              payload = JSONObject()
                  .put("project_id", projectId)
                  .put("memory_id", memoryId)
                  .put("content", content),
          )

          fun deleteProjectMemory(
              projectId: String,
              memoryId: String,
          ): ProjectCommandSubmission = submitProjectCommand(
              commandType = "project.memory.delete",
              payload = JSONObject()
                  .put("project_id", projectId)
                  .put("memory_id", memoryId),
          )

          private fun submitProjectCommand(
          ''',
          )

          replace_once(
              'android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt',
              '.put("protocol_version", JSONObject().put("major", 2).put("minor", 2))',
              '.put("protocol_version", JSONObject().put("major", 2).put("minor", 3))',
          )

          # Put the context editor in Project detail without changing Kotlin branch UI sources.
          replace_once(
              'android/app/src/main/kotlin/ai/mukei/android/ProjectsSurface.kt',
              '''            }

              banner?.let { message ->
          ''',
              '''            }

              Spacer(Modifier.height(MukeiSpacing.Medium))
              ProjectContextSurface(
                  projectId = project.projectId,
                  readOnly = project.state == ProjectState.ARCHIVED,
              )

              banner?.let { message ->
          ''',
          )
          PY

          cargo fmt --manifest-path rust/Cargo.toml --all
          git diff --check
      - name: Strict Rust checks and Project isolation tests
        shell: bash
        env:
          RUSTFLAGS: -D warnings
        run: |
          set -euo pipefail
          cargo check --manifest-path rust/Cargo.toml -p mukei-core --all-features
          cargo test --manifest-path rust/Cargo.toml -p mukei-core project_context_tests --all-features
      - name: Compile Android Project UI
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android :app:compileDebugKotlin --stacktrace
      - name: Commit Project context feature
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'mukei-project-context-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            rust/crates/mukei-core/src/ui_protocol.rs \
            rust/crates/mukei-core/src/application_runtime/foundation_state.rs \
            rust/crates/mukei-core/src/application_runtime/base.rs \
            rust/crates/mukei-core/src/application_runtime/documents_snapshot.rs \
            android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt \
            android/app/src/main/kotlin/ai/mukei/android/ProjectsSurface.kt
          git commit -m 'Add isolated Project memory and instructions'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'project-context-wire', description: 'Project memory/instructions wiring passed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'project-context-wire', description: 'Project memory/instructions wiring failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
