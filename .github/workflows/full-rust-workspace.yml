name: full-rust-workspace

on:
  push:
    branches:
      - main
      - Kotlin
      - temp/universal-storage-workspace-v0.1
    paths:
      - "rust/**"
      - "rust-toolchain.toml"
      - ".github/workflows/full-rust-workspace.yml"
  pull_request:
    branches: [ main, Kotlin ]
    paths:
      - "rust/**"
      - "rust-toolchain.toml"
      - ".github/workflows/full-rust-workspace.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: full-rust-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: never
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  pending-status:
    name: publish pending full Rust status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'full-rust-workspace',
              description: 'Full Rust workspace validation is running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

  workspace-quality:
    name: workspace check, test, clippy, fmt
    needs: pending-status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.86 with quality components
        uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: rustfmt,clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Check formatting
        working-directory: rust
        run: cargo fmt --all -- --check
      - name: Check workspace
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo check --locked --workspace --all-targets 2>&1 | tee ../workspace-check.log
      - name: Test workspace
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo test --locked --workspace --all-targets 2>&1 | tee ../workspace-test.log
      - name: Clippy workspace
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --locked --workspace --all-targets -- -D warnings 2>&1 | tee ../workspace-clippy.log
      - name: Upload workspace diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-rust-workspace-${{ github.sha }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            workspace-check.log
            workspace-test.log
            workspace-clippy.log

  core-feature-matrix:
    name: core features (${{ matrix.name }})
    needs: pending-status
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: storage
            features: std,tokio,rusqlite
          - name: network
            features: std,tokio,network
          - name: rag
            features: std,tokio,rusqlite,candle,usearch_hnsw
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Check feature tuple
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo check --locked -p mukei-core --no-default-features --features "${{ matrix.features }}" --all-targets 2>&1 | tee "../feature-${{ matrix.name }}.log"
      - name: Upload feature diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-rust-feature-${{ matrix.name }}-${{ github.sha }}
          if-no-files-found: ignore
          retention-days: 7
          path: feature-${{ matrix.name }}.log

  android-jni-contracts:
    name: Android JNI secure and RAG contracts
    needs: pending-status
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Test secure runtime boundary
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo test --locked -p mukei-android-jni --lib --no-default-features --features secure_runtime 2>&1 | tee ../jni-secure.log
      - name: Check production RAG composition
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo check --locked -p mukei-android-jni --no-default-features --features secure_runtime,rag_runtime,runtime_hardening 2>&1 | tee ../jni-rag.log
      - name: Upload JNI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-rust-jni-${{ github.sha }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            jni-secure.log
            jni-rag.log

  final-status:
    name: publish final full Rust status
    if: always()
    needs:
      - workspace-quality
      - core-feature-matrix
      - android-jni-contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          WORKSPACE_RESULT: ${{ needs.workspace-quality.result }}
          MATRIX_RESULT: ${{ needs.core-feature-matrix.result }}
          JNI_RESULT: ${{ needs.android-jni-contracts.result }}
        with:
          script: |
            const results = [process.env.WORKSPACE_RESULT, process.env.MATRIX_RESULT, process.env.JNI_RESULT];
            const success = results.every(result => result === 'success');
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: 'full-rust-workspace',
              description: success ? 'Full Rust workspace validation passed' : 'Full Rust workspace validation failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
            if (!success) core.setFailed(`Full Rust validation failed: ${results.join(', ')}`);
