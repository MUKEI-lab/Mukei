name: full-rust-workspace

on:
  push:
    branches:
      - main
      - Kotlin
      - temp/universal-storage-workspace-v0.1
    paths:
      - "rust/**"
      - "rust-toolchain.toml"
      - ".github/workflows/full-rust-workspace.yml"
  pull_request:
    branches: [ main, Kotlin ]
    paths:
      - "rust/**"
      - "rust-toolchain.toml"
      - ".github/workflows/full-rust-workspace.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-rust-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  workspace-quality:
    name: workspace check, test, clippy, fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.86 with quality components
        uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: rustfmt,clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Check formatting
        working-directory: rust
        run: cargo fmt --all -- --check
      - name: Check workspace
        working-directory: rust
        run: cargo check --workspace --all-targets
      - name: Test workspace
        working-directory: rust
        run: cargo test --workspace --all-targets
      - name: Clippy workspace
        working-directory: rust
        run: cargo clippy --workspace --all-targets -- -D warnings

  core-feature-matrix:
    name: core features (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: storage
            features: std,tokio,rusqlite
          - name: network
            features: std,tokio,network
          - name: rag
            features: std,tokio,rusqlite,candle,usearch_hnsw
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Check feature tuple
        working-directory: rust
        run: cargo check -p mukei-core --no-default-features --features "${{ matrix.features }}" --all-targets

  android-jni-contracts:
    name: Android JNI secure and RAG contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Test secure runtime boundary
        working-directory: rust
        run: >-
          cargo test -p mukei-android-jni --lib
          --no-default-features
          --features secure_runtime,runtime_hardening
      - name: Check production RAG composition
        working-directory: rust
        run: >-
          cargo check -p mukei-android-jni
          --no-default-features
          --features secure_runtime,rag_runtime,runtime_hardening
