name: full-rust-workspace

on:
  push:
    branches: [ main, "agent/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  workspace-check:
    name: cargo check (workspace, non-Qt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-workspace-check-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-workspace-check-
      - name: cargo check --workspace --exclude mukei-bridge
        working-directory: rust
        run: cargo check --workspace --exclude mukei-bridge

  workspace-test:
    name: cargo test (workspace, non-Qt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-workspace-test-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-workspace-test-
      - name: cargo test --workspace --exclude mukei-bridge
        working-directory: rust
        run: cargo test --workspace --exclude mukei-bridge

  workspace-clippy:
    name: cargo clippy (workspace, non-Qt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-workspace-clippy-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-workspace-clippy-
      - name: cargo clippy --workspace --all-targets --exclude mukei-bridge
        working-directory: rust
        run: cargo clippy --workspace --all-targets --exclude mukei-bridge -- -D warnings

  core-feature-checks:
    name: core feature check (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - features: tokio,rusqlite
            cache_key: tokio-rusqlite
          - features: tokio,network
            cache_key: tokio-network
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-core-features-${{ matrix.cache_key }}-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-core-features-${{ matrix.cache_key }}-
      - name: cargo check -p mukei-core --features ${{ matrix.features }}
        working-directory: rust
        run: cargo check -p mukei-core --no-default-features --features ${{ matrix.features }}

  ffi-shim:
    name: ffi shim proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-ffi-shim-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ffi-shim-
      - name: cargo check -p mukei-ffi-shim
        working-directory: rust
        run: cargo check -p mukei-ffi-shim
      - name: cargo test -p mukei-ffi-shim
        working-directory: rust
        run: cargo test -p mukei-ffi-shim

  diagnostic-capture:
    name: capture remaining CI diagnostics
    if: github.head_ref == 'agent/diagnose-current-ci'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/diagnose-current-ci
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Capture compact failures
        working-directory: rust
        shell: bash
        run: |
          set +e
          cargo clippy --quiet -p mukei-core --no-default-features --features std,tokio --lib --tests -- -D warnings > ../core-clippy-current.log 2>&1
          echo "exit_status=$?" >> ../core-clippy-current.log
          cargo clippy --quiet --workspace --all-targets --exclude mukei-bridge -- -D warnings > ../workspace-clippy-current.log 2>&1
          echo "exit_status=$?" >> ../workspace-clippy-current.log
          cargo test --quiet --workspace --exclude mukei-bridge > ../workspace-test-current.log 2>&1
          echo "exit_status=$?" >> ../workspace-test-current.log
          exit 0
      - name: Commit diagnostic logs
        shell: bash
        run: |
          cp core-clippy-current.log /tmp/core-clippy-current.log
          cp workspace-clippy-current.log /tmp/workspace-clippy-current.log
          cp workspace-test-current.log /tmp/workspace-test-current.log
          git fetch origin agent/diagnose-current-ci
          git reset --hard origin/agent/diagnose-current-ci
          cp /tmp/core-clippy-current.log .
          cp /tmp/workspace-clippy-current.log .
          cp /tmp/workspace-test-current.log .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f core-clippy-current.log workspace-clippy-current.log workspace-test-current.log
          git commit -m "chore(ci): capture exact remaining failures"
          git push origin HEAD:agent/diagnose-current-ci
