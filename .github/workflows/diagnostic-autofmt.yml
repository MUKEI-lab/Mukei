name: diagnostic-autofmt

on:
  push:
    branches: [ agent/diagnose-current-ci ]

permissions:
  contents: write

concurrency:
  group: diagnostic-autofmt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/diagnose-current-ci
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply canonical Rust formatting
        working-directory: rust
        run: cargo fmt --all
      - name: Commit formatter output
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rust
          git commit -m "style(rust): apply canonical cargo fmt output"
          git push origin HEAD:agent/diagnose-current-ci
