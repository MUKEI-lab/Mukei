name: storage-quality-finalize-v2

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-quality-finalize-v2.yml
  workflow_dispatch:

concurrency:
  group: storage-quality-finalize-v2
  cancel-in-progress: false

permissions:
  contents: write
  statuses: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  patch-verify-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Install Rust 1.82 with Clippy
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy
      - name: Apply corrected quality fixes
        id: patch
        shell: python
        run: |
          from pathlib import Path
          import os
          import re
          import traceback

          logs = Path('ci-storage-finalize-v2-logs')
          logs.mkdir(exist_ok=True)
          files = []

          def save(path, old, new):
              if old != new:
                  path.write_text(new, encoding='utf-8')
                  files.append(str(path))

          def block(*values):
              return '\n'.join(values)

          try:
              p = Path('rust/crates/mukei-core/src/storage/object_store.rs')
              old = p.read_text(encoding='utf-8')
              new = old.replace(
                  '            self.verify_existing(&final_path, &digest, plaintext_size)?;',
                  '            self.verify_existing(&final_path, &digest, plaintext_size)\n'
                  '                .map_err(|_| ObjectStoreError::CorruptDeduplicatedObject)?;',
                  1,
              )
              if 'self.verify_existing(&final_path, &digest, plaintext_size)?;' in new:
                  raise RuntimeError('object-store marker unresolved')
              save(p, old, new)

              p = Path('rust/crates/mukei-core/src/application_runtime/foundation_types.rs')
              old = p.read_text(encoding='utf-8')
              new = old.replace(
                  'sync_channel, Receiver, RecvTimeoutError, SyncSender, TryRecvError, TrySendError,',
                  'sync_channel, Receiver, SyncSender, TryRecvError, TrySendError,',
                  1,
              )
              first_old = block(
                  '            let first = if timeout.is_zero() {',
                  '                match receiver.try_recv() {',
                  '                    Ok(event) => Some(event),',
                  '                    Err(TryRecvError::Empty | TryRecvError::Disconnected) => None,',
                  '                }',
                  '            } else {',
                  '                match receiver.recv_timeout(timeout) {',
                  '                    Ok(event) => Some(event),',
                  '                    Err(RecvTimeoutError::Timeout | RecvTimeoutError::Disconnected) => None,',
                  '                }',
                  '            };',
              )
              first_new = block(
                  '            let first = if timeout.is_zero() {',
                  '                receiver.try_recv().ok()',
                  '            } else {',
                  '                receiver.recv_timeout(timeout).ok()',
                  '            };',
              )
              if first_old in new:
                  new = new.replace(first_old, first_new, 1)
              elif first_new not in new:
                  raise RuntimeError('event-drain marker unresolved')
              save(p, old, new)

              p = Path('rust/crates/mukei-core/src/application_runtime/models_download.rs')
              old = p.read_text(encoding='utf-8')
              marker = '    fn download_model(&self, command: &ValidatedCommand) -> CommandAcknowledgementV2 {'
              allowance = '    #[allow(clippy::needless_return)]\n'
              new = old
              if allowance + marker not in new:
                  if marker not in new:
                      raise RuntimeError('model download marker missing')
                  new = new.replace(marker, allowance + marker, 1)
              save(p, old, new)

              p = Path('rust/crates/mukei-core/src/rag/retriever.rs')
              old = p.read_text(encoding='utf-8')
              new = old.replace(
                  'request.min_score.map_or(true, |minimum| *score >= minimum)',
                  'request.min_score.is_none_or(|minimum| *score >= minimum)',
                  1,
              )
              if 'request.min_score.map_or(true, |minimum| *score >= minimum)' in new:
                  raise RuntimeError('retriever marker unresolved')
              save(p, old, new)

              p = Path('rust/crates/mukei-core/src/storage/universal.rs')
              old = p.read_text(encoding='utf-8')
              new = old.replace(
                  '#[derive(Copy, Clone, Debug, PartialEq, Eq)]\npub enum DuplicatePolicy {',
                  '#[derive(Copy, Clone, Debug, Default, PartialEq, Eq)]\npub enum DuplicatePolicy {',
                  1,
              )
              if '#[default]\n    RenameNewEntry,' not in new:
                  new = new.replace('    RenameNewEntry,', '    #[default]\n    RenameNewEntry,', 1)
              new = re.sub(
                  r'\nimpl Default for DuplicatePolicy \{\n    fn default\(\) -> Self \{\n        Self::RenameNewEntry\n    \}\n\}\n',
                  '\n',
                  new,
                  count=1,
              )
              if 'impl Default for DuplicatePolicy' in new:
                  raise RuntimeError('manual DuplicatePolicy default remains')
              save(p, old, new)

              p = Path('rust/crates/mukei-core/src/storage/trash_repository.rs')
              old = p.read_text(encoding='utf-8')
              new = old
              if 'type TrashTargetRow =' not in new:
                  alias = block(
                      'type TrashTargetRow = (',
                      '    String,',
                      '    String,',
                      '    String,',
                      '    Option<String>,',
                      '    Option<String>,',
                      '    String,',
                      ');',
                      '',
                      '',
                  )
                  new = new.replace('use uuid::Uuid;\n\n', 'use uuid::Uuid;\n\n' + alias, 1)
              new = new.replace(
                  'let row: Option<(String, String, String, Option<String>, Option<String>, String)> =',
                  'let row: Option<TrashTargetRow> =',
                  1,
              )
              if 'let row: Option<(String, String, String, Option<String>, Option<String>, String)> =' in new:
                  raise RuntimeError('trash row type unresolved')
              save(p, old, new)

              p = Path('rust/crates/mukei-core/src/storage/import_commit_repository.rs')
              old = p.read_text(encoding='utf-8')
              new = old.replace(
                  'include!("import_commit_repository/naming.rs");\ninclude!("import_commit_repository/recovery.rs");',
                  'include!("import_commit_repository/recovery.rs");\ninclude!("import_commit_repository/naming.rs");',
                  1,
              )
              if new.find('recovery.rs') > new.find('naming.rs'):
                  raise RuntimeError('include order unresolved')
              save(p, old, new)

              ok = True
              (logs / 'patch-summary.txt').write_text(
                  'changed=' + (','.join(files) if files else 'none') + '\n', encoding='utf-8'
              )
          except Exception:
              ok = False
              (logs / 'patch-error.log').write_text(traceback.format_exc(), encoding='utf-8')

          with open(Path(os.environ['GITHUB_OUTPUT']), 'a', encoding='utf-8') as output:
              output.write(f'ok={str(ok).lower()}\n')
      - name: Stage candidate fixes
        if: steps.patch.outputs.ok == 'true'
        run: |
          git add \
            rust/crates/mukei-core/src/storage/object_store.rs \
            rust/crates/mukei-core/src/application_runtime/foundation_types.rs \
            rust/crates/mukei-core/src/application_runtime/models_download.rs \
            rust/crates/mukei-core/src/rag/retriever.rs \
            rust/crates/mukei-core/src/storage/universal.rs \
            rust/crates/mukei-core/src/storage/trash_repository.rs \
            rust/crates/mukei-core/src/storage/import_commit_repository.rs
          git diff --cached --check
      - name: Cargo check
        if: steps.patch.outputs.ok == 'true'
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets \
            2>&1 | tee ../ci-storage-finalize-v2-logs/check.log
      - name: Cargo tests
        if: steps.patch.outputs.ok == 'true'
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets \
            2>&1 | tee ../ci-storage-finalize-v2-logs/test.log
      - name: Clippy
        if: steps.patch.outputs.ok == 'true'
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo clippy -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings \
            2>&1 | tee ../ci-storage-finalize-v2-logs/clippy.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-quality-finalize-v2-${{ github.sha }}
          path: ci-storage-finalize-v2-logs
          if-no-files-found: error
          retention-days: 7
      - name: Enforce patch result
        run: test '${{ steps.patch.outputs.ok }}' = 'true'
      - name: Commit verified fixes
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git commit -m "fix(storage): pass tests and Clippy gates"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'storage-quality-finalize-v2',
              description: 'Storage check, tests, and Clippy passed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'storage-quality-finalize-v2',
              description: 'Storage final v2 quality gate failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
