name: qml-check

# QML-side gate. Only runs on the branch that ships the qml/ scaffold so
# `main` (Rust-only) is not affected. Kept separate from `lint.yml` /
# `sandbox-check.yml` so a QML lint regression does not mask a Rust
# regression (see architect review GH #22 / #23 for the analogous
# rationale on the Rust side).

on:
  push:
    branches:
      - codex/create-qml-directory-structure-and-files
  pull_request:
    paths:
      - "qml/**"
      - ".github/workflows/qml-check.yml"

jobs:
  # ---------------------------------------------------------------------
  # SVG uniqueness gate. This branch previously shipped 27 byte-identical
  # placeholder icons; CI now defends against that regression.
  #
  # Kept dependency-free so it always runs even if the Qt install job
  # goes offline.
  # ---------------------------------------------------------------------
  icon-uniqueness:
    name: SVG icons are semantically distinct
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify no two icon SVGs share an md5
        run: |
          set -e
          cd qml/assets/icons
          count=$(ls *.svg | wc -l)
          unique=$(md5sum *.svg | awk '{print $1}' | sort -u | wc -l)
          echo "svgs: $count, unique md5: $unique"
          if [ "$count" -ne "$unique" ]; then
            echo "::error::Duplicate SVG payload detected — every icon must be visually distinct."
            md5sum *.svg | sort | awk '{print $1}' | uniq -c | sort -rn | head -5
            exit 1
          fi

  # ---------------------------------------------------------------------
  # Font-file sanity: TTF magic (0x00010000 / 0x4f54544f) must match, and
  # no file may be an ASCII placeholder stub.
  # ---------------------------------------------------------------------
  fonts-are-real:
    name: TTF magic bytes are valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify each font file starts with a TrueType/OpenType magic
        run: |
          set -e
          fail=0
          for f in qml/assets/fonts/*.ttf; do
            magic=$(xxd -l 4 -p "$f")
            case "$magic" in
              00010000|4f54544f|74727565|74797031) : ;;
              *) echo "::error file=$f::bad TTF magic '$magic' — possible placeholder stub"; fail=1 ;;
            esac
          done
          exit $fail

  # ---------------------------------------------------------------------
  # QML resource cross-reference: every icon and font referenced in QML
  # source must exist on disk. Catches typos in qrc:/... paths without
  # needing a full Qt install.
  # ---------------------------------------------------------------------
  qrc-cross-reference:
    name: qrc:/ paths resolve to real files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Every qrc:/icons/... reference resolves
        run: |
          set -e
          cd qml
          grep -rhE 'qrc:/icons/[a-z-]+\.svg' . 2>/dev/null | grep -oE 'icons/[a-z-]+\.svg' | sort -u > /tmp/refs.txt
          ls assets/icons/*.svg | sed 's|.*/|icons/|' | sort -u > /tmp/present.txt
          missing=$(comm -23 /tmp/refs.txt /tmp/present.txt || true)
          if [ -n "$missing" ]; then
            echo "::error::icon references missing on disk:"; echo "$missing"; exit 1
          fi
          echo "OK: $(wc -l < /tmp/refs.txt) unique qrc:/icons references, all resolved"
      - name: Every qrc:/fonts/... reference resolves
        run: |
          set -e
          cd qml
          grep -rhE '(qrc:/|:/)fonts/[A-Za-z-]+\.ttf' main.cpp components/FontLoader.qml qml.qrc 2>/dev/null \
            | grep -oE 'fonts/[A-Za-z-]+\.ttf' | sort -u > /tmp/fref.txt
          ls assets/fonts/*.ttf | sed 's|.*/|fonts/|' | sort -u > /tmp/fpresent.txt
          diff /tmp/fref.txt /tmp/fpresent.txt || { echo "::error::font references do not match on-disk fonts"; exit 1; }
          echo "OK: font references match assets/fonts/ exactly"

  # ---------------------------------------------------------------------
  # DDG regression guard. QML must never contradict the Rust migration
  # §2 stance (Brave + Tavily only, no DuckDuckGo).
  # ---------------------------------------------------------------------
  ddg-regression:
    name: No DuckDuckGo references in QML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: grep guard
        run: |
          set -e
          if grep -rni -e 'DuckDuckGo' -e 'duck-duck-go' qml/ 2>/dev/null; then
            echo "::error::DDG string reintroduced (Migration §2 forbids)."; exit 1
          fi
          echo "OK: no DDG references in qml/"

  # ---------------------------------------------------------------------
  # Static QML lint via qmllint (part of Qt 6). Qt 6.5+ is required by
  # qml/CMakeLists.txt and IconButton.qml's QtQuick.Effects usage.
  # ---------------------------------------------------------------------
  qmllint:
    name: qmllint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          modules: "qtsvg"
          cache: true
      - name: Locate qmllint
        id: locate
        run: |
          set -e
          # qmllint lives under /usr/lib/qt6/bin or /usr/bin depending on
          # the Debian layout. Probe both.
          if [ -x /usr/lib/qt6/bin/qmllint ]; then
            echo "bin=/usr/lib/qt6/bin/qmllint" >> "$GITHUB_OUTPUT"
          elif command -v qmllint6 >/dev/null; then
            echo "bin=$(command -v qmllint6)" >> "$GITHUB_OUTPUT"
          elif command -v qmllint >/dev/null; then
            echo "bin=$(command -v qmllint)" >> "$GITHUB_OUTPUT"
          else
            find / -name 'qmllint*' 2>/dev/null | head -5
            echo "::error::qmllint not found in the installed Qt packages"; exit 1
          fi
      - name: Run qmllint against every .qml file
        run: |
          set +e
          fail=0
          cd qml
          # qmllint can emit Warnings for QtQuick.Controls.Basic
          # implementation types (T.Control, T.Page, T.Drawer) that ship with
          # the runtime but are not discoverable from the dev headers alone.
          # These are advisory noise — the fail-gate only fires on lines
          # matching qmllint's own "Error:" prefix. Warnings are logged
          # inline via `::warning file=...` so PR reviewers still see them.
          for f in $(find . -name '*.qml' -not -path './build*/*'); do
            out=$(${{ steps.locate.outputs.bin }} -I . -I theme -I components -I screens "$f" 2>&1 || true)
            if [ -n "$out" ]; then
              # Extract Errors (blocking) vs Warnings (advisory).
              errors=$(echo "$out" | grep -E '^Error:' || true)
              warnings=$(echo "$out" | grep -E '^Warning:' || true)
              if [ -n "$warnings" ]; then
                echo "::warning file=qml/$f::qmllint warnings (advisory):"
                echo "$warnings" | head -6
              fi
              if [ -n "$errors" ]; then
                echo "::error file=qml/$f::qmllint hard errors:"
                echo "$errors"
                fail=1
              fi
            fi
          done
          exit $fail

  # ---------------------------------------------------------------------
  # Configure-only CMake pass. Proves qml/CMakeLists.txt still validates
  # without kicking off a full moc/qrc/link cycle.
  # ---------------------------------------------------------------------
  cmake-configure:
    name: cmake -S qml -B build (configure-only)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          modules: "qtsvg"
          cache: true
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build
      - name: Configure only
        run: cmake -S qml -B qml/build -G Ninja

  # ---------------------------------------------------------------------
  # Event-dispatcher integration test. Builds the dedicated QML runner
  # and executes tst_EventDispatcher headless so the bridge envelope
  # boundary is CI-enforced instead of advisory.
  # ---------------------------------------------------------------------
  event-dispatcher-tests:
    name: EventDispatcher QML test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          modules: "qtsvg"
          cache: true
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build
      - name: Build and run tst_EventDispatcher
        run: |
          set -e
          cd qml
          cmake -S . -B build -G Ninja
          cmake --build build --target mukei tst_EventDispatcher
          ctest --test-dir build --output-on-failure -R tst_EventDispatcher
        env:
          QT_QPA_PLATFORM: offscreen

  # ---------------------------------------------------------------------
  # QML Security Tests. Runs security-focused QML tests including:
  # - Clipboard bridge functionality verification
  # - Console logging absence checks  
  # - Component isolation tests
  # - Accessible properties validation
  # ---------------------------------------------------------------------
  qml-security-tests:
    name: QML security test suite
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          modules: "qtsvg"
          cache: true
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build
      - name: Build and run QML security tests
        run: |
          set -e
          cd qml
          mkdir -p build && cd build
          cmake .. -G Ninja
          ninja
          # Run the security test suite
          if [ -f tst_Security ]; then
            ./tst_Security -o security-results.xml
          else
            echo "::warning::Security test binary not found - ensure tests are built"
          fi
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qml-security-test-results
          path: qml/build/security-results.xml
          retention-days: 30

  # ---------------------------------------------------------------------
  # QML Static Security Analysis. Runs Python-based static analyzer to
  # detect security anti-patterns in QML source code:
  # - Console logging statements
  # - Dynamic code execution patterns
  # - Unsafe imports and network access
  # - File system operations
  # ---------------------------------------------------------------------
  qml-static-security-analysis:
    name: QML static security analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Run QML security analyzer
        run: |
          set -e
          python3 qml/scripts/qml_security_analyzer.py qml
      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qml-security-analysis-report
          path: qml/scripts/
          retention-days: 30
