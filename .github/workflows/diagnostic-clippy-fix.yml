name: diagnostic-clippy-fix

on:
  push:
    branches: [ agent/diagnose-current-ci ]

permissions:
  contents: write

# Branch-scoped one-shot repair helper; removed before merge.
jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/diagnose-current-ci
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Apply exact reviewed Clippy repair patch
        run: git apply --check ci-clippy-fix.patch && git apply ci-clippy-fix.patch
      - name: Normalize formatting
        working-directory: rust
        run: cargo fmt --all
      - name: Verify core Clippy
        working-directory: rust
        run: >-
          cargo clippy
          -p mukei-core
          --no-default-features
          --features std,tokio
          --lib --tests
          -- -D warnings
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rust
          git commit -m "fix(ci): resolve Rust 1.97 Clippy failures"
          git push origin HEAD:agent/diagnose-current-ci
