name: diagnostic-clippy-fix

on:
  push:
    branches: [ agent/diagnose-current-ci ]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/diagnose-current-ci
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Apply compiler-suggested Clippy fixes
        working-directory: rust
        run: >-
          cargo clippy --fix
          -p mukei-core
          --no-default-features
          --features std,tokio
          --lib --tests
          --allow-dirty
          --allow-staged
          -- -D warnings
      - name: Normalize formatting
        working-directory: rust
        run: cargo fmt --all
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            echo "No Clippy fixes produced."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rust
          git commit -m "fix(ci): apply Rust 1.97 Clippy suggestions"
          git push origin HEAD:agent/diagnose-current-ci
