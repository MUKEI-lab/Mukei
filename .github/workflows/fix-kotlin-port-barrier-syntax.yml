name: fix-kotlin-port-barrier-syntax

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/fix-kotlin-port-barrier-syntax.yml

permissions:
  contents: write
  statuses: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Publish pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'fix-kotlin-port-barrier-syntax', description: 'Fixing generated barrier-removal syntax', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Repair generated Python literal
        shell: python
        run: |
          from pathlib import Path

          path = Path('scripts/port_kotlin_selected.sh')
          lines = path.read_text(encoding='utf-8').splitlines()
          start = next(
              index for index, line in enumerate(lines)
              if line == 'state = state.replace('
              and index + 1 < len(lines)
              and 'Barrier(tokio::sync::oneshot::Sender' in lines[index + 1]
          )
          replacement = [
              'state = state.replace(',
              "    '''    Barrier(tokio::sync::oneshot::Sender<()>),",
              "''',",
              "    '',",
              '    1,',
              ')',
          ]
          lines[start:start + 6] = replacement
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
      - name: Commit repaired script
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add scripts/port_kotlin_selected.sh
          git rm .github/workflows/fix-kotlin-port-barrier-syntax.yml
          git commit -m "fix(ci): repair barrier-removal literal in Kotlin port script"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'fix-kotlin-port-barrier-syntax', description: 'Barrier-removal syntax repaired', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'fix-kotlin-port-barrier-syntax', description: 'Barrier-removal syntax repair failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
