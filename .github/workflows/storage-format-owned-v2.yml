name: storage-format-owned-v2

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-format-owned-v2.yml
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  format-verify-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Fetch Kotlin comparison ref
        run: git fetch origin Kotlin:refs/remotes/origin/Kotlin
      - name: Install Rust 1.82
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy,rustfmt
      - name: Format and stage branch-owned intersection
        shell: bash
        run: |
          set -euo pipefail
          cd rust
          cargo fmt -p mukei-core
          cd ..
          git diff --name-only -- '*.rs' | sort -u > formatted-files.txt
          git diff --name-only origin/Kotlin...HEAD -- '*.rs' | sort -u > branch-owned-files.txt
          comm -12 formatted-files.txt branch-owned-files.txt > stage-files.txt
          comm -23 formatted-files.txt branch-owned-files.txt > ignored-base-files.txt
          cat > expected-base-files.txt <<'EOF'
          rust/crates/mukei-core/src/agent/mod.rs
          rust/crates/mukei-core/src/boundary.rs
          rust/crates/mukei-core/src/guard.rs
          rust/crates/mukei-core/src/platform.rs
          rust/crates/mukei-core/src/tools/hardware.rs
          rust/crates/mukei-core/src/tools/sentinel.rs
          EOF
          sort -u -o expected-base-files.txt expected-base-files.txt
          if ! cmp -s ignored-base-files.txt expected-base-files.txt; then
            echo 'Unexpected base-owned formatter drift:'
            diff -u expected-base-files.txt ignored-base-files.txt || true
            exit 1
          fi
          test -s stage-files.txt
          git add --pathspec-from-file=stage-files.txt
          git diff --cached --check
          git restore --worktree -- $(cat ignored-base-files.txt)
      - name: Cargo check
        working-directory: rust
        run: cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
      - name: Targeted storage tests
        working-directory: rust
        run: cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite storage_import -- --nocapture
      - name: Full tests
        working-directory: rust
        run: cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
      - name: Clippy
        working-directory: rust
        run: cargo clippy -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings
      - name: Commit verified branch-owned formatting
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git commit -m "style(storage): format branch-owned storage changes"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'storage-format-owned-v2',
              description: 'Branch-owned Rust formatting and Cargo gates passed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'storage-format-owned-v2',
              description: 'Branch-owned Rust formatting finalization failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
