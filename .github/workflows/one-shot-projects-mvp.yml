name: one-shot-projects-mvp

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-projects-mvp.yml'

permissions:
  contents: write
  statuses: write

jobs:
  strict-docs-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'projects-strict-gate', description: 'Fixing strict Project protocol docs gate', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.82.0'
      - name: Document Project protocol fields
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          p = Path('rust/crates/mukei-core/src/ui_protocol.rs')
          s = p.read_text(encoding='utf-8')
          replacements = {
              '    pub name: String,\n    #[serde(default)]\n    pub description: String,\n}\n\n/// Mutable project metadata payload.':
              '    /// User-visible project name, trimmed and bounded by protocol validation.\n    pub name: String,\n    /// Optional user-authored project description.\n    #[serde(default)]\n    pub description: String,\n}\n\n/// Mutable project metadata payload.',
              'pub struct ProjectUpdatePayload {\n    pub project_id: String,\n    pub name: String,\n    #[serde(default)]\n    pub description: String,\n}':
              'pub struct ProjectUpdatePayload {\n    /// Stable project identity allocated by the native runtime.\n    pub project_id: String,\n    /// Replacement user-visible project name.\n    pub name: String,\n    /// Replacement optional project description.\n    #[serde(default)]\n    pub description: String,\n}',
              'pub struct ProjectPayload {\n    pub project_id: String,\n}':
              'pub struct ProjectPayload {\n    /// Stable project identity allocated by the native runtime.\n    pub project_id: String,\n}',
          }
          for old, new in replacements.items():
              if s.count(old) != 1:
                  raise SystemExit(f'anchor count={s.count(old)} for {old[:60]!r}')
              s = s.replace(old, new, 1)
          p.write_text(s, encoding='utf-8')
          PY
          cargo fmt --manifest-path rust/Cargo.toml --all
          git diff --check
      - name: Strict Rust 1.82 check
        shell: bash
        env:
          RUSTFLAGS: '-D warnings'
        run: |
          set -euo pipefail
          cargo check --manifest-path rust/Cargo.toml -p mukei-core --all-features
      - name: Commit strict-gate fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'mukei-projects-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add rust/crates/mukei-core/src/ui_protocol.rs
          git commit -m 'Document Project protocol payload fields'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'projects-strict-gate', description: 'Strict Project protocol gate passed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'projects-strict-gate', description: 'Strict Project protocol gate failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
