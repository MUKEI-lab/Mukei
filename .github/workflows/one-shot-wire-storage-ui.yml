name: one-shot-wire-storage-ui

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-wire-storage-ui.yml'

permissions:
  contents: write
  statuses: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'wire-storage-ui',
              description: 'Wiring encrypted Storage UI',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0

      - name: Wire Storage UI to native runtime
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          host = Path('android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt')
          text = host.read_text(encoding='utf-8')
          host_anchor = '    private val started = AtomicBoolean(false)\n'
          host_insert = '''    data class StorageImportSubmission(
              val status: String,
              val operationId: String?,
              val rejectionReason: String?,
          )

          fun submitStorageImport(
              conversationId: String,
              target: String,
              displayName: String,
              mimeType: String,
          ): StorageImportSubmission {
              val activeGateway = gateway.get()
                  ?: return StorageImportSubmission("rejected", null, "backend_unavailable")
              if (conversationId.isBlank() || target.isBlank() || displayName.isBlank()) {
                  return StorageImportSubmission("rejected", null, "invalid_payload")
              }
              return try {
                  val envelope = JSONObject()
                      .put("protocol_version", JSONObject().put("major", 2).put("minor", 1))
                      .put("command_id", UUID.randomUUID().toString())
                      .put("request_id", UUID.randomUUID().toString())
                      .put("command_type", "storage.import_file")
                      .put("submitted_at", Instant.now().toString())
                      .put("correlation_id", UUID.randomUUID().toString())
                      .put("idempotency_key", "storage-import-${UUID.randomUUID()}")
                      .put("scope", JSONObject().put("conversation_id", conversationId))
                      .put(
                          "payload",
                          JSONObject()
                              .put("target", target)
                              .put("display_name", displayName)
                              .put("mime_type", mimeType),
                      )
                  val acknowledgement = JSONObject(
                      String(
                          activeGateway.submitCommand(
                              envelope.toString().toByteArray(StandardCharsets.UTF_8),
                          ),
                          StandardCharsets.UTF_8,
                      ),
                  )
                  StorageImportSubmission(
                      status = acknowledgement.optString("status", "rejected"),
                      operationId = acknowledgement.optString("operation_id")
                          .takeIf { it.isNotBlank() },
                      rejectionReason = acknowledgement.optString("rejection_reason")
                          .takeIf { it.isNotBlank() },
                  )
              } catch (failure: Throwable) {
                  StorageImportSubmission("rejected", null, stableFailureCode(failure))
              }
          }

          fun requestRuntimeSnapshot(domain: String): String? {
              if (domain !in setOf("application", "settings", "protocol", "operations")) return null
              val activeGateway = gateway.get() ?: return null
              return runCatching {
                  String(activeGateway.requestSnapshot(domain), StandardCharsets.UTF_8)
              }.getOrNull()
          }

          '''
          if 'data class StorageImportSubmission(' not in text:
              count = text.count(host_anchor)
              if count != 1:
                  raise SystemExit(f'BackendRuntimeHost semantic anchor count={count}')
              text = text.replace(host_anchor, host_insert + host_anchor, 1)
              host.write_text(text, encoding='utf-8')

          shell = Path('android/app/src/main/kotlin/ai/mukei/android/MukeiProductShell.kt')
          text = shell.read_text(encoding='utf-8')
          route = '                    TopLevelDestination.MODELS -> ModelsSurface(state.readiness)\n'
          if 'TopLevelDestination.STORAGE -> StorageSurface()' not in text:
              count = text.count(route)
              if count != 1:
                  raise SystemExit(f'MukeiProductShell Models route count={count}')
              text = text.replace(
                  route,
                  '                    TopLevelDestination.STORAGE -> StorageSurface()\n' + route,
                  1,
              )
              shell.write_text(text, encoding='utf-8')
          PY

          git diff --check
          git diff -- android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt \
            android/app/src/main/kotlin/ai/mukei/android/MukeiProductShell.kt

      - name: Commit temp-branch functionality
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'mukei-storage-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt \
            android/app/src/main/kotlin/ai/mukei/android/MukeiProductShell.kt
          if git diff --cached --quiet; then
            echo 'Storage UI wiring already present.'
          else
            git commit -m 'Connect encrypted storage import UI'
            git push origin HEAD:temp/universal-storage-workspace-v0.1
          fi

      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'wire-storage-ui',
              description: 'Encrypted Storage UI wired to runtime',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'wire-storage-ui',
              description: 'Storage UI wiring failed closed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
