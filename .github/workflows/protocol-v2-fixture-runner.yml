name: protocol-v2-fixture-runner

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'checkpoint/stabilization-2026-07-12'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: checkpoint/stabilization-2026-07-12
          fetch-depth: 0
      - name: Migrate stale Protocol V2 fixtures
        shell: bash
        run: |
          python3 .github/fix_protocol_v2_fixture.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test: align EventDispatcher fixtures with canonical V2 wire format"
          git push origin HEAD:checkpoint/stabilization-2026-07-12
