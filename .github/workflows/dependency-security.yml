name: dependency-security

on:
  push:
    branches: [ main, "agent/**", "checkpoint/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  dependency-security:
    name: cargo audit + cargo deny + provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit and cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - name: cargo audit
        working-directory: rust
        run: cargo audit
      - name: cargo deny check
        working-directory: rust
        run: cargo deny check advisories sources licenses bans
      - name: Verify OpenSSL dependency provenance
        working-directory: rust
        run: python3 scripts/verify_openssl_provenance.py
