name: storage-secure-jni-strict-diagnostic

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-secure-jni-strict-diagnostic.yml
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'storage-secure-jni-strict-diagnostic', description: 'Strict secure JNI diagnostic running', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
      - name: Apply verifier patch block
        shell: python
        run: |
          from pathlib import Path
          source = Path('.github/workflows/storage-android-secure-composition-v2.yml').read_text(encoding='utf-8')
          start_marker = "      - name: Extract and apply reviewed patch\n        shell: python\n        run: |\n"
          end_marker = "\n      - name: Format modified Rust files"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          lines = source[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          exec(compile(script, '/tmp/apply_verifier_patch.py', 'exec'), {'__name__': '__main__'})
      - name: Strict secure JNI test log
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../secure-jni-strict-diagnostic
          RUSTFLAGS='-D warnings' cargo test -p mukei-android-jni --lib --no-default-features --features secure_runtime \
            2>&1 | tee ../secure-jni-strict-diagnostic/secure-jni-strict.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storage-secure-jni-strict-diagnostic-${{ github.sha }}
          path: secure-jni-strict-diagnostic
          if-no-files-found: error
          retention-days: 7
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'storage-secure-jni-strict-diagnostic', description: 'Strict secure JNI composition passed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'storage-secure-jni-strict-diagnostic', description: 'Strict secure JNI composition failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
