name: storage-secure-core-diagnostic

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-secure-core-diagnostic.yml
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'storage-secure-core-diagnostic', description: 'Secure core diagnostic running', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
      - name: Apply secure patch and JNI include hygiene
        shell: python
        run: |
          from pathlib import Path
          import re

          source = Path('.github/workflows/storage-android-secure-composition.yml').read_text(encoding='utf-8')
          start_marker = "        run: |\n          from pathlib import Path\n"
          end_marker = "\n      - name: Format modified Rust files"
          start = source.index(start_marker) + len("        run: |\n")
          end = source.index(end_marker, start)
          lines = source[start:end].splitlines()
          patch = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          old = '''def replace_once(text: str, old: str, new: str, label: str) -> str:
              if new in text:
                  return text
              if old not in text:
                  raise SystemExit(f"missing patch marker: {label}")
              return text.replace(old, new, 1)
          '''
          new = '''import re

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if new in text:
                  return text
              if old in text:
                  return text.replace(old, new, 1)
              tokens = re.split(r"(\\s+)", old)
              pattern = "".join(r"\\s+" if token.isspace() else re.escape(token) for token in tokens)
              match = re.search(pattern, text)
              if match is None:
                  raise SystemExit(f"missing patch marker: {label}")
              return text[:match.start()] + new + text[match.end():]
          '''
          patch = patch.replace(old, new, 1)
          exec(compile(patch, '/tmp/apply_secure_storage.py', 'exec'), {'__name__': '__main__'})

          registry_path = Path('rust/crates/mukei-android-jni/src/runtime_registry.rs')
          registry = registry_path.read_text(encoding='utf-8')
          registry = registry.replace('use jni::sys::jlong;\n', 'use jni::objects::{JByteArray, JObject};\nuse jni::sys::{jbyteArray, jlong};\nuse jni::JNIEnv;\n', 1)
          registry = registry.replace('use mukei_core::application_runtime::MukeiRuntime;\n', 'use mukei_core::application_runtime::MukeiRuntime;\nuse zeroize::{Zeroize, Zeroizing};\n', 1)
          registry_path.write_text(registry, encoding='utf-8')
          secure_path = Path('rust/crates/mukei-android-jni/src/secure_runtime_jni.rs')
          secure = secure_path.read_text(encoding='utf-8')
          for value in ['use jni::objects::JObject;\n', 'use jni::sys::jbyteArray;\n', 'use jni::JNIEnv;\n', 'use zeroize::Zeroize;\n']:
              secure = secure.replace(value, '', 1)
          secure_path.write_text(secure, encoding='utf-8')
          remote_path = Path('rust/crates/mukei-android-jni/src/remote_tools_jni.rs')
          remote = remote_path.read_text(encoding='utf-8')
          for value in ['use jni::objects::{JByteArray, JObject};\n', 'use jni::sys::{jbyteArray, jlong};\n', 'use jni::JNIEnv;\n', 'use zeroize::{Zeroize, Zeroizing};\n']:
              remote = remote.replace(value, '', 1)
          remote_path.write_text(remote, encoding='utf-8')
      - name: Core check with focused log
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ../secure-core-diagnostic
          cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets \
            2>&1 | tee ../secure-core-diagnostic/core-check.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storage-secure-core-diagnostic-${{ github.sha }}
          path: secure-core-diagnostic
          if-no-files-found: error
          retention-days: 7
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'storage-secure-core-diagnostic', description: 'Secure core composition passed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'storage-secure-core-diagnostic', description: 'Secure core composition failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
