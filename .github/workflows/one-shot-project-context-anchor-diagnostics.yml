name: one-shot-project-context-anchor-diagnostics

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-project-context-anchor-diagnostics.yml'

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
      - name: Count semantic anchors
        shell: bash
        run: |
          mkdir -p diagnostics
          python3 <<'PY' > diagnostics/anchors.txt
          from pathlib import Path
          checks = [
            ('state.project_struct','rust/crates/mukei-core/src/application_runtime/foundation_state.rs','struct ProjectProjection {'),
            ('state.project_fields','rust/crates/mukei-core/src/application_runtime/foundation_state.rs','    description: String,\n'),
            ('protocol.minor','rust/crates/mukei-core/src/ui_protocol.rs','pub const PROTOCOL_MINOR: u16 = 2;'),
            ('protocol.command_variants','rust/crates/mukei-core/src/ui_protocol.rs','    ProjectArchive,\n'),
            ('protocol.parse','rust/crates/mukei-core/src/ui_protocol.rs','            "project.archive" => Some(Self::ProjectArchive),\n'),
            ('protocol.as_str','rust/crates/mukei-core/src/ui_protocol.rs','            Self::ProjectArchive => "project.archive",\n'),
            ('protocol.idempotency','rust/crates/mukei-core/src/ui_protocol.rs','                | Self::ProjectArchive\n'),
            ('protocol.payload_structs','rust/crates/mukei-core/src/ui_protocol.rs','/// Product setting mutation payload.\n'),
            ('protocol.validated_payloads','rust/crates/mukei-core/src/ui_protocol.rs','    Project(ProjectPayload),\n'),
            ('protocol.scope_group','rust/crates/mukei-core/src/ui_protocol.rs','            | CommandType::ProjectArchive\n'),
            ('protocol.validation','rust/crates/mukei-core/src/ui_protocol.rs','        CommandType::SettingsUpdate => {\n'),
            ('base.capabilities','rust/crates/mukei-core/src/application_runtime/base.rs','            CommandType::ProjectArchive,\n'),
            ('router.dispatch','rust/crates/mukei-core/src/application_runtime/documents_snapshot.rs','            CommandType::ProjectArchive => runtime.archive_project(command),\n'),
            ('backend.methods','android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt','private fun submitProjectCommand(\n'),
            ('backend.protocol_minor','android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt','.put("protocol_version", JSONObject().put("major", 2).put("minor", 2))'),
          ]
          for label,path,anchor in checks:
              s=Path(path).read_text(encoding='utf-8')
              print(f'{label}\t{s.count(anchor)}')
          s=Path('android/app/src/main/kotlin/ai/mukei/android/ProjectsSurface.kt').read_text(encoding='utf-8')
          marker='text = "This project identity is persisted by the encrypted native runtime. Chat and file membership will attach to this identity instead of creating a second storage system."'
          pos=s.find(marker)
          print(f'ui.project_workspace\t{1 if pos >= 0 else 0}')
          print(f'ui.detail_banner_after_marker\t{1 if pos >= 0 and s.find("            banner?.let { message ->",pos) >= 0 else 0}')
          PY
          cat diagnostics/anchors.txt
      - uses: actions/upload-artifact@v4
        with:
          name: project-context-anchor-diagnostics-${{ github.sha }}
          path: diagnostics/anchors.txt
          if-no-files-found: error
          retention-days: 2
      - name: Publish diagnostic status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'project-context-anchor-diagnostics', description: 'Project context anchor diagnostics captured', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
