name: android-device-diagnostic-apks

on:
  workflow_dispatch:
  pull_request:
    branches: [ "checkpoint/stabilization-2026-07-12" ]
    paths:
      - ".github/workflows/android-device-diagnostic-apks.yml"
      - "scripts/android/prepare-device-diagnostic.py"
      - "scripts/android/build-apk.sh"
      - "scripts/android/validate-apk.sh"
      - "qml/**"
      - "rust/**"

permissions:
  contents: read

concurrency:
  group: android-device-diagnostic-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  QT_VERSION: "6.8.3"
  ANDROID_NDK_VERSION: "26.1.10909125"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.1"

jobs:
  build-device-diagnostics:
    name: Build ${{ matrix.mode }} APK
    runs-on: ubuntu-22.04
    timeout-minutes: 100
    strategy:
      fail-fast: false
      matrix:
        mode: [opengl, safe-start]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install host tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            p7zip-full \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0
          python -m pip install --upgrade pip
          python -m pip install "aqtinstall==3.3.*" "py7zr==1.1.*"

      - name: Install Android SDK and NDK components
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [[ -z "${SDK_ROOT}" ]]; then
            echo "Android SDK root is unavailable on the runner." >&2
            exit 1
          fi

          SDKMANAGER="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "${SDKMANAGER}" ]]; then
            SDKMANAGER="$(find "${SDK_ROOT}/cmdline-tools" -type f -path '*/bin/sdkmanager' -perm -u+x -print 2>/dev/null | sort -V | tail -n 1)"
          fi
          if [[ -z "${SDKMANAGER}" || ! -x "${SDKMANAGER}" ]]; then
            echo "sdkmanager was not found below ${SDK_ROOT}." >&2
            exit 1
          fi

          yes | "${SDKMANAGER}" --licenses >/dev/null 2>&1 || true
          "${SDKMANAGER}" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"

          find "${SDK_ROOT}/platforms" -mindepth 1 -maxdepth 1 -type d \
            ! -name 'android-35' -exec rm -rf {} +
          find "${SDK_ROOT}/build-tools" -mindepth 1 -maxdepth 1 -type d \
            ! -name "${ANDROID_BUILD_TOOLS_VERSION}" -exec rm -rf {} +

          test -f "${SDK_ROOT}/platforms/android-35/android.jar"
          test -x "${SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}/aapt2"
          test -x "${SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}/zipalign"
          test -x "${SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}/apksigner"
          test -d "${SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"
          echo "ANDROID_HOME=${SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_SDK_ROOT=${SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "${SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}" >> "${GITHUB_PATH}"

      - name: Install Qt Android and host kits
        shell: bash
        run: |
          QT_INSTALL_ROOT="${RUNNER_TEMP}/Qt"
          aqt install-qt \
            linux android "${QT_VERSION}" android_arm64_v8a \
            --autodesktop \
            --outputdir "${QT_INSTALL_ROOT}" \
            --external 7z
          QT_ANDROID_ROOT="${QT_INSTALL_ROOT}/${QT_VERSION}/android_arm64_v8a"
          QT_HOST_ROOT="${QT_INSTALL_ROOT}/${QT_VERSION}/gcc_64"
          test -x "${QT_ANDROID_ROOT}/bin/qt-cmake"
          test -x "${QT_ANDROID_ROOT}/bin/qmake"
          test -d "${QT_HOST_ROOT}"

          if [[ ! -e "${QT_ANDROID_ROOT}/lib/libQt6Core.so" ]]; then
            QT_CORE_LIBRARY="${QT_ANDROID_ROOT}/lib/libQt6Core_arm64-v8a.so"
            if [[ ! -e "${QT_CORE_LIBRARY}" ]]; then
              QT_CORE_LIBRARY="$(find "${QT_ANDROID_ROOT}/lib" -maxdepth 1 \( -type f -o -type l \) -name 'libQt6Core*.so' -print -quit)"
            fi
            if [[ -z "${QT_CORE_LIBRARY}" || ! -e "${QT_CORE_LIBRARY}" ]]; then
              echo "Qt Android Core library was not found below ${QT_ANDROID_ROOT}/lib." >&2
              exit 1
            fi
            ln -sfn "${QT_CORE_LIBRARY}" "${QT_ANDROID_ROOT}/lib/libQt6Core.so"
          fi

          echo "QT_ANDROID_ROOT=${QT_ANDROID_ROOT}" >> "${GITHUB_ENV}"
          echo "QT_HOST_ROOT=${QT_HOST_ROOT}" >> "${GITHUB_ENV}"

      - name: Install Rust Android target
        shell: bash
        run: |
          rustup show
          rustup target add aarch64-linux-android

      - name: Prepare ${{ matrix.mode }} source variant
        shell: bash
        run: |
          python3 scripts/android/prepare-device-diagnostic.py --mode "${{ matrix.mode }}"
          grep -F 'QSGRendererInterface::OpenGL' qml/main.cpp
          if [[ "${{ matrix.mode }}" == "safe-start" ]]; then
            grep -F 'return false;' qml/main.cpp
          fi

      - name: Build and validate unsigned ${{ matrix.mode }} APK
        shell: bash
        env:
          CARGO_TERM_COLOR: always
          CMAKE_BUILD_PARALLEL_LEVEL: "2"
          BUILD_ROOT: ${{ github.workspace }}/build/android-${{ matrix.mode }}
          DIST_DIR: ${{ github.workspace }}/dist/android-${{ matrix.mode }}
          CXX_QT_EXPORT_DIR: ${{ github.workspace }}/rust/target/cxxqt-export-${{ matrix.mode }}
        run: |
          mkdir -p "${DIST_DIR}"
          set -o pipefail
          bash scripts/android/build-apk.sh 2>&1 | tee "${DIST_DIR}/build-${{ matrix.mode }}.log"

      - name: Create installable ${{ matrix.mode }} test APK
        shell: bash
        env:
          DIST_DIR: ${{ github.workspace }}/dist/android-${{ matrix.mode }}
        run: |
          MODE="${{ matrix.mode }}"
          UNSIGNED_SOURCE="${DIST_DIR}/mukei-0.7.5-arm64-v8a.apk"
          UNSIGNED_APK="${DIST_DIR}/mukei-0.7.5-arm64-v8a-${MODE}-unsigned.apk"
          SIGNED_APK="${DIST_DIR}/mukei-0.7.5-arm64-v8a-${MODE}-test-signed.apk"
          ALIGNED_APK="${RUNNER_TEMP}/mukei-${MODE}-aligned.apk"
          TEST_KEYSTORE="${RUNNER_TEMP}/mukei-${MODE}-ci-test.p12"

          test -f "${UNSIGNED_SOURCE}"
          mv "${UNSIGNED_SOURCE}" "${UNSIGNED_APK}"

          keytool -genkeypair -noprompt \
            -storetype PKCS12 \
            -keystore "${TEST_KEYSTORE}" \
            -storepass android \
            -keypass android \
            -alias "mukei-${MODE}-ci-test" \
            -keyalg RSA \
            -keysize 3072 \
            -sigalg SHA256withRSA \
            -validity 3650 \
            -dname "CN=Mukei ${MODE} CI Test,O=MUKEI-lab,C=IN"

          zipalign -p -f 4 "${UNSIGNED_APK}" "${ALIGNED_APK}"
          apksigner sign \
            --ks "${TEST_KEYSTORE}" \
            --ks-type PKCS12 \
            --ks-key-alias "mukei-${MODE}-ci-test" \
            --ks-pass pass:android \
            --key-pass pass:android \
            --v4-signing-enabled false \
            --out "${SIGNED_APK}" \
            "${ALIGNED_APK}"

          apksigner verify --verbose --print-certs "${SIGNED_APK}"
          bash scripts/android/validate-apk.sh "${SIGNED_APK}"
          sha256sum "${SIGNED_APK}" "${UNSIGNED_APK}" | tee "${DIST_DIR}/SHA256SUMS-${MODE}"

      - name: Upload ${{ matrix.mode }} APK
        uses: actions/upload-artifact@v4
        with:
          name: mukei-0.7.5-${{ matrix.mode }}-test-apk
          path: |
            dist/android-${{ matrix.mode }}/mukei-0.7.5-arm64-v8a-${{ matrix.mode }}-test-signed.apk
            dist/android-${{ matrix.mode }}/SHA256SUMS-${{ matrix.mode }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload ${{ matrix.mode }} diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mukei-${{ matrix.mode }}-build-diagnostics
          path: |
            dist/android-${{ matrix.mode }}/**/*.log
          if-no-files-found: warn
          retention-days: 7
