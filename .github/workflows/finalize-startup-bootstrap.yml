name: finalize-startup-bootstrap

on:
  push:
    branches: [ "agent/full-qml-fixed-build-2026-07-15" ]
    paths:
      - "scripts/frontend/finalize-startup-bootstrap.py"
      - "scripts/frontend/finalize-safe-mode-actions.py"
      - "scripts/frontend/finalize-rag-prompt.py"
      - ".github/workflows/finalize-startup-bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finalize-startup-bootstrap-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install stable Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply physical-device startup fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/frontend/finalize-startup-bootstrap.py
          python3 scripts/frontend/finalize-safe-mode-actions.py
          python3 scripts/frontend/finalize-rag-prompt.py
          python3 - <<'PY'
          from pathlib import Path

          path = Path("qml/screens/RagRebuildPromptScreen.qml")
          text = path.read_text(encoding="utf-8")
          duplicate_import = 'import "../architecture"\nimport "../architecture"\n'
          duplicate_name = (
              '    objectName: "ragRebuildPromptScreen"\n'
              '    objectName: "ragRebuildPromptScreen"\n'
          )
          while duplicate_import in text:
              text = text.replace(duplicate_import, 'import "../architecture"\n', 1)
          while duplicate_name in text:
              text = text.replace(
                  duplicate_name,
                  '    objectName: "ragRebuildPromptScreen"\n',
                  1,
              )
          path.write_text(text, encoding="utf-8")
          PY
          cargo fmt --manifest-path rust/Cargo.toml --all
      - name: Commit canonical source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "MUKEI Startup Finalizer"
          git config user.email "actions@users.noreply.github.com"
          git add \
            qml/architecture/AppCoordinator.qml \
            qml/stores/LifecycleStore.qml \
            qml/screens/SafeModeScreen.qml \
            qml/stores/NavigationStore.qml \
            qml/screens/DiagnosticsScreen.qml \
            qml/screens/RagRebuildPromptScreen.qml \
            rust/crates/mukei-bridge/src/lib.rs \
            rust/crates/mukei-bridge/src/protocol.rs
          if git diff --cached --quiet; then
            echo "Frontend startup source already finalized."
            exit 0
          fi
          git commit -m "fix(frontend): finalize observable startup actions"
          git fetch origin "${GITHUB_REF_NAME}"
          git rebase "origin/${GITHUB_REF_NAME}"
          git push --force-with-lease origin HEAD:"${GITHUB_REF_NAME}"
