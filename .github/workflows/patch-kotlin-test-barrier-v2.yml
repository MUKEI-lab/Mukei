name: patch-kotlin-test-barrier-v2

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/patch-kotlin-test-barrier-v2.yml

permissions:
  contents: write
  statuses: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Publish pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'patch-kotlin-test-barrier-v2',
              description: 'Patching test-only persistence barrier',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Patch script
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('scripts/port_kotlin_selected.sh')
          text = path.read_text(encoding='utf-8')
          replacement = r'''# Keep Barrier only for the FIFO regression test; production flushes use Flush.
          python <<'PY'
          from pathlib import Path

          state_path = Path('rust/crates/mukei-core/src/application_runtime/foundation_state.rs')
          state = state_path.read_text(encoding='utf-8')
          state = state.replace(
              '    Barrier(tokio::sync::oneshot::Sender<()>),\n',
              '    #[cfg(test)]\n    Barrier(tokio::sync::oneshot::Sender<()>),\n',
              1,
          )
          state = state.replace(
              '''                    PersistenceCommand::Barrier(acknowledgement) => {
                                  let _ = acknowledgement.send(());
                              }
          ''',
              '''                    #[cfg(test)]
                              PersistenceCommand::Barrier(acknowledgement) => {
                                  let _ = acknowledgement.send(());
                              }
          ''',
              1,
          )
          state_path.write_text(state, encoding='utf-8')
          PY

          rm -f'''
          pattern = re.compile(
              r'# Removing the obsolete Barrier variant after installing Flush\.\n'
              r'python <<\'PY\'\n.*?\nPY\n\nrm -f',
              re.DOTALL,
          )
          updated, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'expected one obsolete barrier block, found {count}')
          path.write_text(updated, encoding='utf-8')
      - name: Commit patched script
        run: |
          git config user.name mukei-storage-bot
          git config user.email mukei-storage-bot@users.noreply.github.com
          git add scripts/port_kotlin_selected.sh
          git commit -m "fix(ci): preserve test-only FIFO barrier in Kotlin port"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'patch-kotlin-test-barrier-v2',
              description: 'Test-only barrier reconciliation patched',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Publish failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'patch-kotlin-test-barrier-v2',
              description: 'Test-only barrier reconciliation failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });