name: storage-secure-kotlin-diagnostic

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-secure-kotlin-diagnostic.yml
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'storage-secure-kotlin-diagnostic', description: 'Secure Kotlin diagnostic running', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Apply verifier patch block
        shell: python
        run: |
          from pathlib import Path
          source = Path('.github/workflows/storage-android-secure-composition-v2.yml').read_text(encoding='utf-8')
          start_marker = "      - name: Extract and apply reviewed patch\n        shell: python\n        run: |\n"
          end_marker = "\n      - name: Format modified Rust files"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          lines = source[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          exec(compile(script, '/tmp/apply_verifier_patch.py', 'exec'), {'__name__': '__main__'})
      - name: Kotlin compile with focused log and source capture
        shell: bash
        run: |
          set -o pipefail
          mkdir -p secure-kotlin-diagnostic
          cp android/core/native/src/main/kotlin/ai/mukei/android/core/nativebridge/SecureRuntimeFactory.kt \
            secure-kotlin-diagnostic/SecureRuntimeFactory.kt
          nl -ba secure-kotlin-diagnostic/SecureRuntimeFactory.kt \
            | sed -n '24,56p' \
            | tee secure-kotlin-diagnostic/SecureRuntimeFactory-lines-24-56.txt
          sed -n '36p' secure-kotlin-diagnostic/SecureRuntimeFactory.kt \
            | od -An -tx1c \
            | tee secure-kotlin-diagnostic/SecureRuntimeFactory-line-36-bytes.txt
          gradle -p android :core:native:compileDebugKotlin :app:compileDebugKotlin --stacktrace \
            2>&1 | tee secure-kotlin-diagnostic/kotlin-compile.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storage-secure-kotlin-diagnostic-${{ github.sha }}
          path: secure-kotlin-diagnostic
          if-no-files-found: error
          retention-days: 7
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'storage-secure-kotlin-diagnostic', description: 'Secure Kotlin bridge passed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'storage-secure-kotlin-diagnostic', description: 'Secure Kotlin bridge failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
