name: cleanup-obsolete-branches

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-obsolete-branches.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-22.04
    steps:
      - name: Delete known obsolete branches
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          branches=(
            "agent/full-qml-fixed-build-2026-07-15"
            "agent/android-apk-remediation-2026-07-15"
            "checkpoint/stabilization-2026-07-12"
            "ops/cleanup-obsolete-branches"
          )

          for branch in "${branches[@]}"; do
            ref="repos/${GITHUB_REPOSITORY}/git/ref/heads/${branch}"
            if gh api "${ref}" >/dev/null 2>&1; then
              echo "Deleting ${branch}"
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${branch}"
            else
              echo "Already absent: ${branch}"
            fi
          done

          for branch in "${branches[@]}"; do
            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${branch}" >/dev/null 2>&1; then
              echo "Branch still exists: ${branch}" >&2
              exit 1
            fi
          done

          echo "Obsolete branch cleanup complete."
