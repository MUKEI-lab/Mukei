name: one-shot-conversation-storage-attachments-android

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/one-shot-conversation-storage-attachments-android.yml

permissions:
  contents: read
  statuses: write

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"pending","context":"conversation-storage-attachments-android","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Validating Android conversation Storage attachments"}'
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 1
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Compile lint and build APKs
        run: |
          set -o pipefail
          gradle -p android :app:compileDebugKotlin :app:lintDebug :app:assembleDebug :app:assembleOffline --stacktrace 2>&1 | tee conversation-storage-attachments-android.log
      - name: Upload Android diagnostics and APKs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conversation-storage-attachments-android-${{ github.sha }}
          path: |
            conversation-storage-attachments-android.log
            android/app/build/reports/lint-results-debug.html
            android/app/build/reports/lint-results-debug.txt
            android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 7
      - name: Publish success status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"success","context":"conversation-storage-attachments-android","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Android conversation Storage attachments validated"}'
      - name: Publish failure status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"failure","context":"conversation-storage-attachments-android","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Android conversation Storage attachments failed"}'
