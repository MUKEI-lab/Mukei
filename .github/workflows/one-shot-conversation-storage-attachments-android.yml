name: one-shot-conversation-storage-attachments-android

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/conversation-storage-attachments-android-trigger.txt

concurrency:
  group: conversation-storage-attachments-android
  cancel-in-progress: true

permissions:
  contents: write
  statuses: write

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"pending","context":"conversation-storage-attachments-android","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Validating Attach from Storage Android UI"}'
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Apply guarded Android patch
        run: |
          set -euo pipefail
          python3 .github/scripts/patch_conversation_storage_attachments_android.py 2>&1 | tee conversation-storage-attachments-android.log
          git diff --check 2>&1 | tee -a conversation-storage-attachments-android.log
      - name: Compile lint and assemble
        run: |
          set -euo pipefail
          gradle -p android \
            :app:compileDebugKotlin \
            :app:lintDebug \
            :app:assembleDebug \
            :app:assembleOffline \
            --stacktrace 2>&1 | tee -a conversation-storage-attachments-android.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conversation-storage-attachments-android-${{ github.sha }}
          path: conversation-storage-attachments-android.log
          retention-days: 7
      - name: Commit validated Android wiring
        if: success()
        run: |
          set -euo pipefail
          git config user.name 'mukei-storage-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt \
            android/app/src/main/kotlin/ai/mukei/android/ChatConversationSurface.kt
          git commit -m 'Wire Attach from Storage into conversations'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"success","context":"conversation-storage-attachments-android","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Attach from Storage Android UI validated"}'
      - name: Publish failure status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"failure","context":"conversation-storage-attachments-android","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Attach from Storage Android UI failed"}'
