name: one-shot-storage-rustfmt

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-storage-rustfmt.yml'

permissions:
  contents: write

jobs:
  format-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Install canonical Rust toolchain
        run: |
          rustup toolchain install 1.86.0 --profile minimal --component rustfmt
          rustup override set 1.86.0
      - name: Apply rustfmt
        working-directory: rust
        run: cargo fmt --all
      - name: Commit formatting if needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add rust
          git commit -m 'style(storage): apply canonical rustfmt'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
