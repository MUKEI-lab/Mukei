name: one-shot-storage-rustfmt

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-storage-rustfmt.yml'

permissions:
  contents: write
  statuses: write

jobs:
  format-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending formatter status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'one-shot-storage-rustfmt',
              description: 'Canonical rustfmt helper is running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Install canonical Rust toolchain
        run: |
          rustup toolchain install 1.86.0 --profile minimal --component rustfmt
          rustup override set 1.86.0
      - name: Apply rustfmt
        working-directory: rust
        run: cargo fmt --all
      - name: Commit formatting if needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add rust
          git commit -m 'style(storage): apply canonical rustfmt'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish formatter success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'one-shot-storage-rustfmt',
              description: 'Canonical rustfmt helper completed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Publish formatter failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'one-shot-storage-rustfmt',
              description: 'Canonical rustfmt helper failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
