              '''#[cfg(feature = "candle")]
fn weights_embedder_id(path: &Path) -> Result<String> {
    use std::io::{BufReader, Read};

    use sha2::{Digest, Sha256};

    let file = std::fs::File::open(path)
        .map_err(|error| MukeiError::ModelLoadFailed(format!("weights hash open failed: {error}")))?;
    let mut reader = BufReader::new(file);
    let mut hasher = Sha256::new();
    let mut buffer = [0_u8; 64 * 1024];
    loop {
        let read = reader
            .read(&mut buffer)
            .map_err(|error| MukeiError::ModelLoadFailed(format!("weights hash read failed: {error}")))?;
        if read == 0 {
            break;
        }
        hasher.update(&buffer[..read]);
    }
    Ok(format!(
        "minilm-candle:sha256:{}",
        crate::diagnostics::crash_logger::hex_helper(&hasher.finalize())
    ))
}

