name: Temporary Rust formatting remediation

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/harden-object-reader.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temp-rust-formatting-remediation
  cancel-in-progress: false

jobs:
  format-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0

      - name: Verify isolated branch
        run: |
          test "$(git branch --show-current)" = "temp/universal-storage-workspace-v0.1"
          test "$(git rev-parse --abbrev-ref HEAD)" != "Kotlin"

      - name: Install Rust 1.86 formatter
        uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: rustfmt

      - name: Apply canonical Rust formatting
        working-directory: rust
        run: cargo fmt --all

      - name: Verify formatting scope
        run: |
          git diff --check
          changed="$(git diff --name-only)"
          if [ -n "$changed" ]; then
            printf '%s\n' "$changed"
            while IFS= read -r path; do
              case "$path" in
                rust/*) ;;
                *) echo "unexpected non-Rust formatting change: $path" >&2; exit 1 ;;
              esac
            done <<< "$changed"
          fi

      - name: Commit formatter output
        run: |
          if git diff --quiet; then
            echo "Rust tree already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rust
          git commit -m "style(rust): apply canonical workspace formatting"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
