name: Harden encrypted object reader

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/harden-object-reader.yml

permissions:
  contents: write

concurrency:
  group: harden-object-reader
  cancel-in-progress: false

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0

      - name: Verify isolated branch
        run: |
          test "$(git branch --show-current)" = "temp/universal-storage-workspace-v0.1"

      - name: Bound malformed object allocation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("rust/crates/mukei-core/src/storage/object_store.rs")
          text = path.read_text()

          constant_anchor = "const AES_GCM_CIPHER_VERSION: u32 = 1;\n"
          constant = constant_anchor + "/// Hard fail-closed ceiling for corrupt or attacker-controlled object envelopes.\nconst MAX_ENCODED_OBJECT_BYTES: u64 = 64 * 1024 * 1024;\n"
          if "const MAX_ENCODED_OBJECT_BYTES" not in text:
              if constant_anchor not in text:
                  raise SystemExit("object-store constant anchor not found")
              text = text.replace(constant_anchor, constant, 1)

          read_anchor = "    let encrypted_size = u64::from_be_bytes(header[52..60].try_into().unwrap());\n    let actual_remaining = file.metadata()?.len().saturating_sub(header.len() as u64);\n"
          read_replacement = "    let encrypted_size = u64::from_be_bytes(header[52..60].try_into().unwrap());\n    if encrypted_size > MAX_ENCODED_OBJECT_BYTES {\n        return Err(ObjectStoreError::MalformedObject);\n    }\n    let actual_remaining = file.metadata()?.len().saturating_sub(header.len() as u64);\n"
          if "encrypted_size > MAX_ENCODED_OBJECT_BYTES" not in text:
              if read_anchor not in text:
                  raise SystemExit("object-store reader anchor not found")
              text = text.replace(read_anchor, read_replacement, 1)

          test_anchor = "    #[test]\n    fn corrupted_ciphertext_fails_closed() {\n"
          test = '''    #[test]
    fn oversized_sparse_object_is_rejected_before_ciphertext_allocation() {
        let directory = tempfile::tempdir().unwrap();
        let path = directory.path().join("oversized.mobj");
        let digest = [0x41; SHA256_LEN];
        let encrypted_size = MAX_ENCODED_OBJECT_BYTES + 1;
        let mut header = associated_data(&digest, 1, AES_GCM_CIPHER_VERSION);
        header.extend_from_slice(&encrypted_size.to_be_bytes());

        let mut file = File::create(&path).unwrap();
        file.write_all(&header).unwrap();
        file.set_len(header.len() as u64 + encrypted_size).unwrap();
        file.sync_all().unwrap();

        assert!(matches!(
            read_encoded_object(&path),
            Err(ObjectStoreError::MalformedObject)
        ));
    }

'''
          if "oversized_sparse_object_is_rejected_before_ciphertext_allocation" not in text:
              if test_anchor not in text:
                  raise SystemExit("object-store test anchor not found")
              text = text.replace(test_anchor, test + test_anchor, 1)

          path.write_text(text)
          PY

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format and validate focused storage tests
        working-directory: rust
        run: |
          cargo fmt --all -- --check
          cargo test -p mukei-core storage::object_store::tests
          cargo clippy -p mukei-core --all-targets -- -D warnings

      - name: Commit verified hardening
        run: |
          if git diff --quiet; then
            echo "Object reader was already hardened."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rust/crates/mukei-core/src/storage/object_store.rs
          git commit -m "fix(storage): bound encrypted object reader allocation"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
