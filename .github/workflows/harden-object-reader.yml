name: Harden encrypted object reader

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/harden-object-reader.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: harden-object-reader
  cancel-in-progress: false

jobs:
  patch-object-store:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0

      - name: Verify isolated branch
        run: |
          test "$(git branch --show-current)" = "temp/universal-storage-workspace-v0.1"
          test "$(git rev-parse --abbrev-ref HEAD)" != "Kotlin"

      - name: Reject oversized objects before filesystem publication
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("rust/crates/mukei-core/src/storage/object_store.rs")
          text = path.read_text()

          early = """        let parent = final_path
              .parent()
              .ok_or(ObjectStoreError::MalformedObject)?;
          fs::create_dir_all(parent)?;
          sync_directory(parent)?;

          let version = self.cipher.version();
          """
          deferred = """        let parent = final_path
              .parent()
              .ok_or(ObjectStoreError::MalformedObject)?;

          let version = self.cipher.version();
          """
          if early in text:
              text = text.replace(early, deferred, 1)
          elif deferred not in text:
              raise SystemExit("object-store parent publication anchor not found")

          guard = """        if ciphertext_size > MAX_ENCODED_OBJECT_BYTES {
              return Err(ObjectStoreError::ObjectTooLarge);
          }
          let encoded = encode_object(
          """
          guarded_publication = """        if ciphertext_size > MAX_ENCODED_OBJECT_BYTES {
              return Err(ObjectStoreError::ObjectTooLarge);
          }
          fs::create_dir_all(parent)?;
          sync_directory(parent)?;
          let encoded = encode_object(
          """
          if guard in text:
              text = text.replace(guard, guarded_publication, 1)
          elif guarded_publication not in text:
              raise SystemExit("object-store size guard anchor not found")

          path.write_text(text)
          PY

      - name: Verify patch scope
        run: |
          git diff --check
          changed="$(git diff --name-only)"
          test "$changed" = "rust/crates/mukei-core/src/storage/object_store.rs"

      - name: Commit source fix
        run: |
          if git diff --quiet; then
            echo "Object-store publication ordering already fixed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rust/crates/mukei-core/src/storage/object_store.rs
          git commit -m "fix(storage): reject oversized objects before publication"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
