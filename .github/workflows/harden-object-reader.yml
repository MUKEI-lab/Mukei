name: Temporary Rust blocker remediation

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/harden-object-reader.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temp-rust-blocker-remediation
  cancel-in-progress: false

jobs:
  patch-source-blockers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0

      - name: Verify isolated branch
        run: |
          test "$(git branch --show-current)" = "temp/universal-storage-workspace-v0.1"
          test "$(git rev-parse --abbrev-ref HEAD)" != "Kotlin"

      - name: Patch native inference parser and migration feature gate
        run: |
          python3 - <<'PY'
          from pathlib import Path

          native = Path("rust/crates/mukei-android-jni/src/native_inference.rs")
          text = native.read_text()
          before = '''pub(crate) fn implementation_available() -> bool {
              unsafe { mukei_llama_abi_version() } == EXPECTED_ABI_VERSION
                  && native_build_id().as_deref() == Some(EXPECTED_BUILD_ID)
          }
          '''
          after = '''pub(crate) fn implementation_available() -> bool {
              let abi_version = unsafe { mukei_llama_abi_version() };
              abi_version == EXPECTED_ABI_VERSION
                  && native_build_id().as_deref() == Some(EXPECTED_BUILD_ID)
          }
          '''
          if before in text:
              text = text.replace(before, after, 1)
              native.write_text(text)
          elif "let abi_version = unsafe { mukei_llama_abi_version() };" not in text:
              raise SystemExit("native inference ABI anchor not found")

          migration_test = Path("rust/crates/mukei-core/tests/universal_storage_embedded_migrations.rs")
          text = migration_test.read_text()
          gate = '#![cfg(feature = "rusqlite")]\n\n'
          if not text.startswith(gate):
              migration_test.write_text(gate + text)
          PY

      - name: Verify patch scope
        run: |
          git diff --check
          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            rust/crates/mukei-android-jni/src/native_inference.rs \
            rust/crates/mukei-core/tests/universal_storage_embedded_migrations.rs | sort)"
          test "$changed" = "$expected"

      - name: Commit source fixes
        run: |
          if git diff --quiet; then
            echo "Rust source blockers already fixed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            rust/crates/mukei-android-jni/src/native_inference.rs \
            rust/crates/mukei-core/tests/universal_storage_embedded_migrations.rs
          git commit -m "fix(rust): clear workspace parser and feature-gate blockers"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
