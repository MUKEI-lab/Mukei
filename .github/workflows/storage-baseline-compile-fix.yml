name: storage-baseline-compile-fix

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-baseline-compile-fix.yml
      - rust/crates/mukei-core/src/lib.rs
      - rust/crates/mukei-core/src/application_runtime/foundation_types.rs
      - rust/crates/mukei-core/src/application_runtime/foundation_state.rs
      - rust/crates/mukei-core/src/storage/runtime_projection.rs
      - rust/crates/mukei-core/src/ui_protocol.rs
  workflow_dispatch:

concurrency:
  group: storage-baseline-compile-fix
  cancel-in-progress: false

permissions:
  contents: write
  statuses: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  patch-verify-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Install Rust 1.82
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
      - name: Apply idempotent Cargo blocker fixes
        id: patch
        shell: python
        run: |
          from pathlib import Path
          import os
          import re
          import traceback

          log_dir = Path('ci-baseline-compile-logs')
          log_dir.mkdir(exist_ok=True)
          changed_files = []

          def save(path: Path, before: str, after: str) -> None:
              if before != after:
                  path.write_text(after, encoding='utf-8')
                  changed_files.append(str(path))

          try:
              types_path = Path('rust/crates/mukei-core/src/application_runtime/foundation_types.rs')
              before = types_path.read_text(encoding='utf-8')
              types = before
              types, count = re.subn(
                  r'\A//! Platform-neutral application runtime owned by the native process\.\n//!\n//! Protocol V2 commands are validated once, routed to feature handlers, tracked\n//! as cancellable operations, projected through ordered events, and exposed via\n//! authoritative snapshots\. Android-only services are accessed through the\n//! pull-based platform broker in \[`crate::platform`\]\.\n',
                  '// Platform-neutral application runtime owned by the native process.\n//\n// Protocol V2 commands are validated once, routed to feature handlers, tracked\n// as cancellable operations, projected through ordered events, and exposed via\n// authoritative snapshots. Android-only services are accessed through the\n// pull-based platform broker in `crate::platform`.\n',
                  types,
                  count=1,
              )
              if count == 0 and not types.startswith('// Platform-neutral application runtime'):
                  raise RuntimeError('foundation_types header shape is unexpected')

              types = types.replace(
                  'validate_command, AcknowledgementStatus, CommandAcknowledgementV2, CommandEnvelopeV2,',
                  'validate_command, CommandAcknowledgementV2, CommandEnvelopeV2,',
                  1,
              )
              test_import = '#[cfg(test)]\nuse crate::ui_protocol::AcknowledgementStatus;\n'
              if test_import not in types:
                  match = re.search(r'use crate::ui_protocol::\{.*?\n\};\n', types, flags=re.S)
                  if not match:
                      raise RuntimeError('ui_protocol import block not found')
                  insert_at = match.end()
                  types = types[:insert_at] + test_import + types[insert_at:]
              save(types_path, before, types)

              state_path = Path('rust/crates/mukei-core/src/application_runtime/foundation_state.rs')
              before = state_path.read_text(encoding='utf-8')
              state = before.replace(
                  '.map_err(|error| MukeiError::DatabaseCorruption)?;',
                  '.map_err(|_| MukeiError::DatabaseCorruption)?;',
                  1,
              )
              state, removed = re.subn(
                  r'\n    fn model\(&self, model_id: &str\) -> Option<ModelProjection> \{\n.*?\n    \}\n',
                  '\n',
                  state,
                  count=1,
                  flags=re.S,
              )
              if removed == 0 and 'fn model(&self, model_id: &str)' in state:
                  raise RuntimeError('model accessor shape is unexpected')
              save(state_path, before, state)

              lib_path = Path('rust/crates/mukei-core/src/lib.rs')
              before = lib_path.read_text(encoding='utf-8')
              lib = before
              if '#[allow(missing_docs)]\npub mod application_runtime;' not in lib:
                  lib, count = re.subn(
                      r'#\[cfg\(feature = "tokio"\)\]\npub mod application_runtime;',
                      '#[cfg(feature = "tokio")]\n#[allow(missing_docs)]\npub mod application_runtime;',
                      lib,
                      count=1,
                  )
                  if count != 1:
                      raise RuntimeError('application_runtime module declaration not found')
              save(lib_path, before, lib)

              projection_path = Path('rust/crates/mukei-core/src/storage/runtime_projection.rs')
              before = projection_path.read_text(encoding='utf-8')
              projection = before.replace(
                  'DatabasePool::open(directory.path().join("projection.db"))',
                  'DatabasePool::open(&directory.path().join("projection.db"))',
                  1,
              )
              if (
                  'DatabasePool::open(directory.path().join("projection.db"))' in projection
                  or 'DatabasePool::open(&directory.path().join("projection.db"))' not in projection
              ):
                  raise RuntimeError('runtime projection DatabasePool::open marker not resolved')
              save(projection_path, before, projection)

              protocol_path = Path('rust/crates/mukei-core/src/ui_protocol.rs')
              before = protocol_path.read_text(encoding='utf-8')
              protocol = before
              constant = 'pub const CAP_SCOPED_CHAT_OPERATIONS: &str = "scoped_chat_operations";'
              if constant not in protocol:
                  anchor = '/// Capability: command-correlated operation lifecycle events.\npub const CAP_OPERATION_LIFECYCLE_EVENTS: &str = "operation_lifecycle_events";\n'
                  if anchor not in protocol:
                      raise RuntimeError('protocol capability constant anchor not found')
                  protocol = protocol.replace(
                      anchor,
                      anchor + '/// Capability: chat operations require explicit conversation, branch, and operation scope.\n' + constant + '\n',
                      1,
                  )
              capability_entry = '                CAP_SCOPED_CHAT_OPERATIONS.into(),\n'
              if capability_entry not in protocol:
                  anchor = '                CAP_OPERATION_LIFECYCLE_EVENTS.into(),\n'
                  if anchor not in protocol:
                      raise RuntimeError('protocol capability vector anchor not found')
                  protocol = protocol.replace(anchor, anchor + capability_entry, 1)
              save(protocol_path, before, protocol)

              (log_dir / 'patch-summary.txt').write_text(
                  'changed=' + (','.join(changed_files) if changed_files else 'none') + '\n',
                  encoding='utf-8',
              )
              patch_ok = True
          except Exception:
              patch_ok = False
              (log_dir / 'patch-error.log').write_text(traceback.format_exc(), encoding='utf-8')

          with open(Path(os.environ['GITHUB_OUTPUT']), 'a', encoding='utf-8') as output:
              output.write(f'patch_ok={str(patch_ok).lower()}\n')
              output.write(f'changed={str(bool(changed_files)).lower()}\n')
      - name: Verify mukei-core compile
        id: verify
        if: steps.patch.outputs.patch_ok == 'true'
        shell: bash
        run: |
          set +e
          cd rust
          cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets \
            > ../ci-baseline-compile-logs/check.log 2>&1
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "check=$code" > ../ci-baseline-compile-logs/summary.txt
          exit 0
      - name: Upload compile diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-baseline-compile-${{ github.sha }}
          path: ci-baseline-compile-logs
          if-no-files-found: error
          retention-days: 7
      - name: Enforce patch and compile result
        shell: bash
        run: |
          test '${{ steps.patch.outputs.patch_ok }}' = 'true'
          test '${{ steps.verify.outputs.code }}' = '0'
      - name: Commit verified compile fixes
        if: steps.patch.outputs.changed == 'true'
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add \
            rust/crates/mukei-core/src/lib.rs \
            rust/crates/mukei-core/src/application_runtime/foundation_types.rs \
            rust/crates/mukei-core/src/application_runtime/foundation_state.rs \
            rust/crates/mukei-core/src/storage/runtime_projection.rs \
            rust/crates/mukei-core/src/ui_protocol.rs
          git commit -m "fix(core): repair mukei-core Cargo blockers"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'storage-baseline-compile-fix',
              description: 'mukei-core Cargo blockers repaired',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const description = `patch=${{ steps.patch.outputs.patch_ok || '?' }}, check=${{ steps.verify.outputs.code || '?' }}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'storage-baseline-compile-fix',
              description: description.slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
