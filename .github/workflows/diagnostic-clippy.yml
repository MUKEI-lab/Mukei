name: diagnostic-clippy

on:
  push:
    branches: [ agent/diagnose-current-ci ]

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/diagnose-current-ci
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Capture Clippy diagnostics
        working-directory: rust
        shell: bash
        run: |
          set +e
          cargo clippy -p mukei-core --no-default-features --features std,tokio --lib --tests -- -D warnings > /tmp/clippy.log 2>&1
          status=$?
          {
            echo "EXIT_STATUS=$status"
            tail -n 220 /tmp/clippy.log
          } > ../clippy-diagnostics.txt
          exit 0
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clippy-diagnostics.txt
          git commit -m "chore(ci): capture core clippy diagnostics"
          git push origin HEAD:agent/diagnose-current-ci
