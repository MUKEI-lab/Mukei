name: protocol-v2-rustfmt-runner

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.ref == 'checkpoint/stabilization-2026-07-12'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: checkpoint/stabilization-2026-07-12
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply canonical rustfmt output
        working-directory: rust
        run: cargo fmt --all
      - name: Commit formatter result and remove runner
        run: |
          rm -f .github/workflows/protocol-v2-rustfmt-runner.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "style: format Protocol V2 producer conformance test"
          git push origin HEAD:checkpoint/stabilization-2026-07-12
