name: android-emulator-smoke

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/android-emulator-smoke.yml"

permissions:
  contents: read

concurrency:
  group: android-emulator-smoke-${{ github.ref_name }}
  cancel-in-progress: true

env:
  QT_VERSION: "6.8.3"
  ANDROID_NDK_VERSION: "26.1.10909125"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.1"

jobs:
  ui-shell-smoke:
    name: Stub UI shell on Android 35 emulator
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install host tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build p7zip-full libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0
          python -m pip install --upgrade pip
          python -m pip install "aqtinstall==3.3.*" "py7zr==1.1.*"

      - name: Install Android SDK, emulator and NDK
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          SDKMANAGER="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          yes | "${SDKMANAGER}" --licenses >/dev/null 2>&1 || true
          "${SDKMANAGER}" \
            "platform-tools" \
            "emulator" \
            "platforms;android-35" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "system-images;android-35;google_apis;x86_64"
          echo "ANDROID_HOME=${SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_SDK_ROOT=${SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "${SDK_ROOT}/platform-tools" >> "${GITHUB_PATH}"
          echo "${SDK_ROOT}/emulator" >> "${GITHUB_PATH}"
          echo "${SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}" >> "${GITHUB_PATH}"

      - name: Install Qt Android x86_64 and host kits
        shell: bash
        run: |
          set -euo pipefail
          QT_INSTALL_ROOT="${RUNNER_TEMP}/Qt"
          aqt install-qt \
            linux android "${QT_VERSION}" android_x86_64 \
            --autodesktop \
            --outputdir "${QT_INSTALL_ROOT}" \
            --external 7z
          QT_ANDROID_ROOT="${QT_INSTALL_ROOT}/${QT_VERSION}/android_x86_64"
          QT_HOST_ROOT="${QT_INSTALL_ROOT}/${QT_VERSION}/gcc_64"
          test -x "${QT_ANDROID_ROOT}/bin/qt-cmake"
          echo "QT_ANDROID_ROOT=${QT_ANDROID_ROOT}" >> "${GITHUB_ENV}"
          echo "QT_HOST_ROOT=${QT_HOST_ROOT}" >> "${GITHUB_ENV}"

      - name: Build deterministic stub UI APK
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          mkdir -p dist/emulator/evidence
          python3 scripts/android/prepare-branding.py verify
          STATE="${RUNNER_TEMP}/branding-state.json"
          python3 scripts/android/prepare-branding.py materialize --repo-root "${GITHUB_WORKSPACE}" --state "${STATE}"
          trap 'python3 scripts/android/prepare-branding.py cleanup --repo-root "${GITHUB_WORKSPACE}" --state "${STATE}" || true' EXIT

          BUILD_DIR="${RUNNER_TEMP}/mukei-emulator-build"
          "${QT_ANDROID_ROOT}/bin/qt-cmake" \
            -S qml \
            -B "${BUILD_DIR}" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-34 \
            -DANDROID_SDK_ROOT="${ANDROID_SDK_ROOT}" \
            -DANDROID_NDK_ROOT="${ANDROID_NDK_ROOT}" \
            -DQT_HOST_PATH="${QT_HOST_ROOT}" \
            -DQT_ANDROID_BUILD_ALL_ABIS=OFF \
            -DMUKEI_USE_REAL_BRIDGE=OFF \
            -DMUKEI_USE_NATIVE_INFERENCE=OFF \
            2>&1 | tee dist/emulator/evidence/configure.log

          cmake --build "${BUILD_DIR}" --target help \
            > dist/emulator/evidence/targets.txt 2>&1
          grep -E '(^|[[:space:]])mukei(_make_apk)?($|[[:space:]])' \
            dist/emulator/evidence/targets.txt || true

          cmake --build "${BUILD_DIR}" --target mukei --parallel 2 \
            2>&1 | tee dist/emulator/evidence/build-mukei.log
          cmake --build "${BUILD_DIR}" --target mukei_make_apk --parallel 2 \
            2>&1 | tee dist/emulator/evidence/package-apk.log

          find "${BUILD_DIR}" -type f -name '*.apk' -print \
            | sort | tee dist/emulator/evidence/apk-candidates.txt
          APK="$(tail -n 1 dist/emulator/evidence/apk-candidates.txt)"
          test -n "${APK}"
          cp "${APK}" dist/emulator/mukei-ui-shell-emulator.apk
          python3 scripts/android/prepare-branding.py cleanup --repo-root "${GITHUB_WORKSPACE}" --state "${STATE}"
          trap - EXIT

      - name: Launch emulator and exercise core navigation
        shell: bash
        run: |
          set -uo pipefail
          EVIDENCE="dist/emulator/evidence"
          PACKAGE="app.mukei"
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          AVD_NAME="mukei-ci-api35"
          AVD_HOME="${RUNNER_TEMP}/android-avd"
          EMULATOR_PID=""
          mkdir -p "${EVIDENCE}" "${AVD_HOME}"
          export ANDROID_AVD_HOME="${AVD_HOME}"
          exec > >(tee -a "${EVIDENCE}/runtime-smoke.log") 2>&1

          collect_evidence() {
            adb devices -l > "${EVIDENCE}/adb-devices.txt" 2>&1 || true
            adb logcat -d -v threadtime > "${EVIDENCE}/logcat.txt" 2>&1 || true
            adb shell dumpsys package "${PACKAGE}" > "${EVIDENCE}/package-dumpsys.txt" 2>&1 || true
            adb shell dumpsys activity activities > "${EVIDENCE}/activity-dumpsys.txt" 2>&1 || true
            adb shell ps -A > "${EVIDENCE}/processes.txt" 2>&1 || true
            adb exec-out screencap -p > "${EVIDENCE}/failure-screen.png" 2>/dev/null || true
            if [[ -n "${EMULATOR_PID}" ]]; then
              kill "${EMULATOR_PID}" 2>/dev/null || true
            fi
          }
          trap collect_evidence EXIT

          printf 'no\n' | "${SDK_ROOT}/cmdline-tools/latest/bin/avdmanager" create avd \
            --force \
            --name "${AVD_NAME}" \
            --package "system-images;android-35;google_apis;x86_64" \
            2>&1 | tee "${EVIDENCE}/avd-create.log"

          "${SDK_ROOT}/emulator/emulator" \
            -avd "${AVD_NAME}" \
            -no-window \
            -gpu swiftshader_indirect \
            -no-snapshot \
            -noaudio \
            -no-boot-anim \
            -camera-back none \
            > "${EVIDENCE}/emulator.log" 2>&1 &
          EMULATOR_PID=$!
          printf '%s\n' "${EMULATOR_PID}" > "${EVIDENCE}/emulator-host-pid.txt"

          adb start-server
          BOOTED=false
          for _ in $(seq 1 180); do
            if ! kill -0 "${EMULATOR_PID}" 2>/dev/null; then
              echo "Emulator process exited before Android boot completed." >&2
              break
            fi
            BOOT_STATE="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')"
            if [[ "${BOOT_STATE}" == "1" ]]; then
              BOOTED=true
              break
            fi
            sleep 2
          done
          printf '%s\n' "${BOOTED}" | tee "${EVIDENCE}/booted.txt"
          if [[ "${BOOTED}" != "true" ]]; then
            echo "Android emulator did not complete boot within the bounded timeout." >&2
            exit 1
          fi

          adb shell settings put global window_animation_scale 0 || true
          adb shell settings put global transition_animation_scale 0 || true
          adb shell settings put global animator_duration_scale 0 || true
          adb get-state | tee "${EVIDENCE}/adb-state.txt"

          if ! adb install -r dist/emulator/mukei-ui-shell-emulator.apk \
              2>&1 | tee "${EVIDENCE}/install.txt"; then
            echo "APK installation failed." >&2
            exit 1
          fi

          adb logcat -c || true
          adb shell am force-stop "${PACKAGE}" || true
          LAUNCHER="$(adb shell cmd package resolve-activity --brief \
            -a android.intent.action.MAIN \
            -c android.intent.category.LAUNCHER \
            "${PACKAGE}" 2>&1 | tr -d '\r' | tail -n 1)"
          printf '%s\n' "${LAUNCHER}" | tee "${EVIDENCE}/launcher-activity.txt"
          if [[ -z "${LAUNCHER}" || "${LAUNCHER}" == *"No activity found"* ]]; then
            echo "Launcher activity could not be resolved." >&2
            exit 1
          fi

          if ! adb shell am start -W -n "${LAUNCHER}" \
              2>&1 | tee "${EVIDENCE}/launch.txt"; then
            echo "Launcher activity failed to start." >&2
            exit 1
          fi

          PID=""
          for _ in $(seq 1 30); do
            PID="$(adb shell pidof "${PACKAGE}" 2>/dev/null | tr -d '\r')"
            [[ -n "${PID}" ]] && break
            sleep 1
          done
          printf '%s\n' "${PID}" | tee "${EVIDENCE}/pid.txt"
          adb exec-out screencap -p > "${EVIDENCE}/01-launch.png" 2>/dev/null || true
          adb shell uiautomator dump /sdcard/mukei-launch.xml \
            > "${EVIDENCE}/uiautomator-launch.txt" 2>&1 || true
          adb pull /sdcard/mukei-launch.xml "${EVIDENCE}/launch-window.xml" \
            > "${EVIDENCE}/uiautomator-pull.txt" 2>&1 || true
          if [[ -z "${PID}" ]]; then
            echo "Mukei process was not alive after launch." >&2
            exit 1
          fi

          SETTINGS_X=990
          SETTINGS_Y=180
          printf '%s %s\n' "${SETTINGS_X}" "${SETTINGS_Y}" \
            | tee "${EVIDENCE}/settings-tap.txt"
          adb shell input tap "${SETTINGS_X}" "${SETTINGS_Y}"
          sleep 2
          adb exec-out screencap -p > "${EVIDENCE}/02-settings.png"
          adb shell uiautomator dump /sdcard/mukei-settings.xml \
            > "${EVIDENCE}/uiautomator-settings.txt" 2>&1 || true
          adb pull /sdcard/mukei-settings.xml "${EVIDENCE}/settings-window.xml" \
            > "${EVIDENCE}/uiautomator-settings-pull.txt" 2>&1 || true

          adb shell input keyevent 4
          sleep 1
          adb exec-out screencap -p > "${EVIDENCE}/03-back.png"
          FINAL_PID="$(adb shell pidof "${PACKAGE}" 2>/dev/null | tr -d '\r')"
          printf '%s\n' "${FINAL_PID}" | tee "${EVIDENCE}/final-pid.txt"
          [[ -n "${FINAL_PID}" ]]

      - name: Upload emulator evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mukei-android-emulator-smoke-evidence
          path: dist/emulator
          if-no-files-found: error
          retention-days: 14
