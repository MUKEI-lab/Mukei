name: protocol-v2-contract-runner

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'checkpoint/stabilization-2026-07-12'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: checkpoint/stabilization-2026-07-12
          fetch-depth: 0
      - name: Apply reviewed Protocol V2 contract patch
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python3 .github/protocol_v2_contract_patch.py 2>&1 | tee /tmp/protocol-v2-contract-patch.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -eq 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --cached --check
            git commit -m "protocol: align V2 chat wire contract end to end"
            git push origin HEAD:checkpoint/stabilization-2026-07-12
          fi
          exit "$status"
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: protocol-v2-contract-patch-log
          path: /tmp/protocol-v2-contract-patch.log
          retention-days: 1
      - name: Enforce patch result
        if: steps.patch.outputs.status != '0'
        run: exit 1
