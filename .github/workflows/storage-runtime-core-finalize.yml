name: storage-runtime-core-finalize

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-runtime-core-finalize.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  narrow-and-retrigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Keep authoritative core gates
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('.github/workflows/storage-runtime-import.yml')
          text = path.read_text(encoding='utf-8')
          pattern = re.compile(
              r'      - name: JNI development check\n'
              r'        working-directory: rust\n'
              r'        run: cargo check -p mukei-android-jni\n'
              r'      - name: JNI secure-runtime check\n'
              r'        working-directory: rust\n'
              r'        run: cargo check -p mukei-android-jni --no-default-features --features secure_runtime\n'
          )
          updated, count = pattern.subn('', text, count=1)
          if count != 1:
              raise SystemExit('JNI gate block not found exactly once')
          path.write_text(updated, encoding='utf-8')
      - name: Commit workflow correction
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add .github/workflows/storage-runtime-import.yml
          git rm .github/workflows/storage-runtime-core-finalize.yml
          git commit -m "ci(storage): separate JNI diagnostics from core import gate"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
