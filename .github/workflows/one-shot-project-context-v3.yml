name: one-shot-project-context-v3

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-project-context-v3.yml'

permissions:
  contents: write
  statuses: write

jobs:
  wire-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'project-context-v3', description: 'Wiring isolated Project context with semantic anchors', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.82.0'
          components: rustfmt,clippy
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Apply semantic context wiring
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def edit(path, fn):
              p=Path(path); s=p.read_text(encoding='utf-8'); n=fn(s); p.write_text(n, encoding='utf-8')
          def once(s, old, new, label):
              c=s.count(old); print(label, c)
              if c != 1: raise SystemExit(f'{label}: expected 1, got {c}')
              return s.replace(old,new,1)
          def after(s, anchor, text, label):
              return once(s, anchor, anchor+text, label)
          def before(s, anchor, text, label):
              return once(s, anchor, text+anchor, label)

          # Encrypted projection model: additive fields default for legacy records.
          def patch_state(s):
              s=once(s, 'struct ProjectProjection {', '''struct ProjectMemoryEntry {
              memory_id: String,
              content: String,
              created_at: DateTime<Utc>,
              updated_at: DateTime<Utc>,
          }

          #[derive(Clone, Debug, Serialize, Deserialize)]
          struct ProjectProjection {''', 'state.project_struct')
              s=after(s, '    description: String,\n', '''    #[serde(default)]
              instructions: String,
              #[serde(default)]
              memory: Vec<ProjectMemoryEntry>,
          ''', 'state.project_fields')
              return s
          edit('rust/crates/mukei-core/src/application_runtime/foundation_state.rs', patch_state)

          def patch_protocol(s):
              s=once(s,'pub const PROTOCOL_MINOR: u16 = 2;','pub const PROTOCOL_MINOR: u16 = 3;','protocol.minor')
              s=after(s,'    ProjectArchive,\n','''    /// Replace persistent instructions owned by one active project.
              ProjectInstructionsUpdate,
              /// Add one isolated memory entry to an active project.
              ProjectMemoryAdd,
              /// Update one isolated memory entry inside its owning project.
              ProjectMemoryUpdate,
              /// Delete one isolated memory entry inside its owning project.
              ProjectMemoryDelete,
          ''','protocol.command_variants')
              s=after(s,'            "project.archive" => Some(Self::ProjectArchive),\n','''            "project.instructions.update" => Some(Self::ProjectInstructionsUpdate),
              "project.memory.add" => Some(Self::ProjectMemoryAdd),
              "project.memory.update" => Some(Self::ProjectMemoryUpdate),
              "project.memory.delete" => Some(Self::ProjectMemoryDelete),
          ''','protocol.parse')
              s=after(s,'            Self::ProjectArchive => "project.archive",\n','''            Self::ProjectInstructionsUpdate => "project.instructions.update",
              Self::ProjectMemoryAdd => "project.memory.add",
              Self::ProjectMemoryUpdate => "project.memory.update",
              Self::ProjectMemoryDelete => "project.memory.delete",
          ''','protocol.as_str')
              s=after(s,'                | Self::ProjectArchive\n','''                | Self::ProjectInstructionsUpdate
              | Self::ProjectMemoryAdd
              | Self::ProjectMemoryUpdate
              | Self::ProjectMemoryDelete
          ''','protocol.idempotency')
              payloads='''/// Persistent instructions owned by one project.
          #[derive(Clone, Debug, PartialEq, Eq, Serialize, Deserialize)]
          pub struct ProjectInstructionsPayload {
              /// Stable project identity allocated by the native runtime.
              pub project_id: String,
              /// Replacement instructions. Empty content explicitly clears instructions.
              pub instructions: String,
          }

          /// New isolated memory entry owned by one project.
          #[derive(Clone, Debug, PartialEq, Eq, Serialize, Deserialize)]
          pub struct ProjectMemoryCreatePayload {
              /// Stable project identity that owns the memory entry.
              pub project_id: String,
              /// User-authored memory content.
              pub content: String,
          }

          /// Mutable isolated project-memory payload.
          #[derive(Clone, Debug, PartialEq, Eq, Serialize, Deserialize)]
          pub struct ProjectMemoryUpdatePayload {
              /// Stable project identity that owns the memory entry.
              pub project_id: String,
              /// Stable memory identity allocated inside the owning project.
              pub memory_id: String,
              /// Replacement user-authored memory content.
              pub content: String,
          }

          /// Identity pair for one memory entry inside one project.
          #[derive(Clone, Debug, PartialEq, Eq, Serialize, Deserialize)]
          pub struct ProjectMemoryPayload {
              /// Stable project identity that owns the memory entry.
              pub project_id: String,
              /// Stable memory identity that must resolve inside that project only.
              pub memory_id: String,
          }

          '''
              s=before(s,'/// Product setting mutation payload.\n',payloads,'protocol.payload_structs')
              s=after(s,'    Project(ProjectPayload),\n','''    /// Replacement project instructions.
              ProjectInstructions(ProjectInstructionsPayload),
              /// New project-memory content.
              ProjectMemoryCreate(ProjectMemoryCreatePayload),
              /// Updated project-memory content.
              ProjectMemoryUpdate(ProjectMemoryUpdatePayload),
              /// Existing project-memory identity pair.
              ProjectMemory(ProjectMemoryPayload),
          ''','protocol.validated_payloads')
              s=after(s,'            | CommandType::ProjectArchive\n','''            | CommandType::ProjectInstructionsUpdate
              | CommandType::ProjectMemoryAdd
              | CommandType::ProjectMemoryUpdate
              | CommandType::ProjectMemoryDelete
          ''','protocol.scope_group')
              validation='''        CommandType::ProjectInstructionsUpdate => {
              let value: ProjectInstructionsPayload = serde_json::from_value(envelope.payload.clone())
                  .map_err(|_| RejectionReason::InvalidPayload)?;
              if !valid_protocol_id(&value.project_id, MAX_PROTOCOL_ID_LEN)
                  || value.instructions.len() > 4 * 1024
                  || value.instructions.chars().any(|character| character == '\0')
              {
                  return Err(RejectionReason::InvalidPayload);
              }
              ValidatedCommandPayload::ProjectInstructions(value)
          }
          CommandType::ProjectMemoryAdd => {
              let value: ProjectMemoryCreatePayload = serde_json::from_value(envelope.payload.clone())
                  .map_err(|_| RejectionReason::InvalidPayload)?;
              if !valid_protocol_id(&value.project_id, MAX_PROTOCOL_ID_LEN)
                  || !non_empty_bounded(&value.content, 1024)
                  || value.content.chars().any(|character| character == '\0')
              {
                  return Err(RejectionReason::InvalidPayload);
              }
              ValidatedCommandPayload::ProjectMemoryCreate(value)
          }
          CommandType::ProjectMemoryUpdate => {
              let value: ProjectMemoryUpdatePayload = serde_json::from_value(envelope.payload.clone())
                  .map_err(|_| RejectionReason::InvalidPayload)?;
              if !valid_protocol_id(&value.project_id, MAX_PROTOCOL_ID_LEN)
                  || !valid_protocol_id(&value.memory_id, MAX_PROTOCOL_ID_LEN)
                  || !non_empty_bounded(&value.content, 1024)
                  || value.content.chars().any(|character| character == '\0')
              {
                  return Err(RejectionReason::InvalidPayload);
              }
              ValidatedCommandPayload::ProjectMemoryUpdate(value)
          }
          CommandType::ProjectMemoryDelete => {
              let value: ProjectMemoryPayload = serde_json::from_value(envelope.payload.clone())
                  .map_err(|_| RejectionReason::InvalidPayload)?;
              if !valid_protocol_id(&value.project_id, MAX_PROTOCOL_ID_LEN)
                  || !valid_protocol_id(&value.memory_id, MAX_PROTOCOL_ID_LEN)
              {
                  return Err(RejectionReason::InvalidPayload);
              }
              ValidatedCommandPayload::ProjectMemory(value)
          }
          '''
              s=before(s,'        CommandType::SettingsUpdate => {\n',validation,'protocol.validation')
              return s
          edit('rust/crates/mukei-core/src/ui_protocol.rs',patch_protocol)

          def patch_base(s):
              return after(s,'            CommandType::ProjectArchive,\n','''            CommandType::ProjectInstructionsUpdate,
              CommandType::ProjectMemoryAdd,
              CommandType::ProjectMemoryUpdate,
              CommandType::ProjectMemoryDelete,
          ''','base.capabilities')
          edit('rust/crates/mukei-core/src/application_runtime/base.rs',patch_base)

          def patch_router(s):
              return after(s,'            CommandType::ProjectArchive => runtime.archive_project(command),\n','''            CommandType::ProjectInstructionsUpdate => runtime.update_project_instructions(command),
              CommandType::ProjectMemoryAdd => runtime.add_project_memory(command),
              CommandType::ProjectMemoryUpdate => runtime.update_project_memory(command),
              CommandType::ProjectMemoryDelete => runtime.delete_project_memory(command),
          ''','router.dispatch')
          edit('rust/crates/mukei-core/src/application_runtime/documents_snapshot.rs',patch_router)

          def patch_backend(s):
              methods='''fun updateProjectInstructions(projectId: String, instructions: String): ProjectCommandSubmission =
              submitProjectCommand(
                  commandType = "project.instructions.update",
                  payload = JSONObject().put("project_id", projectId).put("instructions", instructions),
              )

          fun addProjectMemory(projectId: String, content: String): ProjectCommandSubmission =
              submitProjectCommand(
                  commandType = "project.memory.add",
                  payload = JSONObject().put("project_id", projectId).put("content", content),
              )

          fun updateProjectMemory(
              projectId: String,
              memoryId: String,
              content: String,
          ): ProjectCommandSubmission = submitProjectCommand(
              commandType = "project.memory.update",
              payload = JSONObject()
                  .put("project_id", projectId)
                  .put("memory_id", memoryId)
                  .put("content", content),
          )

          fun deleteProjectMemory(projectId: String, memoryId: String): ProjectCommandSubmission =
              submitProjectCommand(
                  commandType = "project.memory.delete",
                  payload = JSONObject().put("project_id", projectId).put("memory_id", memoryId),
              )

          '''
              s=before(s,'private fun submitProjectCommand(\n',methods,'backend.methods')
              s=once(s,'.put("protocol_version", JSONObject().put("major", 2).put("minor", 2))','.put("protocol_version", JSONObject().put("major", 2).put("minor", 3))','backend.protocol_minor')
              return s
          edit('android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt',patch_backend)

          def patch_ui(s):
              marker='text = "This project identity is persisted by the encrypted native runtime. Chat and file membership will attach to this identity instead of creating a second storage system."'
              pos=s.find(marker)
              if pos < 0: raise SystemExit('ui.project_workspace marker missing')
              banner=s.find('            banner?.let { message ->',pos)
              if banner < 0: raise SystemExit('ui.detail banner anchor missing')
              insert='''            Spacer(Modifier.height(MukeiSpacing.Medium))
              ProjectContextSurface(
                  projectId = project.projectId,
                  readOnly = project.state == ProjectState.ARCHIVED,
              )

          '''
              return s[:banner]+insert+s[banner:]
          edit('android/app/src/main/kotlin/ai/mukei/android/ProjectsSurface.kt',patch_ui)
          PY
          cargo fmt --manifest-path rust/Cargo.toml --all
          git diff --check
      - name: Strict Rust checks and isolation tests
        shell: bash
        env:
          RUSTFLAGS: -D warnings
        run: |
          set -euo pipefail
          cargo check --manifest-path rust/Cargo.toml -p mukei-core --all-features
          cargo test --manifest-path rust/Cargo.toml -p mukei-core project_context_tests --all-features
      - name: Compile Android Project UI
        shell: bash
        run: gradle -p android :app:compileDebugKotlin --stacktrace
      - name: Commit Project context feature
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'mukei-project-context-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add rust/crates/mukei-core/src/ui_protocol.rs rust/crates/mukei-core/src/application_runtime/foundation_state.rs rust/crates/mukei-core/src/application_runtime/base.rs rust/crates/mukei-core/src/application_runtime/documents_snapshot.rs android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt android/app/src/main/kotlin/ai/mukei/android/ProjectsSurface.kt
          git commit -m 'Wire Project instructions and isolated memory'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'project-context-v3', description: 'Project context wiring passed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'project-context-v3', description: 'Project context wiring failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
