name: patch-kotlin-source-only-port

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/patch-kotlin-source-only-port.yml

permissions:
  contents: write
  statuses: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Publish pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'patch-kotlin-source-only-port', description: 'Separating source ports from workflow updates', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Remove workflow-only commits from runner
        shell: python
        run: |
          from pathlib import Path

          path = Path('scripts/port_kotlin_selected.sh')
          text = path.read_text(encoding='utf-8')
          for sha in [
              '29f2b764768707b509ba04aad123baf721d93983',
              '2196c690d9ecfdee2a91f33741f280208d1f3762',
              '5674765ce56aea807f9a1048607935e41d31070a',
              'e9233b4b52a8f801769b72f4acfa60c465a32345',
              '65c68d6951ab4fd06195d783eca444aa41233d1a',
          ]:
              text = text.replace(f'  {sha}\n', '', 1)

          workflow_start = text.find("workflow = Path('.github/workflows/android-kotlin-ci.yml')")
          if workflow_start >= 0:
              workflow_end_marker = "workflow.write_text(text, encoding='utf-8')\n"
              workflow_end = text.index(workflow_end_marker, workflow_start) + len(workflow_end_marker)
              text = text[:workflow_start] + text[workflow_end:]

          cleanup_start = text.find('rm -f .github/workflows/kotlin-selective-port-audit.yml')
          if cleanup_start >= 0:
              cleanup_end = text.index('rm -f scripts/port_kotlin_selected.sh', cleanup_start)
              text = text[:cleanup_start] + text[cleanup_end:]

          path.write_text(text, encoding='utf-8')
      - name: Commit source-only runner
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add scripts/port_kotlin_selected.sh
          git rm .github/workflows/patch-kotlin-source-only-port.yml
          git commit -m "fix(ci): separate Kotlin source ports from workflow updates"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'patch-kotlin-source-only-port', description: 'Source-only Kotlin port runner ready', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'patch-kotlin-source-only-port', description: 'Source-only runner patch failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
