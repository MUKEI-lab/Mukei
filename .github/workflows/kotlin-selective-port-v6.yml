name: kotlin-selective-port-v6

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/kotlin-selective-port-v6.yml

permissions:
  contents: write
  statuses: write

concurrency:
  group: kotlin-selective-port-v6
  cancel-in-progress: true

jobs:
  port:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy,rustfmt
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'kotlin-selective-port-v6', description: 'Porting selected Kotlin fixes with full verification', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Cherry-pick and verify selected fixes
        shell: bash
        run: |
          set -o pipefail
          bash scripts/port_kotlin_selected.sh 2>&1 | tee kotlin-port.log
      - name: Upload complete port diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-selective-port-v6-${{ github.sha }}
          path: kotlin-port.log
          retention-days: 7
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'kotlin-selective-port-v6', description: 'Selected Kotlin fixes ported and verified', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'kotlin-selective-port-v6', description: 'Selected Kotlin port failed verification', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
