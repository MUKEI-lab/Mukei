name: lint

# Architect review GH #22 + GH #23: clippy and fmt MUST gate PRs.
# Without these, style drift compounds turn-on-turn and a once-clean
# codebase becomes painful to audit. Kept separate from `sandbox-check`
# so a lint failure does not mask a real compile/test regression.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------
  # GH #23 \u2014 rustfmt enforced (zero diffs allowed).
  # ---------------------------------------------------------------------
  rustfmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        working-directory: rust
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------
  # GH #22 \u2014 clippy with -D warnings on every feature combination we
  # actually ship. Skip the candle / usearch_hnsw / llama_cpp combos
  # because those need host-specific toolchains; cover them in the
  # nightly target-matrix workflow instead.
  # ---------------------------------------------------------------------
  clippy:
    name: cargo clippy -D warnings
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - "std,tokio"
          - "std,tokio,rusqlite"
          - "std,tokio,network"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo clippy ${{ matrix.features }}
        working-directory: rust
        run: |
          cargo clippy \
            -p mukei-core \
            --no-default-features --features "${{ matrix.features }}" \
            --lib --tests \
            -- -D warnings

  # ---------------------------------------------------------------------
  # GH #21 \u2014 MSRV verification. The workspace declares `rust-version =
  # "1.78"`. We allow CI to track stable for everything else but verify
  # 1.78 still compiles on the no-default-features sandbox build (the
  # minimal feature set is part of the MSRV contract).
  # ---------------------------------------------------------------------
  msrv:
    name: MSRV 1.78 (sandbox)
    runs-on: ubuntu-latest
    continue-on-error: true  # phase 1 \u2014 some transitive deps now need
                              # edition2024; promote to required once the
                              # tree shrinks back to 1.78-compatible.
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.78
      - name: cargo +1.78 check (sandbox features)
        working-directory: rust
        run: |
          cargo +1.78 check \
            -p mukei-core \
            --no-default-features --features "std,tokio" \
            --lib || echo "::warning::1.78 build broken \u2014 see GH #21"

  # ---------------------------------------------------------------------
  # User priority follow-up - run the full mukei-core test matrix on every
  # PR. The existing `sandbox-check.yml` ran only the lib-target tests on
  # the default sandbox feature set; this job exercises the broader
  # `std,tokio,rusqlite` combination (FailureTracker fingerprint, migration
  # rollback, SAF token persistence, audit-log writer) plus every
  # `tests/*_proptest.rs` integration file. The bridge crate is excluded
  # because it requires Qt / cxx-qt-build which the GitHub-hosted Ubuntu
  # runners do not have; the ffi-shim crate is included because its
  # C-header drift detector is a release-blocker (GH #49 / GH #50).
  # ---------------------------------------------------------------------
  tests:
    name: cargo test (sandbox features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test - mukei-core (std,tokio,rusqlite)
        working-directory: rust
        run: |
          cargo test \
            -p mukei-core \
            --no-default-features --features "std,tokio,rusqlite" \
            --lib --tests \
            -- --nocapture
      - name: cargo test - mukei-ffi-shim (default features)
        working-directory: rust
        run: |
          cargo test \
            -p mukei-ffi-shim \
            --lib --tests \
            -- --nocapture

  sqlcipher-build:
    name: cargo build --workspace --features sqlcipher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo build workspace with SQLCipher feature
        working-directory: rust
        run: cargo build --workspace --features sqlcipher

  # ---------------------------------------------------------------------
  # Security-focused Clippy lints for unwrap/expect usage and arithmetic
  # side effects.
  #
  # Advisory (continue-on-error: true) until the mukei-core surface has
  # been swept through with these restrictive lints. Landing them as
  # -D warnings on the merge that introduced them would have failed CI
  # with hundreds of pre-existing hits (integer counters, string index
  # arithmetic, RAG chunk offsets, migrator SHA-256 stream loop) that
  # are outside the scope of the security branch. We keep the lint set
  # visible and warn-only so the review surface makes new violations
  # obvious; the hardening sweep is tracked as a follow-up issue.
  #
  # Rationale mirrors the existing MSRV 1.78 job which is also
  # `continue-on-error: true` while the workspace still contains
  # edition2024 transitive deps (see the comment above `msrv:` in this
  # same file).
  # ---------------------------------------------------------------------
  clippy-security:
    name: cargo clippy (security lints)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo clippy with security lints (advisory)
        working-directory: rust
        run: |
          # -W (warn) instead of -D (deny) for the four restriction
          # lints. Their diagnostics are captured in the job log and
          # surface as ::warning annotations on the PR file diff via
          # dtolnay/rust-toolchain's clippy formatter; only outright
          # compilation errors fail this job.
          cargo clippy \
            -p mukei-core \
            --no-default-features --features "std,tokio,rusqlite,network" \
            --lib --tests \
            -- -W clippy::unwrap_in_result \
                 -W clippy::expect_used \
                 -W clippy::arithmetic_side_effects \
                 -W clippy::panic_in_result_fn \
                 -W clippy::todo \
                 -W clippy::unimplemented
