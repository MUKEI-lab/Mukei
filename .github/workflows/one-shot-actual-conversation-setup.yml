name: one-shot-actual-conversation-setup

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1

concurrency:
  group: actual-conversation-setup
  cancel-in-progress: true

permissions:
  contents: write
  statuses: write

jobs:
  setup-conversations:
    if: github.event.head_commit.message == 'Trigger actual conversation setup'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"pending","context":"actual-conversation-setup","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"Validating first-class conversation setup"}'
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.82.0'
          components: rustfmt,clippy
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Apply exact conversation patches
        run: |
          set -euo pipefail
          python3 .github/scripts/normalize_actual_conversation_patch.py 2>&1 | tee actual-conversation-patch.log
          python3 .github/scripts/patch_actual_conversations.py 2>&1 | tee -a actual-conversation-patch.log
          cargo fmt --manifest-path rust/Cargo.toml --all 2>&1 | tee -a actual-conversation-patch.log
          git diff --check 2>&1 | tee -a actual-conversation-patch.log
      - name: Upload patch diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: actual-conversation-patch-${{ github.sha }}
          path: actual-conversation-patch.log
          retention-days: 7
      - name: Rust compile and conversation tests
        env:
          RUSTFLAGS: -D warnings
        run: |
          set -euo pipefail
          cargo check --locked --manifest-path rust/Cargo.toml -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
          cargo test --locked --manifest-path rust/Cargo.toml -p mukei-core --no-default-features --features std,tokio,rusqlite actual_conversation_tests -- --nocapture
          cargo test --locked --manifest-path rust/Cargo.toml -p mukei-core --no-default-features --features std,tokio,rusqlite project_chat_tests -- --nocapture
          cargo clippy --locked --manifest-path rust/Cargo.toml -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings
      - name: Android compile
        run: |
          set -o pipefail
          gradle -p android :app:compileDebugKotlin --stacktrace 2>&1 | tee actual-conversation-android.log
      - name: Upload Android diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: actual-conversation-android-${{ github.sha }}
          path: actual-conversation-android.log
          retention-days: 7
      - name: Commit validated conversation source
        run: |
          set -euo pipefail
          git config user.name 'mukei-conversation-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            rust/crates/mukei-core/src/application_runtime.rs \
            rust/crates/mukei-core/src/application_runtime/conversation.rs \
            rust/crates/mukei-core/src/application_runtime/foundation_state.rs \
            rust/crates/mukei-core/src/application_runtime/persistence_flush.rs \
            rust/crates/mukei-core/src/application_runtime/chat.rs \
            rust/crates/mukei-core/src/application_runtime/chat_branching.rs \
            rust/crates/mukei-core/src/application_runtime/chat_snapshot.rs \
            rust/crates/mukei-core/src/application_runtime/foundation_context.rs \
            rust/crates/mukei-core/src/application_runtime/base.rs \
            rust/crates/mukei-core/src/ui_protocol.rs \
            android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt \
            android/app/src/main/kotlin/ai/mukei/android/ChatConversationSurface.kt \
            android/app/src/main/kotlin/ai/mukei/android/ConversationWorkspaceSurface.kt \
            android/app/src/main/kotlin/ai/mukei/android/MukeiChatShell.kt \
            android/app/src/main/kotlin/ai/mukei/android/MukeiProductShell.kt
          git commit -m 'Set up first-class durable conversations'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"success","context":"actual-conversation-setup","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"First-class conversation setup validated"}'
      - name: Publish failure status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -d '{"state":"failure","context":"actual-conversation-setup","target_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","description":"First-class conversation setup failed validation"}'
