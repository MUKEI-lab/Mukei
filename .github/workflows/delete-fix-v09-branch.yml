name: delete-fix-v09-branch

on:
  push:
    branches:
      - checkpoint/stabilization-2026-07-12

permissions:
  contents: write

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Delete obsolete fix-v09 branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # One-shot repository cleanup.
          curl --fail-with-body -L \
            -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/refs/heads/agent/fix-v09-ci"
