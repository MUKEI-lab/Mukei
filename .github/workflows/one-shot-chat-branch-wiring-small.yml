name: one-shot-chat-branch-wiring-small

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
      - temp/chat-branch-wiring-trigger
    paths:
      - '.github/workflows/one-shot-chat-branch-wiring-small.yml'

permissions:
  contents: write
  statuses: write

jobs:
  wire-test:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'chat-branch-wiring', description: 'Wiring durable chat branches', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.82.0'
          components: rustfmt,clippy
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Apply audited patches
        run: |
          set -euo pipefail
          python3 .github/scripts/patch_chat_branch_rust.py
          python3 .github/scripts/patch_chat_branch_android.py
          cargo fmt --manifest-path rust/Cargo.toml --all
          git diff --check
      - name: Strict Rust checks
        env:
          RUSTFLAGS: -D warnings
        run: |
          set -euo pipefail
          cargo check --manifest-path rust/Cargo.toml -p mukei-core --all-features
          cargo test --manifest-path rust/Cargo.toml -p mukei-core chat_branching_tests --all-features
      - name: Compile Android chat UI
        run: gradle -p android :app:compileDebugKotlin --stacktrace
      - name: Commit feature
        run: |
          set -euo pipefail
          git config user.name 'mukei-chat-branch-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add rust/crates/mukei-core/src/application_runtime.rs rust/crates/mukei-core/src/application_runtime/foundation_types.rs rust/crates/mukei-core/src/application_runtime/documents_snapshot.rs rust/crates/mukei-core/src/ui_protocol.rs rust/crates/mukei-core/src/application_runtime/base.rs rust/crates/mukei-core/src/application_runtime/foundation_context.rs rust/crates/mukei-core/src/application_runtime/documents_retry_settings.rs rust/crates/mukei-core/src/application_runtime/chat.rs android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt android/app/src/main/kotlin/ai/mukei/android/MukeiProductShell.kt
          git commit -m 'Wire durable chat editing and immutable branches'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'chat-branch-wiring', description: 'Chat branching wiring passed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'chat-branch-wiring', description: 'Chat branching wiring failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
