name: rag-embedder-runtime-slice-runner-v2

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: rag-embedder-runtime-slice-v2-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

env:
  EXPECTED_BASE: 1ced583cbef4ca713638235bd3916bde284f9af3
  BRANCH_NAME: checkpoint/stabilization-2026-07-12
  RUSTFLAGS: "-D warnings"
  QT_VERSION: 6.5.3

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Gate exact staging commit
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          parent="$(git rev-parse HEAD^)"
          changed="$(git diff --name-only HEAD^ HEAD)"
          if [[ "$parent" == "$EXPECTED_BASE" && "$changed" == ".github/workflows/rag-embedder-runtime-slice-runner-v2.yml" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install stable toolchain
        if: steps.gate.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt 6.5
        if: steps.gate.outputs.run == 'true'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true

      - name: Export Qt toolchain paths
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          echo "$QT_ROOT_DIR/bin" >> "$GITHUB_PATH"
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> "$GITHUB_ENV"

      - name: Apply count-checked runtime patch
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          from pathlib import Path

          lines = Path('.github/workflows/rag-embedder-runtime-slice-runner.yml').read_text().splitlines()
          start = next(index for index, line in enumerate(lines) if line.strip() == 'PATCH_B64: >-') + 1
          end = next(index for index in range(start, len(lines)) if lines[index].strip() == 'run: |')
          payload = ''.join(line.strip() for line in lines[start:end])
          script = base64.b64decode(payload, validate=True).decode('utf-8')
          compile(script, '<rag-embedder-runtime-patch>', 'exec')
          exec(script, {'__name__': '__main__'})
          PY

      - name: Format and validate exact diff
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd rust
          cargo fmt --all
          cargo fmt --all --check
          cd ..
          git diff --check
          mapfile -t changed < <(git diff --name-only | sort)
          expected=(
            rust/crates/mukei-bridge/src/agent_runtime.rs
            rust/crates/mukei-bridge/src/app_runtime/rag_runtime.rs
            rust/crates/mukei-core/src/rag/embedder.rs
          )
          [[ "${changed[*]}" == "${expected[*]}" ]] || {
            printf 'Unexpected diff:\n%s\n' "${changed[*]}" >&2
            exit 1
          }

      - name: Build bridge persistence tuple
        if: steps.gate.outputs.run == 'true'
        working-directory: rust
        run: cargo build -p mukei-bridge --features "sqlcipher,network"

      - name: Check no-persistence bridge tuple
        if: steps.gate.outputs.run == 'true'
        working-directory: rust
        run: cargo check -p mukei-bridge --no-default-features --features runtime_development

      - name: Check Candle and HNSW bridge tuple
        if: steps.gate.outputs.run == 'true'
        working-directory: rust
        run: cargo check -p mukei-bridge --no-default-features --features "runtime_development,candle,usearch_hnsw"

      - name: Run focused runtime tests
        if: steps.gate.outputs.run == 'true'
        working-directory: rust
        run: cargo test -p mukei-bridge --lib --features "sqlcipher,network" rag_runtime

      - name: Commit only verified source files
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          staging_head="$(git rev-parse HEAD)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            rust/crates/mukei-bridge/src/agent_runtime.rs \
            rust/crates/mukei-bridge/src/app_runtime/rag_runtime.rs \
            rust/crates/mukei-core/src/rag/embedder.rs
          mapfile -t staged < <(git diff --cached --name-only | sort)
          expected=(
            rust/crates/mukei-bridge/src/agent_runtime.rs
            rust/crates/mukei-bridge/src/app_runtime/rag_runtime.rs
            rust/crates/mukei-core/src/rag/embedder.rs
          )
          [[ "${staged[*]}" == "${expected[*]}" ]]
          git commit -m "feat: construct verified process-owned RAG embedder"
          remote_head="$(git ls-remote origin "refs/heads/$BRANCH_NAME" | cut -f1)"
          [[ "$remote_head" == "$staging_head" ]] || {
            echo "Remote source head moved: expected $staging_head, found $remote_head" >&2
            exit 1
          }
          git push origin "HEAD:refs/heads/$BRANCH_NAME"
