name: storage-android-secure-composition-v2

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-android-secure-composition-v2.yml
  workflow_dispatch:

concurrency:
  group: storage-android-secure-composition-v2
  cancel-in-progress: true

permissions:
  contents: write
  statuses: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'storage-android-secure-composition-v2',
              description: 'Secure Android storage verification running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy,rustfmt
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Extract and apply reviewed patch
        shell: python
        run: |
          from pathlib import Path
          source = Path('.github/workflows/storage-android-secure-composition.yml').read_text(encoding='utf-8')
          start_marker = "        run: |\n          from pathlib import Path\n"
          end_marker = "\n      - name: Format modified Rust files"
          start = source.index(start_marker) + len("        run: |\n")
          end = source.index(end_marker, start)
          lines = source[start:end].splitlines()
          patch = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          Path('/tmp/apply_secure_storage.py').write_text(patch, encoding='utf-8')
          compile(patch, '/tmp/apply_secure_storage.py', 'exec')
          exec(compile(patch, '/tmp/apply_secure_storage.py', 'exec'), {'__name__': '__main__'})
      - name: Format modified Rust files
        working-directory: rust
        run: |
          rustfmt --edition 2021 crates/mukei-core/src/storage/object_store.rs
          rustfmt --edition 2021 crates/mukei-core/src/storage/mod.rs
          rustfmt --edition 2021 crates/mukei-android-jni/src/secure_runtime_jni.rs
      - name: Verify patch whitespace
        run: git diff --check
      - name: Core Cargo check
        working-directory: rust
        run: cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
      - name: Object-store tests
        working-directory: rust
        run: cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite object_store -- --nocapture
      - name: Staged-import tests
        working-directory: rust
        run: cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite staged_import -- --nocapture
      - name: Full core tests
        working-directory: rust
        run: cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
      - name: Core Clippy
        working-directory: rust
        run: cargo clippy -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings
      - name: Secure JNI tests
        working-directory: rust
        run: cargo test -p mukei-android-jni --lib --no-default-features --features secure_runtime,runtime_hardening
      - name: Compile Kotlin secure bridge
        run: gradle -p android :core:native:compileDebugKotlin :app:compileDebugKotlin --stacktrace
      - name: Commit verified secure composition
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add \
            rust/Cargo.toml \
            rust/crates/mukei-core/Cargo.toml \
            rust/crates/mukei-core/src/storage/object_store.rs \
            rust/crates/mukei-core/src/storage/mod.rs \
            rust/crates/mukei-android-jni/src/secure_runtime_jni.rs \
            android/core/native/src/main/kotlin/ai/mukei/android/core/nativebridge/MukeiNativeGateway.kt \
            android/core/native/src/main/kotlin/ai/mukei/android/core/nativebridge/SecureRuntimeFactory.kt \
            android/core/native/src/main/kotlin/ai/mukei/android/core/nativebridge/AndroidPlatformRequestProcessor.kt \
            android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt
          git diff --cached --check
          git commit -m "feat(storage): compose Keystore-backed encrypted imports on Android"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'storage-android-secure-composition-v2',
              description: 'Keystore-backed Android storage composition verified',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'storage-android-secure-composition-v2',
              description: 'Secure Android storage composition failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
