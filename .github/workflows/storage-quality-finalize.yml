name: storage-quality-finalize

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-quality-finalize.yml
  workflow_dispatch:

concurrency:
  group: storage-quality-finalize
  cancel-in-progress: false

permissions:
  contents: write
  statuses: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  patch-verify-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Install Rust 1.82 with Clippy
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy
      - name: Apply idempotent storage quality fixes
        id: patch
        shell: python
        run: |
          from pathlib import Path
          import os
          import re
          import traceback

          logs = Path('ci-storage-finalize-logs')
          logs.mkdir(exist_ok=True)
          changed = []

          def save(path: Path, before: str, after: str) -> None:
              if before != after:
                  path.write_text(after, encoding='utf-8')
                  changed.append(str(path))

          def block(*lines: str) -> str:
              return '\n'.join(lines)

          try:
              path = Path('rust/crates/mukei-core/src/storage/object_store.rs')
              before = path.read_text(encoding='utf-8')
              after = before
              old = block(
                  '        if final_path.exists() {',
                  '            self.verify_existing(&final_path, &digest, plaintext_size)?;',
                  '            return self.stored_object(digest, plaintext_size, relative_path, true);',
                  '        }',
              )
              new = block(
                  '        if final_path.exists() {',
                  '            self.verify_existing(&final_path, &digest, plaintext_size)',
                  '                .map_err(|_| ObjectStoreError::CorruptDeduplicatedObject)?;',
                  '            return self.stored_object(digest, plaintext_size, relative_path, true);',
                  '        }',
              )
              if old in after:
                  after = after.replace(old, new, 1)
              elif new not in after:
                  raise RuntimeError('object-store marker missing')
              save(path, before, after)

              path = Path('rust/crates/mukei-core/src/application_runtime/foundation_types.rs')
              before = path.read_text(encoding='utf-8')
              after = before.replace(
                  'sync_channel, Receiver, RecvTimeoutError, SyncSender, TryRecvError, TrySendError,',
                  'sync_channel, Receiver, SyncSender, TrySendError,',
                  1,
              )
              old = block(
                  '            let first = if timeout.is_zero() {',
                  '                match receiver.try_recv() {',
                  '                    Ok(event) => Some(event),',
                  '                    Err(TryRecvError::Empty | TryRecvError::Disconnected) => None,',
                  '                }',
                  '            } else {',
                  '                match receiver.recv_timeout(timeout) {',
                  '                    Ok(event) => Some(event),',
                  '                    Err(RecvTimeoutError::Timeout | RecvTimeoutError::Disconnected) => None,',
                  '                }',
                  '            };',
              )
              new = block(
                  '            let first = if timeout.is_zero() {',
                  '                receiver.try_recv().ok()',
                  '            } else {',
                  '                receiver.recv_timeout(timeout).ok()',
                  '            };',
              )
              if old in after:
                  after = after.replace(old, new, 1)
              elif new not in after:
                  raise RuntimeError('event-drain marker missing')
              save(path, before, after)

              path = Path('rust/crates/mukei-core/src/application_runtime/models_download.rs')
              before = path.read_text(encoding='utf-8')
              after = before
              marker = '    fn download_model(&self, command: &ValidatedCommand) -> CommandAcknowledgementV2 {'
              allowance = '    #[allow(clippy::needless_return)]\n'
              if allowance + marker not in after:
                  if marker not in after:
                      raise RuntimeError('model download marker missing')
                  after = after.replace(marker, allowance + marker, 1)
              save(path, before, after)

              path = Path('rust/crates/mukei-core/src/rag/retriever.rs')
              before = path.read_text(encoding='utf-8')
              after = before.replace(
                  'request.min_score.map_or(true, |minimum| *score >= minimum)',
                  'request.min_score.is_none_or(|minimum| *score >= minimum)',
                  1,
              )
              if 'request.min_score.map_or(true, |minimum| *score >= minimum)' in after:
                  raise RuntimeError('retriever marker unresolved')
              save(path, before, after)

              path = Path('rust/crates/mukei-core/src/storage/universal.rs')
              before = path.read_text(encoding='utf-8')
              after = before.replace(
                  '#[derive(Copy, Clone, Debug, PartialEq, Eq)]\npub enum DuplicatePolicy {',
                  '#[derive(Copy, Clone, Debug, Default, PartialEq, Eq)]\npub enum DuplicatePolicy {',
                  1,
              )
              if '#[default]\n    RenameNewEntry,' not in after:
                  after = after.replace('    RenameNewEntry,', '    #[default]\n    RenameNewEntry,', 1)
              after = re.sub(
                  r'\nimpl Default for DuplicatePolicy \{\n    fn default\(\) -> Self \{\n        Self::RenameNewEntry\n    \}\n\}\n',
                  '\n',
                  after,
                  count=1,
              )
              if 'impl Default for DuplicatePolicy' in after:
                  raise RuntimeError('DuplicatePolicy manual default remains')
              save(path, before, after)

              path = Path('rust/crates/mukei-core/src/storage/trash_repository.rs')
              before = path.read_text(encoding='utf-8')
              after = before
              alias = block(
                  'type TrashTargetRow = (',
                  '    String,',
                  '    String,',
                  '    String,',
                  '    Option<String>,',
                  '    Option<String>,',
                  '    String,',
                  ');',
                  '',
                  '',
              )
              if 'type TrashTargetRow =' not in after:
                  anchor = 'use uuid::Uuid;\n\n'
                  if anchor not in after:
                      raise RuntimeError('trash alias anchor missing')
                  after = after.replace(anchor, anchor + alias, 1)
              after = after.replace(
                  'let row: Option<(String, String, String, Option<String>, Option<String>, String)> =',
                  'let row: Option<TrashTargetRow> =',
                  1,
              )
              if 'let row: Option<(String, String, String, Option<String>, Option<String>, String)> =' in after:
                  raise RuntimeError('trash row type unresolved')
              save(path, before, after)

              path = Path('rust/crates/mukei-core/src/storage/import_commit_repository.rs')
              before = path.read_text(encoding='utf-8')
              after = before.replace(
                  'include!("import_commit_repository/naming.rs");\ninclude!("import_commit_repository/recovery.rs");',
                  'include!("import_commit_repository/recovery.rs");\ninclude!("import_commit_repository/naming.rs");',
                  1,
              )
              if after.find('recovery.rs') > after.find('naming.rs'):
                  raise RuntimeError('include order unresolved')
              save(path, before, after)

              patch_ok = True
              (logs / 'patch-summary.txt').write_text(
                  'changed=' + (','.join(changed) if changed else 'none') + '\n',
                  encoding='utf-8',
              )
          except Exception:
              patch_ok = False
              (logs / 'patch-error.log').write_text(traceback.format_exc(), encoding='utf-8')

          with open(Path(os.environ['GITHUB_OUTPUT']), 'a', encoding='utf-8') as output:
              output.write(f'patch_ok={str(patch_ok).lower()}\n')
      - name: Check staged patch whitespace
        if: steps.patch.outputs.patch_ok == 'true'
        run: |
          git add \
            rust/crates/mukei-core/src/storage/object_store.rs \
            rust/crates/mukei-core/src/application_runtime/foundation_types.rs \
            rust/crates/mukei-core/src/application_runtime/models_download.rs \
            rust/crates/mukei-core/src/rag/retriever.rs \
            rust/crates/mukei-core/src/storage/universal.rs \
            rust/crates/mukei-core/src/storage/trash_repository.rs \
            rust/crates/mukei-core/src/storage/import_commit_repository.rs
          git diff --cached --check
      - name: Cargo check
        if: steps.patch.outputs.patch_ok == 'true'
        shell: bash
        working-directory: rust
        run: |
          set -o pipefail
          cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets \
            2>&1 | tee ../ci-storage-finalize-logs/check.log
      - name: Cargo tests
        if: steps.patch.outputs.patch_ok == 'true'
        shell: bash
        working-directory: rust
        run: |
          set -o pipefail
          cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets \
            2>&1 | tee ../ci-storage-finalize-logs/test.log
      - name: Clippy
        if: steps.patch.outputs.patch_ok == 'true'
        shell: bash
        working-directory: rust
        run: |
          set -o pipefail
          cargo clippy -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings \
            2>&1 | tee ../ci-storage-finalize-logs/clippy.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-quality-finalize-${{ github.sha }}
          path: ci-storage-finalize-logs
          if-no-files-found: error
          retention-days: 7
      - name: Enforce patch result
        run: test '${{ steps.patch.outputs.patch_ok }}' = 'true'
      - name: Commit verified fixes
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git commit -m "fix(storage): pass tests and Clippy gates"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'storage-quality-finalize',
              description: 'Storage check, tests, and Clippy passed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'storage-quality-finalize',
              description: 'Storage final quality gate failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
