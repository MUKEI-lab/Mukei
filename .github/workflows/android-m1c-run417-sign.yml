name: android-m1c-run417-sign

on:
  pull_request:
    branches: [ Kotlin ]
    paths:
      - ".github/workflows/android-m1c-run417-sign.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  sign-test-apks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download immutable green M1C run 417 release artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-hardening-55098a4f5b10a5a875db7d4a99864a9f18b8190f
          path: unsigned
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: MUKEI-lab/Mukei
          run-id: 29655422147

      - name: Install official Android APK signing tools
        shell: bash
        run: |
          set -euo pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "build-tools;35.0.0"
          test -x "$ANDROID_HOME/build-tools/35.0.0/apksigner"
          test -x "$ANDROID_HOME/build-tools/35.0.0/zipalign"

      - name: Verify downloaded release inputs
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t apks < <(find unsigned -type f -name '*-release-unsigned.apk' | sort)
          test "${#apks[@]}" -eq 2
          arm_apk="$(printf '%s\n' "${apks[@]}" | grep 'arm64-v8a')"
          x86_apk="$(printf '%s\n' "${apks[@]}" | grep 'x86_64')"
          for entry in \
            'lib/arm64-v8a/libmukei_android.so' \
            'lib/arm64-v8a/libmukei_llama_native.so' \
            'lib/arm64-v8a/libc++_shared.so'; do
            unzip -l "$arm_apk" | grep -Fq "$entry"
          done
          for entry in \
            'lib/x86_64/libmukei_android.so' \
            'lib/x86_64/libmukei_llama_native.so' \
            'lib/x86_64/libc++_shared.so'; do
            unzip -l "$x86_apk" | grep -Fq "$entry"
          done

      - name: Generate disposable test keystore
        shell: bash
        run: |
          set -euo pipefail
          keytool -genkeypair -noprompt \
            -keystore "$RUNNER_TEMP/mukei-m1c-run417-test.jks" \
            -storepass changeit \
            -keypass changeit \
            -alias mukei-m1c-run417-test \
            -keyalg RSA \
            -keysize 3072 \
            -validity 3650 \
            -dname "CN=Mukei M1C Run417 Temporary Test,O=MUKEI-lab Test Build,C=US"

      - name: Align, sign and verify APKs with official apksigner
        shell: bash
        run: |
          set -euo pipefail
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          ZIPALIGN="$ANDROID_HOME/build-tools/35.0.0/zipalign"
          mkdir -p signed
          mapfile -t apks < <(find unsigned -type f -name '*-release-unsigned.apk' | sort)
          test "${#apks[@]}" -eq 2
          for apk in "${apks[@]}"; do
            base="$(basename "$apk" -unsigned.apk)"
            aligned="$RUNNER_TEMP/${base}-aligned.apk"
            output="signed/${base}-m1c-run417-official-test-signed.apk"
            "$ZIPALIGN" -f -p 4 "$apk" "$aligned"
            "$APKSIGNER" sign \
              --ks "$RUNNER_TEMP/mukei-m1c-run417-test.jks" \
              --ks-key-alias mukei-m1c-run417-test \
              --ks-pass pass:changeit \
              --key-pass pass:changeit \
              --v1-signing-enabled true \
              --v2-signing-enabled true \
              --v3-signing-enabled true \
              --out "$output" \
              "$aligned"
            "$APKSIGNER" verify --verbose --print-certs "$output" | tee "${output}.verify.txt"
          done
          sha256sum signed/*.apk > signed/SHA256SUMS
          printf '%s\n' \
            'source_pr=93' \
            'source_head=2dc5986c3bdc7248f63f980ebefd38aabcac2ed2' \
            'source_ci_run=29655422147' \
            'source_artifact=android-release-hardening-55098a4f5b10a5a875db7d4a99864a9f18b8190f' \
            > signed/SOURCE.txt

      - name: Upload officially verified M1C run 417 APKs
        uses: actions/upload-artifact@v4
        with:
          name: mukei-m1c-run417-official-test-signed-${{ github.sha }}
          if-no-files-found: error
          retention-days: 7
          path: signed/
