name: one-shot-project-chat-binding

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1

concurrency:
  group: one-shot-project-chat-binding
  cancel-in-progress: true

permissions:
  contents: write
  statuses: write

jobs:
  wire-project-chat:
    if: github.event.head_commit.message == 'Trigger project chat binding wiring'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'project-chat-binding-wiring',
              description: 'Wiring immutable project chat context',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.82.0'
          components: rustfmt,clippy
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Apply exact project chat patches
        run: |
          set -euo pipefail
          python3 .github/scripts/patch_project_chat_binding.py
          cargo fmt --manifest-path rust/Cargo.toml --all
          git diff --check
      - name: Rust compile and targeted tests
        env:
          RUSTFLAGS: -D warnings
        run: |
          set -euo pipefail
          cargo check --manifest-path rust/Cargo.toml -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
          cargo test --manifest-path rust/Cargo.toml -p mukei-core --no-default-features --features std,tokio,rusqlite project_chat_tests -- --nocapture
          cargo clippy --manifest-path rust/Cargo.toml -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings
      - name: Android compile
        run: gradle -p android :app:compileDebugKotlin --stacktrace
      - name: Commit validated source
        run: |
          set -euo pipefail
          git config user.name 'mukei-project-chat-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            rust/crates/mukei-core/src/application_runtime.rs \
            rust/crates/mukei-core/src/application_runtime/foundation_types.rs \
            rust/crates/mukei-core/src/application_runtime/foundation_state.rs \
            rust/crates/mukei-core/src/application_runtime/persistence_flush.rs \
            rust/crates/mukei-core/src/application_runtime/chat.rs \
            rust/crates/mukei-core/src/application_runtime/chat_branching.rs \
            rust/crates/mukei-core/src/ui_protocol.rs \
            rust/crates/mukei-core/src/tools/sentinel.rs \
            android/app/src/main/kotlin/ai/mukei/android/BackendRuntimeHost.kt \
            android/app/src/main/kotlin/ai/mukei/android/ChatConversationSurface.kt
          git commit -m 'Wire immutable project chat context'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'project-chat-binding-wiring',
              description: 'Project chat binding wiring passed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'project-chat-binding-wiring',
              description: 'Project chat binding wiring failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
