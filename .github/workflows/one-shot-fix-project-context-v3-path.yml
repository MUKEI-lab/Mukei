name: one-shot-fix-project-context-v3-path

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-fix-project-context-v3-path.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Correct router patch target
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          p=Path('.github/workflows/one-shot-project-context-v3.yml')
          s=p.read_text()
          old="edit('rust/crates/mukei-core/src/application_runtime/documents_snapshot.rs',patch_router)"
          new="edit('rust/crates/mukei-core/src/application_runtime/foundation_context.rs',patch_router)"
          if s.count(old) != 1:
              raise SystemExit(f'router path anchor count={s.count(old)}')
          p.write_text(s.replace(old,new,1))
          PY
          git config user.name 'mukei-project-context-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add .github/workflows/one-shot-project-context-v3.yml
          git commit -m 'Fix Project context router patch target'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
