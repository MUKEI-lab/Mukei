name: storage-runtime-import-core

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-runtime-import-core.yml
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  patch-verify-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Install Rust 1.82
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy,rustfmt
      - name: Apply deterministic runtime patch
        run: python .github/scripts/storage_runtime_import.py
      - name: Format core
        working-directory: rust
        run: cargo fmt -p mukei-core
      - name: Verify patch whitespace
        run: git diff --check
      - name: Core Cargo check
        working-directory: rust
        run: cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
      - name: Storage import tests
        working-directory: rust
        run: cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite storage_import -- --nocapture
      - name: Full core tests
        working-directory: rust
        run: cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
      - name: Core Clippy
        working-directory: rust
        run: cargo clippy -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings
      - name: Commit verified runtime wiring
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add \
            rust/crates/mukei-core/src/application_runtime.rs \
            rust/crates/mukei-core/src/application_runtime/foundation_types.rs \
            rust/crates/mukei-core/src/application_runtime/foundation_runtime_struct.rs \
            rust/crates/mukei-core/src/application_runtime/base.rs \
            rust/crates/mukei-core/src/application_runtime/foundation_context.rs \
            rust/crates/mukei-core/src/application_runtime/services.rs \
            rust/crates/mukei-core/src/application_runtime/storage_import.rs \
            rust/crates/mukei-core/src/application_runtime/storage_import_tests.rs \
            rust/crates/mukei-core/src/ui_protocol.rs \
            rust/crates/mukei-core/tests/storage_import_protocol.rs
          git diff --cached --check
          git commit -m "feat(storage): wire scoped encrypted imports into runtime"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'storage-runtime-import-core',
              description: 'Scoped runtime storage import verified',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'storage-runtime-import-core',
              description: 'Runtime storage import core verification failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
