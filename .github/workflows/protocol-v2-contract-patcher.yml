name: protocol-v2-contract-patcher

on:
  push:
    branches: [ "checkpoint/stabilization-2026-07-12" ]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.head_commit.message == 'ci: stage protocol v2 contract patcher'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: checkpoint/stabilization-2026-07-12
          fetch-depth: 0
      - name: Apply canonical Protocol V2 wire contract
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              if text.count(old) != 1:
                  raise SystemExit(f"{path}: expected one exact anchor, found {text.count(old)}")
              p.write_text(text.replace(old, new, 1))

          # Core protocol negotiation: minor bump + explicit payload-scope capability.
          replace_once(
              "rust/crates/mukei-core/src/ui_protocol.rs",
              "pub const PROTOCOL_MINOR: u16 = 0;",
              "pub const PROTOCOL_MINOR: u16 = 1;",
          )
          replace_once(
              "rust/crates/mukei-core/src/ui_protocol.rs",
              "pub const CAP_SCOPED_CHAT_OPERATIONS: &str = \"scoped_chat_operations\";\n/// Stable machine capability: isolated legacy-v1 event ingestion remains",
              "pub const CAP_SCOPED_CHAT_OPERATIONS: &str = \"scoped_chat_operations\";\n/// Stable machine capability: Protocol V2 domain scope is authoritative inside the event payload.\npub const CAP_EVENT_PAYLOAD_SCOPE_V2: &str = \"event_payload_scope_v2\";\n/// Stable machine capability: isolated legacy-v1 event ingestion remains",
          )
          replace_once(
              "rust/crates/mukei-core/src/ui_protocol.rs",
              "                CAP_SCOPED_CHAT_OPERATIONS.into(),\n                CAP_LEGACY_EVENT_V1_COMPATIBILITY.into(),",
              "                CAP_SCOPED_CHAT_OPERATIONS.into(),\n                CAP_EVENT_PAYLOAD_SCOPE_V2.into(),\n                CAP_LEGACY_EVENT_V1_COMPATIBILITY.into(),",
          )

          # QML contract negotiation requires the canonical V2 scope capability.
          replace_once(
              "qml/stores/ContractStore.qml",
              "        \"operation_lifecycle_events\", \"scoped_chat_operations\",\n        \"legacy_event_v1_compatibility\"",
              "        \"operation_lifecycle_events\", \"scoped_chat_operations\",\n        \"event_payload_scope_v2\", \"legacy_event_v1_compatibility\"",
          )
          replace_once(
              "qml/stores/ContractStore.qml",
              "                        \"event_identity\", \"per_stream_sequencing\",\n                        \"operation_lifecycle_events\"",
              "                        \"event_identity\", \"per_stream_sequencing\",\n                        \"operation_lifecycle_events\", \"event_payload_scope_v2\"",
          )

          # EventDispatcher: payload owns domain scope; stream_id is opaque and scope-stable.
          p = Path("qml/events/EventDispatcher.qml")
          text = p.read_text()
          old = "    property var lastSequenceByStream: ({})\n    property var trackedStreamOrder: []\n    property var uncertainStreams: ({})"
          new = "    property var lastSequenceByStream: ({})\n    property var trackedStreamOrder: []\n    property var streamScopeById: ({})\n    property var uncertainStreams: ({})"
          if text.count(old) != 1:
              raise SystemExit("EventDispatcher: stream-scope property anchor mismatch")
          text = text.replace(old, new, 1)

          old = "        lastSequenceByStream = ({})\n        trackedStreamOrder = []\n        uncertainStreams = ({})"
          new = "        lastSequenceByStream = ({})\n        trackedStreamOrder = []\n        streamScopeById = ({})\n        uncertainStreams = ({})"
          if text.count(old) != 1:
              raise SystemExit("EventDispatcher: reset anchor mismatch")
          text = text.replace(old, new, 1)

          old = '''        event.command_type = raw.command_type || ""
        event.conversation_id = raw.conversation_id || event.conversation_id || ""
        event.branch_id = raw.branch_id || event.branch_id || ""
        event.turn_id = raw.turn_id || event.turn_id || ""
        event.protocol_mode = "v2"'''
          new = '''        event.command_type = raw.command_type || ""
        event.conversation_id = event.conversation_id || ""
        event.branch_id = event.branch_id || ""
        event.turn_id = event.turn_id || ""
        event.protocol_mode = "v2"'''
          if text.count(old) != 1:
              raise SystemExit("EventDispatcher: normalization anchor mismatch")
          text = text.replace(old, new, 1)

          old = '''    function validateV2Scope(raw, event) {
        if (!isChatCategory(event.category))
            return true
        if (typeof raw.conversation_id !== "string" || raw.conversation_id.length === 0
                || typeof raw.branch_id !== "string" || raw.branch_id.length === 0) {
            eventRejected("missing_chat_scope")
            return false
        }
        var expectedStreamId = "chat:" + raw.conversation_id + ":" + raw.branch_id
        if (raw.stream_id !== expectedStreamId) {
            eventRejected("chat_stream_scope_mismatch")
            return false
        }
        return true
    }
'''
          new = '''    function chatScopeKey(conversationId, branchId) {
        return conversationId.length + ":" + conversationId + ":" + branchId
    }

    function validateV2Scope(raw, event) {
        if (!isChatCategory(event.category))
            return true
        if (typeof event.conversation_id !== "string" || event.conversation_id.length === 0
                || typeof event.branch_id !== "string" || event.branch_id.length === 0) {
            eventRejected("missing_chat_scope")
            return false
        }
        var boundScope = streamScopeById[raw.stream_id]
        var eventScope = chatScopeKey(event.conversation_id, event.branch_id)
        if (typeof boundScope === "string" && boundScope !== eventScope) {
            eventRejected("stream_scope_mutation")
            return false
        }
        return true
    }

    function rememberV2StreamScope(streamId, event) {
        if (!isChatCategory(event.category))
            return
        var scopes = Object.assign({}, streamScopeById)
        scopes[streamId] = chatScopeKey(event.conversation_id, event.branch_id)
        streamScopeById = scopes
    }

    function streamIdForChatScope(conversationId, branchId) {
        if (!conversationId || !branchId)
            return ""
        var expected = chatScopeKey(conversationId, branchId)
        var streamIds = Object.keys(streamScopeById)
        for (var i = 0; i < streamIds.length; ++i) {
            if (streamScopeById[streamIds[i]] === expected)
                return streamIds[i]
        }
        return ""
    }
'''
          if text.count(old) != 1:
              raise SystemExit("EventDispatcher: scope-validation anchor mismatch")
          text = text.replace(old, new, 1)

          old = '''        var next = Object.assign({}, lastSequenceByStream)
        var order = trackedStreamOrder.slice(0)
        var existingIndex = order.indexOf(streamId)'''
          new = '''        var next = Object.assign({}, lastSequenceByStream)
        var scopes = Object.assign({}, streamScopeById)
        var order = trackedStreamOrder.slice(0)
        var existingIndex = order.indexOf(streamId)'''
          if text.count(old) != 1:
              raise SystemExit("EventDispatcher: stream tracking anchor mismatch")
          text = text.replace(old, new, 1)

          old = '''        while (order.length > 256) {
            var expired = order.shift()
            delete next[expired]
        }
        lastSequenceByStream = next
        trackedStreamOrder = order'''
          new = '''        while (order.length > 256) {
            var expired = order.shift()
            delete next[expired]
            delete scopes[expired]
        }
        lastSequenceByStream = next
        streamScopeById = scopes
        trackedStreamOrder = order'''
          if text.count(old) != 1:
              raise SystemExit("EventDispatcher: stream eviction anchor mismatch")
          text = text.replace(old, new, 1)

          old = '''        rememberStreamSequence(raw.stream_id, raw.sequence)
        lastSequence = typeof lastSequence === "number" ? Math.max(lastSequence, raw.sequence) : raw.sequence
        return true'''
          new = '''        rememberStreamSequence(raw.stream_id, raw.sequence)
        rememberV2StreamScope(raw.stream_id, event)
        lastSequence = typeof lastSequence === "number" ? Math.max(lastSequence, raw.sequence) : raw.sequence
        return true'''
          if text.count(old) != 1:
              raise SystemExit("EventDispatcher: accepted-event anchor mismatch")
          text = text.replace(old, new, 1)

          old = '''    function markChatScopeResynchronized(conversationId, branchId, baselineSequence, validatedByController) {
        if (validatedByController !== true || !conversationId || !branchId)
            return false
        var streamId = "chat:" + conversationId + ":" + branchId
        return completeResynchronization(streamId, baselineSequence)
    }'''
          new = '''    function markChatScopeResynchronized(conversationId, branchId, baselineSequence, validatedByController) {
        if (validatedByController !== true || !conversationId || !branchId)
            return false
        var streamId = streamIdForChatScope(conversationId, branchId)
        return streamId.length > 0 && completeResynchronization(streamId, baselineSequence)
    }'''
          if text.count(old) != 1:
              raise SystemExit("EventDispatcher: chat resync compatibility anchor mismatch")
          text = text.replace(old, new, 1)
          p.write_text(text)

          # ChatStore no longer performs obsolete feature-only or reconstructed-stream resync calls.
          p = Path("qml/stores/ChatStore.qml")
          text = p.read_text()
          old = '''            if (applied) {
                SnapshotController.markApplied("chat")
                UiSessionStore.setTimelineAnchor(parsed.oldest_message_id || "")
                if (!prepend) {
                    clearBackgroundScopeDirty(activeConversationId, activeBranchId)
                    // Snapshot reconciliation is the explicit resynchronization
                    // boundary for a quarantined chat stream. If the snapshot
                    // exposes a sequence use it; otherwise EventDispatcher uses
                    // the gap high-water mark that triggered this refresh.
                    EventDispatcher.markChatScopeResynchronized(
                                activeConversationId,
                                activeBranchId,
                                typeof parsed.stream_sequence === "number"
                                ? parsed.stream_sequence : undefined)
                }
                snapshotApplied()
                tailUpdated()
            }'''
          new = '''            if (applied) {
                UiSessionStore.setTimelineAnchor(parsed.oldest_message_id || "")
                if (!prepend)
                    clearBackgroundScopeDirty(activeConversationId, activeBranchId)
                // Resynchronization is completed only by AppCoordinator after this
                // successful apply signal is correlated with the pending stream ticket.
                snapshotApplied()
                tailUpdated()
            }'''
          if text.count(old) != 1:
              raise SystemExit("ChatStore: snapshot apply anchor mismatch")
          p.write_text(text.replace(old, new, 1))

          # QML contract fixture and conformance tests.
          p = Path("qml/tests/tst_ProtocolV2.qml")
          text = p.read_text()
          text = text.replace("current_version: { major: 2, minor: 0 }", "current_version: { major: 2, minor: 1 }")
          text = text.replace(
              '"scoped_chat_operations", "legacy_event_v1_compatibility"',
              '"scoped_chat_operations", "event_payload_scope_v2", "legacy_event_v1_compatibility"',
          )
          marker = '''    function test_background_chat_event_cannot_hijack_active_scope() {'''
          if marker not in text:
              raise SystemExit("ProtocolV2 QML test insertion anchor missing")
          insert = '''    function canonicalRustChatEnvelope(eventId, streamId, sequence, conversationId, branchId, state) {
        return {
            protocol_version: { major: 2, minor: 1 },
            event_id: eventId,
            stream_id: streamId,
            sequence: sequence,
            event_type: "chat_state",
            emitted_at: new Date(1760000000000 + sequence * 1000).toISOString(),
            payload: {
                schema_version: 1,
                category: "chat_state",
                state: state,
                conversation_id: conversationId,
                branch_id: branchId,
                turn_id: "turn-" + sequence
            }
        }
    }

    function test_rust_canonical_payload_scope_is_accepted_with_opaque_stream_id() {
        var streamId = "conversation:conversation-a:branch:branch-a"
        EventDispatcher.ingest(JSON.stringify(canonicalRustChatEnvelope(
                                                   "event-canonical-1", streamId, 1,
                                                   "conversation-a", "branch-a", "submitting")),
                               "agent")
        verify(EventDispatcher.lastEvent !== undefined)
        compare(EventDispatcher.lastEvent.conversation_id, "conversation-a")
        compare(EventDispatcher.lastEvent.branch_id, "branch-a")
        compare(EventDispatcher.lastEvent.stream_id, streamId)
        compare(EventDispatcher.lastSequenceByStream[streamId], 1)
    }

    function test_bound_stream_rejects_chat_scope_mutation() {
        var streamId = "opaque-chat-stream-17"
        EventDispatcher.ingest(JSON.stringify(canonicalRustChatEnvelope(
                                                   "event-scope-a", streamId, 1,
                                                   "conversation-a", "branch-a", "submitting")),
                               "agent")
        compare(EventDispatcher.lastSequenceByStream[streamId], 1)
        EventDispatcher.ingest(JSON.stringify(canonicalRustChatEnvelope(
                                                   "event-scope-b", streamId, 2,
                                                   "conversation-b", "branch-b", "streaming")),
                               "agent")
        compare(EventDispatcher.lastSequenceByStream[streamId], 1)
        compare(EventDispatcher.lastEvent.conversation_id, "conversation-a")
    }

    function test_top_level_only_chat_scope_is_rejected() {
        var envelope = canonicalRustChatEnvelope(
                    "event-top-level-only", "opaque-top-level-only", 1,
                    "conversation-a", "branch-a", "submitting")
        delete envelope.payload.conversation_id
        delete envelope.payload.branch_id
        envelope.conversation_id = "conversation-a"
        envelope.branch_id = "branch-a"
        EventDispatcher.ingest(JSON.stringify(envelope), "agent")
        verify(typeof EventDispatcher.lastSequenceByStream[envelope.stream_id] === "undefined")
    }

'''
          text = text.replace(marker, insert + marker, 1)
          p.write_text(text)

          # Lock the actual Rust producer shape with an in-module serializer test.
          p = Path("rust/crates/mukei-bridge/src/protocol.rs")
          text = p.read_text()
          test_marker = "canonical_chat_event_serialization_keeps_scope_in_payload"
          if test_marker in text:
              raise SystemExit("protocol.rs canonical test already exists")
          text += r'''

#[cfg(test)]
mod canonical_wire_tests {
    use super::*;
    use mukei_core::types::{BranchId, ConversationId};
    use mukei_core::ui_contract::{CapabilitySnapshot, ChatTurnState};

    #[test]
    fn canonical_chat_event_serialization_keeps_scope_in_payload() {
        let conversation = ConversationId::new();
        let branch = BranchId::new();
        let event = BridgeEvent::new(BridgeEventKind::ChatState {
            state: ChatTurnState::Submitting,
            capabilities: CapabilitySnapshot::inferencing(),
        })
        .with_chat_scope(conversation, branch, "turn-wire-contract".to_string());

        let serialized = ProtocolRuntimeState::new().wrap_bridge_event(event);
        let value: serde_json::Value = serde_json::from_str(&serialized).expect("valid event json");
        let stream_id = value["stream_id"].as_str().expect("stream id");

        assert_eq!(value["protocol_version"]["major"], PROTOCOL_MAJOR);
        assert_eq!(value["protocol_version"]["minor"], PROTOCOL_MINOR);
        assert_eq!(value["event_type"], "chat_state");
        assert_eq!(
            value["payload"]["conversation_id"],
            conversation.0.to_string()
        );
        assert_eq!(value["payload"]["branch_id"], branch.0.to_string());
        assert_eq!(value["payload"]["turn_id"], "turn-wire-contract");
        assert!(value.get("conversation_id").is_none());
        assert!(value.get("branch_id").is_none());
        assert!(stream_id.contains(&conversation.0.to_string()));
        assert!(stream_id.contains(&branch.0.to_string()));
    }
}
'''
          p.write_text(text)

          # Public core integration test verifies negotiation capability truth.
          p = Path("rust/crates/mukei-core/tests/ui_protocol_v2.rs")
          text = p.read_text()
          old = '''    assert!(snapshot
        .capabilities
        .iter()
        .any(|value| value == CAP_SCOPED_CHAT_OPERATIONS));
}'''
          new = '''    assert!(snapshot
        .capabilities
        .iter()
        .any(|value| value == CAP_SCOPED_CHAT_OPERATIONS));
    assert!(snapshot
        .capabilities
        .iter()
        .any(|value| value == CAP_EVENT_PAYLOAD_SCOPE_V2));
}'''
          if text.count(old) != 1:
              raise SystemExit("ui_protocol_v2 capability test anchor mismatch")
          p.write_text(text.replace(old, new, 1))

          # Self-delete the temporary patcher; only production changes remain.
          Path(".github/workflows/protocol-v2-contract-patcher.yml").unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "protocol: canonicalize V2 chat payload scope"
          git push origin HEAD:checkpoint/stabilization-2026-07-12
