name: storage-format-owned

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-format-owned.yml
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  format-verify-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Fetch Kotlin comparison ref
        run: git fetch origin Kotlin:refs/remotes/origin/Kotlin
      - name: Install Rust 1.82
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy,rustfmt
      - name: Format only branch-owned Rust files
        shell: bash
        run: |
          set -euo pipefail
          cd rust
          cargo fmt -p mukei-core
          cd ..
          git diff --name-only -- 'rust/crates/mukei-core/**/*.rs' 'rust/crates/mukei-core/tests/*.rs' | sort -u > formatted-files.txt
          git diff --name-only origin/Kotlin...HEAD -- 'rust/crates/mukei-core/**/*.rs' 'rust/crates/mukei-core/tests/*.rs' | sort -u > branch-owned-files.txt
          unexpected=$(comm -23 formatted-files.txt branch-owned-files.txt || true)
          if [ -n "$unexpected" ]; then
            printf 'Formatter touched non-branch-owned files:\n%s\n' "$unexpected"
            exit 1
          fi
          test -s formatted-files.txt
          git add --pathspec-from-file=formatted-files.txt
          git diff --cached --check
      - name: Rustfmt check
        working-directory: rust
        run: cargo fmt -p mukei-core -- --check
      - name: Cargo check
        working-directory: rust
        run: cargo check -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
      - name: Targeted storage tests
        working-directory: rust
        run: cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite storage_import -- --nocapture
      - name: Full tests
        working-directory: rust
        run: cargo test -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
      - name: Clippy
        working-directory: rust
        run: cargo clippy -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings
      - name: Commit verified formatting
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git commit -m "style(storage): format branch-owned import changes"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'storage-format-owned',
              description: 'Branch-owned storage format and Cargo gates passed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'storage-format-owned',
              description: 'Branch-owned storage format finalization failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
