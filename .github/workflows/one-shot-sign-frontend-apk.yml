name: one-shot-sign-frontend-apk

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-sign-frontend-apk.yml'

permissions:
  contents: read
  actions: read

jobs:
  sign-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download green frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: kotlin-frontend-build-956d332aa7f2b32dbbc8a84c1406e01d0d5c691c
          path: input
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: MUKEI-lab/Mukei
          run-id: 29680858325

      - name: Locate Android signing tools
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          APKSIGNER="$(find "$SDK_ROOT/build-tools" -type f -name apksigner | sort -V | tail -1)"
          ZIPALIGN="$(find "$SDK_ROOT/build-tools" -type f -name zipalign | sort -V | tail -1)"
          test -x "$APKSIGNER"
          test -x "$ZIPALIGN"
          echo "APKSIGNER=$APKSIGNER" >> "$GITHUB_ENV"
          echo "ZIPALIGN=$ZIPALIGN" >> "$GITHUB_ENV"

      - name: Locate ARM64 unsigned APK
        shell: bash
        run: |
          set -euo pipefail
          SRC="$(find input -type f -name '*arm64*offline*unsigned*.apk' -print -quit)"
          if [[ -z "$SRC" ]]; then
            SRC="$(find input -type f -name '*arm64*-unsigned.apk' -print -quit)"
          fi
          test -f "$SRC"
          echo "SOURCE_APK=$SRC" >> "$GITHUB_ENV"
          sha256sum "$SRC" | tee source-sha256.txt

      - name: Generate disposable test keystore
        shell: bash
        run: |
          set -euo pipefail
          keytool -genkeypair -noprompt \
            -keystore "$RUNNER_TEMP/mukei-frontend-test.jks" \
            -storepass mukei-test-pass \
            -keypass mukei-test-pass \
            -alias mukei-frontend-test \
            -keyalg RSA -keysize 3072 -validity 3650 \
            -dname 'CN=Mukei Frontend Test,O=MUKEI-lab Test Build,C=US'

      - name: Align sign and verify APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p signed
          ALIGNED="$RUNNER_TEMP/mukei-frontend-arm64-aligned.apk"
          OUT="signed/mukei-frontend-arm64-test-signed.apk"
          "$ZIPALIGN" -p -f 4 "$SOURCE_APK" "$ALIGNED"
          "$APKSIGNER" sign \
            --ks "$RUNNER_TEMP/mukei-frontend-test.jks" \
            --ks-key-alias mukei-frontend-test \
            --ks-pass pass:mukei-test-pass \
            --key-pass pass:mukei-test-pass \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$OUT" "$ALIGNED"
          "$APKSIGNER" verify --verbose --print-certs --min-sdk-version 26 "$OUT" | tee signed/APKSIGNER-VERIFY.txt
          sha256sum "$OUT" | tee signed/SHA256SUMS
          cat > signed/SOURCE.txt <<'EOF'
          Source branch: temp/universal-storage-workspace-v0.1
          Source frontend CI run: 29680858325
          Source artifact: kotlin-frontend-build-956d332aa7f2b32dbbc8a84c1406e01d0d5c691c
          Signing: disposable CI test key; Android SDK zipalign + apksigner; v1/v2/v3 enabled
          This is NOT a production signing identity.
          EOF

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: mukei-frontend-arm64-test-signed-${{ github.sha }}
          path: signed/
          retention-days: 7
          if-no-files-found: error
