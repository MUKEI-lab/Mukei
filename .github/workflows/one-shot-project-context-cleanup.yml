name: one-shot-project-context-cleanup

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-project-context-cleanup.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Remove temporary Project context workflows
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'mukei-project-context-bot'
          git config user.email 'actions@users.noreply.github.com'
          git rm -f --ignore-unmatch \
            .github/workflows/one-shot-project-context.yml \
            .github/workflows/one-shot-project-context-v2.yml \
            .github/workflows/one-shot-project-context-v3.yml \
            .github/workflows/one-shot-fix-project-context-v3-path.yml \
            .github/workflows/one-shot-project-context-anchor-diagnostics.yml \
            .github/workflows/one-shot-project-context-v4.yml \
            .github/workflows/one-shot-project-context-hardening.yml \
            .github/workflows/one-shot-project-context-hardening-v2.yml \
            .github/workflows/one-shot-project-context-arm64.yml \
            .github/workflows/one-shot-project-context-cleanup.yml
          git diff --cached --quiet && exit 0
          git commit -m 'Remove temporary Project context workflows'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
