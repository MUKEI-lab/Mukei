name: activation-composition-root-runner

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'checkpoint/stabilization-2026-07-12'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: checkpoint/stabilization-2026-07-12
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply activation composition-root wiring
        run: python3 .github/patch_activation_composition_root.py
      - name: Apply canonical rustfmt output
        working-directory: rust
        run: cargo fmt --all
      - name: Check core with warnings denied
        working-directory: rust
        env:
          RUSTFLAGS: -D warnings
        run: cargo check -p mukei-core
      - name: Run focused core tests
        id: focused
        continue-on-error: true
        working-directory: rust
        run: |
          set +e
          {
            echo '=== engine::activation::tests ==='
            cargo test -p mukei-core engine::activation::tests --lib
            activation_status=$?
            echo '=== ui_contract::tests ==='
            cargo test -p mukei-core ui_contract::tests --lib
            ui_status=$?
            echo "activation_status=$activation_status"
            echo "ui_status=$ui_status"
            if [ "$activation_status" -ne 0 ] || [ "$ui_status" -ne 0 ]; then
              exit 1
            fi
          } 2>&1 | tee /tmp/activation-composition-focused-tests.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload focused test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: activation-composition-focused-tests
          path: /tmp/activation-composition-focused-tests.log
          retention-days: 1
      - name: Enforce focused tests
        if: steps.focused.outcome == 'failure'
        run: exit 1
      - name: Build bridge with release-gate features
        working-directory: rust
        env:
          RUSTFLAGS: -D warnings
        run: cargo check -p mukei-bridge --features "sqlcipher,network"
      - name: Commit composition-root wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "bridge: wire AgentLoop to process-owned activation router"
          git push origin HEAD:checkpoint/stabilization-2026-07-12
