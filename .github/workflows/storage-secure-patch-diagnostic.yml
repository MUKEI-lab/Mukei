name: storage-secure-patch-diagnostic

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-secure-patch-diagnostic.yml
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'storage-secure-patch-diagnostic',
              description: 'Secure patch diagnostic running',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
      - name: Extract and apply patch with focused log
        shell: bash
        run: |
          set -o pipefail
          mkdir -p secure-patch-diagnostic
          python - <<'PY' 2>&1 | tee secure-patch-diagnostic/patch.log
          from pathlib import Path
          import traceback

          try:
              source = Path('.github/workflows/storage-android-secure-composition.yml').read_text(encoding='utf-8')
              start_marker = "        run: |\n          from pathlib import Path\n"
              end_marker = "\n      - name: Format modified Rust files"
              start = source.index(start_marker) + len("        run: |\n")
              end = source.index(end_marker, start)
              lines = source[start:end].splitlines()
              patch = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
              Path('secure-patch-diagnostic/extracted.py').write_text(patch, encoding='utf-8')
              print(f'extracted_bytes={len(patch.encode())}')
              code = compile(patch, 'extracted.py', 'exec')
              exec(code, {'__name__': '__main__'})
              print('PATCH_APPLIED')
          except BaseException:
              traceback.print_exc()
              raise
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storage-secure-patch-diagnostic-${{ github.sha }}
          path: secure-patch-diagnostic
          if-no-files-found: error
          retention-days: 7
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'storage-secure-patch-diagnostic',
              description: 'Secure patch applied in diagnostic runner',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'storage-secure-patch-diagnostic',
              description: 'Secure patch diagnostic failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
