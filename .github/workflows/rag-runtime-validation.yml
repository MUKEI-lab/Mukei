name: rag-runtime-validation

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - checkpoint/stabilization-2026-07-12

permissions:
  contents: read

concurrency:
  group: rag-runtime-validation-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

env:
  RUSTUP_TOOLCHAIN: stable
  RUSTFLAGS: "-D warnings"
  QT_VERSION: 6.5.3

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true

      - name: Export Qt toolchain paths
        shell: bash
        run: |
          echo "$QT_ROOT_DIR/bin" >> "$GITHUB_PATH"
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> "$GITHUB_ENV"

      - name: Check formatting and patch hygiene
        shell: bash
        run: |
          set -euo pipefail
          cd rust
          cargo fmt --all --check
          cd ..
          git diff --check

      - name: Check core watchdog and inference contracts
        working-directory: rust
        run: cargo check -p mukei-core --all-targets

      - name: Test cumulative token budget and timeout cancellation
        working-directory: rust
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p mukei-core cumulative_turn_token_budget_is_forwarded_per_iteration
          cargo test -p mukei-core watchdog_timeout_cancels_inference_child_work

      - name: Build bridge persistence tuple
        working-directory: rust
        run: cargo build -p mukei-bridge --features "sqlcipher,network"

      - name: Check no-persistence bridge tuple
        working-directory: rust
        env:
          RUSTFLAGS: ""
        run: cargo check -p mukei-bridge --no-default-features --features runtime_development

      - name: Check Candle and HNSW bridge tuple
        working-directory: rust
        env:
          RUSTFLAGS: ""
        run: cargo check -p mukei-bridge --no-default-features --features "runtime_development,candle,usearch_hnsw"

      - name: Run focused RAG runtime tests
        working-directory: rust
        run: cargo test -p mukei-bridge --lib --features "sqlcipher,network" rag_runtime
