name: rag-runtime-validation

on:
  push:
    branches:
      - main
      - Kotlin
      - temp/universal-storage-workspace-v0.1
    paths:
      - "rust/crates/mukei-core/**"
      - "rust/crates/mukei-android-jni/**"
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
      - ".github/workflows/rag-runtime-validation.yml"
  pull_request:
    branches: [ main, Kotlin ]
    paths:
      - "rust/crates/mukei-core/**"
      - "rust/crates/mukei-android-jni/**"
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
      - ".github/workflows/rag-runtime-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rag-runtime-validation-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.86
        uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Check formatting and patch hygiene
        shell: bash
        run: |
          set -euo pipefail
          cd rust
          cargo fmt --all -- --check
          cd ..
          git diff --check

      - name: Test core RAG and storage composition
        working-directory: rust
        run: >-
          cargo test -p mukei-core --lib
          --no-default-features
          --features std,tokio,rusqlite,candle,usearch_hnsw

      - name: Clippy core RAG feature tuple
        working-directory: rust
        run: >-
          cargo clippy -p mukei-core --all-targets
          --no-default-features
          --features std,tokio,rusqlite,candle,usearch_hnsw
          -- -D warnings

      - name: Check Android production RAG composition
        working-directory: rust
        run: >-
          cargo check -p mukei-android-jni
          --no-default-features
          --features secure_runtime,rag_runtime,runtime_hardening
