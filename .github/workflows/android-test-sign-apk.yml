name: android-test-sign-apk

on:
  pull_request:
    branches: [ Kotlin ]
    paths:
      - ".github/workflows/android-test-sign-apk.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  sign-test-apks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download green run 377 release artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-hardening-e237b79e747c9e7dd4547edf30254ead7efab387
          path: unsigned
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: MUKEI-lab/Mukei
          run-id: 29639543810

      - name: Install official Android APK signing tools
        shell: bash
        run: |
          set -euo pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "build-tools;35.0.0"
          test -x "$ANDROID_HOME/build-tools/35.0.0/apksigner"
          test -x "$ANDROID_HOME/build-tools/35.0.0/zipalign"

      - name: Generate disposable test keystore
        shell: bash
        run: |
          set -euo pipefail
          keytool -genkeypair -noprompt \
            -keystore "$RUNNER_TEMP/mukei-test.jks" \
            -storepass changeit \
            -keypass changeit \
            -alias mukei-test \
            -keyalg RSA \
            -keysize 3072 \
            -validity 3650 \
            -dname "CN=Mukei Kotlin Temporary Test,O=MUKEI-lab Test Build,C=US"

      - name: Align, sign and verify APKs with official apksigner
        shell: bash
        run: |
          set -euo pipefail
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          ZIPALIGN="$ANDROID_HOME/build-tools/35.0.0/zipalign"
          mkdir -p signed
          mapfile -t apks < <(find unsigned -type f -name '*-release-unsigned.apk' | sort)
          test "${#apks[@]}" -eq 2
          for apk in "${apks[@]}"; do
            base="$(basename "$apk" -unsigned.apk)"
            aligned="$RUNNER_TEMP/${base}-aligned.apk"
            output="signed/${base}-official-test-signed.apk"
            "$ZIPALIGN" -f -p 4 "$apk" "$aligned"
            "$APKSIGNER" sign \
              --ks "$RUNNER_TEMP/mukei-test.jks" \
              --ks-key-alias mukei-test \
              --ks-pass pass:changeit \
              --key-pass pass:changeit \
              --v1-signing-enabled true \
              --v2-signing-enabled true \
              --v3-signing-enabled true \
              --out "$output" \
              "$aligned"
            "$APKSIGNER" verify --verbose --print-certs "$output" | tee "${output}.verify.txt"
          done
          sha256sum signed/*.apk > signed/SHA256SUMS

      - name: Upload officially verified signed APKs
        uses: actions/upload-artifact@v4
        with:
          name: mukei-run377-official-test-signed-${{ github.sha }}
          if-no-files-found: error
          retention-days: 7
          path: signed/
