name: one-shot-project-context-hardening

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-project-context-hardening.yml'

permissions:
  contents: write
  statuses: write

jobs:
  harden-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Publish pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'pending', context: 'project-context-hardening', description: 'Hardening Project context privacy and atomicity', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.82.0'
          components: rustfmt,clippy
      - name: Apply privacy and atomic mutation hardening
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          p=Path('rust/crates/mukei-core/src/application_runtime/projects.rs')
          s=p.read_text(encoding='utf-8')

          def once(old,new,label):
              global s
              n=s.count(old)
              print(label,n)
              if n != 1:
                  raise SystemExit(f'{label}: expected 1, got {n}')
              s=s.replace(old,new,1)

          once('''    fn projects_snapshot(&self) -> Value {
          ''','''    fn update_active_project(
              &self,
              project_id: &str,
              update: impl FnOnce(&mut ProjectProjection) -> Result<(), RejectionReason>,
          ) -> Result<ProjectProjection, RejectionReason> {
              let updated = {
                  let mut projects = self
                      .projects
                      .write()
                      .unwrap_or_else(|poisoned| poisoned.into_inner());
                  let project = projects
                      .get_mut(project_id)
                      .ok_or(RejectionReason::StaleScope)?;
                  if project.status == ProjectStatus::Archived {
                      return Err(RejectionReason::PolicyDenied);
                  }
                  update(project)?;
                  project.clone()
              };
              self.persist_projects();
              Ok(updated)
          }

              fn projects_snapshot(&self) -> Value {
          ''','insert.atomic_helper')

          once('''    fn active_project(
              &self,
              command: &ValidatedCommand,
              project_id: &str,
          ) -> Result<ProjectProjection, CommandAcknowledgementV2> {
              let Some(project) = self.features.project(project_id) else {
                  return Err(CommandAcknowledgementV2::rejected(
                      Some(&command.envelope),
                      RejectionReason::StaleScope,
                  ));
              };
              if project.status == ProjectStatus::Archived {
                  return Err(CommandAcknowledgementV2::rejected(
                      Some(&command.envelope),
                      RejectionReason::PolicyDenied,
                  ));
              }
              Ok(project)
          }

          ''','''','remove.non_atomic_active_check')

          once('''        if let Err(acknowledgement) = self.active_project(command, &payload.project_id) {
              return acknowledgement;
          }

              let (acknowledgement, operation_id, _) = self.accept_operation(command);
              let name = payload.name.trim().to_owned();
              let description = payload.description.trim().to_owned();
              let updated = self
                  .features
                  .update_project(&payload.project_id, |project| {
                      project.name = name;
                      project.description = description;
                      project.updated_at = Utc::now();
                  })
                  .expect("project existence checked before update");
          ''','''        let name = payload.name.trim().to_owned();
              let description = payload.description.trim().to_owned();
              let updated = match self.features.update_active_project(&payload.project_id, |project| {
                  project.name = name;
                  project.description = description;
                  project.updated_at = Utc::now();
                  Ok(())
              }) {
                  Ok(project) => project,
                  Err(reason) => {
                      return CommandAcknowledgementV2::rejected(Some(&command.envelope), reason)
                  }
              };
              let (acknowledgement, operation_id, _) = self.accept_operation(command);
          ''','update.metadata.atomic')

          once('''        if let Err(acknowledgement) = self.active_project(command, &payload.project_id) {
              return acknowledgement;
          }

              let (acknowledgement, operation_id, _) = self.accept_operation(command);
              let instructions = payload.instructions.trim().to_owned();
              let updated = self
                  .features
                  .update_project(&payload.project_id, |project| {
                      project.instructions = instructions;
                      project.updated_at = Utc::now();
                  })
                  .expect("project existence checked before instructions update");
          ''','''        let instructions = payload.instructions.trim().to_owned();
              let updated = match self.features.update_active_project(&payload.project_id, |project| {
                  project.instructions = instructions;
                  project.updated_at = Utc::now();
                  Ok(())
              }) {
                  Ok(project) => project,
                  Err(reason) => {
                      return CommandAcknowledgementV2::rejected(Some(&command.envelope), reason)
                  }
              };
              let (acknowledgement, operation_id, _) = self.accept_operation(command);
          ''','update.instructions.atomic')

          once('''        let project = match self.active_project(command, &payload.project_id) {
              Ok(project) => project,
              Err(acknowledgement) => return acknowledgement,
          };
              if project.memory.len() >= MAX_PROJECT_MEMORY_ENTRIES {
                  return CommandAcknowledgementV2::rejected(
                      Some(&command.envelope),
                      RejectionReason::PolicyDenied,
                  );
              }

              let (acknowledgement, operation_id, _) = self.accept_operation(command);
              let now = Utc::now();
              let memory_id = Uuid::new_v4().to_string();
              let content = payload.content.trim().to_owned();
              let updated = self
                  .features
                  .update_project(&payload.project_id, |project| {
                      project.memory.push(ProjectMemoryEntry {
                          memory_id: memory_id.clone(),
                          content,
                          created_at: now,
                          updated_at: now,
                      });
                      project.updated_at = now;
                  })
                  .expect("project existence checked before memory add");
          ''','''        let now = Utc::now();
              let memory_id = Uuid::new_v4().to_string();
              let content = payload.content.trim().to_owned();
              let updated = match self.features.update_active_project(&payload.project_id, |project| {
                  if project.memory.len() >= MAX_PROJECT_MEMORY_ENTRIES {
                      return Err(RejectionReason::PolicyDenied);
                  }
                  project.memory.push(ProjectMemoryEntry {
                      memory_id: memory_id.clone(),
                      content,
                      created_at: now,
                      updated_at: now,
                  });
                  project.updated_at = now;
                  Ok(())
              }) {
                  Ok(project) => project,
                  Err(reason) => {
                      return CommandAcknowledgementV2::rejected(Some(&command.envelope), reason)
                  }
              };
              let (acknowledgement, operation_id, _) = self.accept_operation(command);
          ''','add.memory.atomic')

          once('''        let project = match self.active_project(command, &payload.project_id) {
              Ok(project) => project,
              Err(acknowledgement) => return acknowledgement,
          };
              let Some(memory_index) = project_memory_index(&project, &payload.memory_id) else {
                  return CommandAcknowledgementV2::rejected(
                      Some(&command.envelope),
                      RejectionReason::StaleScope,
                  );
              };

              let (acknowledgement, operation_id, _) = self.accept_operation(command);
              let now = Utc::now();
              let content = payload.content.trim().to_owned();
              let memory_id = payload.memory_id.clone();
              let updated = self
                  .features
                  .update_project(&payload.project_id, |project| {
                      let entry = &mut project.memory[memory_index];
                      entry.content = content;
                      entry.updated_at = now;
                      project.updated_at = now;
                  })
                  .expect("project existence checked before memory update");
          ''','''        let now = Utc::now();
              let content = payload.content.trim().to_owned();
              let memory_id = payload.memory_id.clone();
              let updated = match self.features.update_active_project(&payload.project_id, |project| {
                  let memory_index = project_memory_index(project, &memory_id)
                      .ok_or(RejectionReason::StaleScope)?;
                  let entry = &mut project.memory[memory_index];
                  entry.content = content;
                  entry.updated_at = now;
                  project.updated_at = now;
                  Ok(())
              }) {
                  Ok(project) => project,
                  Err(reason) => {
                      return CommandAcknowledgementV2::rejected(Some(&command.envelope), reason)
                  }
              };
              let (acknowledgement, operation_id, _) = self.accept_operation(command);
          ''','update.memory.atomic')

          once('''        let project = match self.active_project(command, &payload.project_id) {
              Ok(project) => project,
              Err(acknowledgement) => return acknowledgement,
          };
              let Some(memory_index) = project_memory_index(&project, &payload.memory_id) else {
                  return CommandAcknowledgementV2::rejected(
                      Some(&command.envelope),
                      RejectionReason::StaleScope,
                  );
              };

              let (acknowledgement, operation_id, _) = self.accept_operation(command);
              let now = Utc::now();
              let memory_id = payload.memory_id.clone();
              let updated = self
                  .features
                  .update_project(&payload.project_id, |project| {
                      project.memory.remove(memory_index);
                      project.updated_at = now;
                  })
                  .expect("project existence checked before memory delete");
          ''','''        let now = Utc::now();
              let memory_id = payload.memory_id.clone();
              let updated = match self.features.update_active_project(&payload.project_id, |project| {
                  let memory_index = project_memory_index(project, &memory_id)
                      .ok_or(RejectionReason::StaleScope)?;
                  project.memory.remove(memory_index);
                  project.updated_at = now;
                  Ok(())
              }) {
                  Ok(project) => project,
                  Err(reason) => {
                      return CommandAcknowledgementV2::rejected(Some(&command.envelope), reason)
                  }
              };
              let (acknowledgement, operation_id, _) = self.accept_operation(command);
          ''','delete.memory.atomic')

          once('''        let result = serde_json::to_value(project).unwrap_or(Value::Null);
          ''','''        let result = json!({
                  "project_id": project.project_id,
                  "status": project.status,
                  "created_at": project.created_at,
                  "updated_at": project.updated_at,
              });
          ''','redact.project_event_payload')

          # Extend tests to pin event redaction.
          once('''    #[test]
              fn memory_identity_lookup_never_crosses_project_boundary() {
          ''','''    #[test]
              fn project_operation_summary_excludes_private_context() {
                  let now = Utc::now();
                  let project = ProjectProjection {
                      project_id: "project-private".into(),
                      name: "Private".into(),
                      description: "description-secret".into(),
                      instructions: "instructions-secret".into(),
                      memory: vec![ProjectMemoryEntry {
                          memory_id: "memory-private".into(),
                          content: "memory-secret".into(),
                          created_at: now,
                          updated_at: now,
                      }],
                      status: ProjectStatus::Active,
                      created_at: now,
                      updated_at: now,
                  };
                  let summary = json!({
                      "project_id": project.project_id,
                      "status": project.status,
                      "created_at": project.created_at,
                      "updated_at": project.updated_at,
                  });
                  let encoded = summary.to_string();
                  assert!(!encoded.contains("description-secret"));
                  assert!(!encoded.contains("instructions-secret"));
                  assert!(!encoded.contains("memory-secret"));
              }

              #[test]
              fn memory_identity_lookup_never_crosses_project_boundary() {
          ''','test.redaction')

          p.write_text(s,encoding='utf-8')
          PY
          cargo fmt --manifest-path rust/Cargo.toml --all
          git diff --check
      - name: Strict hardening checks
        shell: bash
        env:
          RUSTFLAGS: -D warnings
        run: |
          set -euo pipefail
          cargo check --manifest-path rust/Cargo.toml -p mukei-core --all-features
          cargo test --manifest-path rust/Cargo.toml -p mukei-core project_context_tests --all-features
      - name: Commit hardening
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'mukei-project-context-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add rust/crates/mukei-core/src/application_runtime/projects.rs
          git commit -m 'Harden Project context privacy and atomic mutations'
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'success', context: 'project-context-hardening', description: 'Project context privacy/atomicity passed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
      - name: Publish failure status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner: context.repo.owner, repo: context.repo.repo, sha: context.sha, state: 'failure', context: 'project-context-hardening', description: 'Project context hardening failed', target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`});
