name: android-apk-build

on:
  workflow_dispatch:
  pull_request:
    branches: [ "checkpoint/stabilization-2026-07-12" ]
    paths:
      - ".github/workflows/android-apk-build.yml"
      - "qml/**"
      - "rust/**"
      - "scripts/android/**"

permissions:
  contents: read

concurrency:
  group: android-apk-build-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  # Qt 6.8 ships a current Android packaging stack (Gradle 8.10 / AGP 8.6)
  # that can consume the API 35 resource table. Qt 6.5.3's AGP 7.4/AAPT2
  # successfully linked Mukei's native/QML binary but failed on android-35.jar.
  QT_VERSION: "6.8.3"
  ANDROID_NDK_VERSION: "26.1.10909125"
  ANDROID_BUILD_TOOLS_VERSION: "35.0.1"

jobs:
  build-apk:
    name: Build arm64-v8a APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install host tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            p7zip-full \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0
          python -m pip install --upgrade pip
          python -m pip install "aqtinstall==3.3.*" "py7zr==1.1.*"

      - name: Install Android SDK and NDK components
        shell: bash
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [[ -z "${SDK_ROOT}" ]]; then
            echo "Android SDK root is unavailable on the runner." >&2
            exit 1
          fi

          SDKMANAGER="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "${SDKMANAGER}" ]]; then
            SDKMANAGER="$(find "${SDK_ROOT}/cmdline-tools" -type f -path '*/bin/sdkmanager' -perm -u+x -print 2>/dev/null | sort -V | tail -n 1)"
          fi
          if [[ -z "${SDKMANAGER}" || ! -x "${SDKMANAGER}" ]]; then
            echo "sdkmanager was not found below ${SDK_ROOT}." >&2
            exit 1
          fi

          yes | "${SDKMANAGER}" --licenses >/dev/null 2>&1 || true
          "${SDKMANAGER}" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"

          # Keep the build deterministic: androiddeployqt must package against
          # the API 35 platform selected by Mukei's CMake target property.
          find "${SDK_ROOT}/platforms" -mindepth 1 -maxdepth 1 -type d \
            ! -name 'android-35' -exec rm -rf {} +
          find "${SDK_ROOT}/build-tools" -mindepth 1 -maxdepth 1 -type d \
            ! -name "${ANDROID_BUILD_TOOLS_VERSION}" -exec rm -rf {} +

          test -f "${SDK_ROOT}/platforms/android-35/android.jar"
          test -x "${SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}/aapt2"
          test -d "${SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"
          echo "ANDROID_HOME=${SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_SDK_ROOT=${SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK_ROOT=${SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"

      - name: Install Qt Android and host kits
        shell: bash
        run: |
          QT_INSTALL_ROOT="${RUNNER_TEMP}/Qt"
          aqt install-qt \
            linux android "${QT_VERSION}" android_arm64_v8a \
            --autodesktop \
            --outputdir "${QT_INSTALL_ROOT}" \
            --external 7z
          QT_ANDROID_ROOT="${QT_INSTALL_ROOT}/${QT_VERSION}/android_arm64_v8a"
          QT_HOST_ROOT="${QT_INSTALL_ROOT}/${QT_VERSION}/gcc_64"
          test -x "${QT_ANDROID_ROOT}/bin/qt-cmake"
          test -x "${QT_ANDROID_ROOT}/bin/qmake"
          test -d "${QT_HOST_ROOT}"

          if [[ ! -e "${QT_ANDROID_ROOT}/lib/libQt6Core.so" ]]; then
            QT_CORE_LIBRARY="${QT_ANDROID_ROOT}/lib/libQt6Core_arm64-v8a.so"
            if [[ ! -e "${QT_CORE_LIBRARY}" ]]; then
              QT_CORE_LIBRARY="$(find "${QT_ANDROID_ROOT}/lib" -maxdepth 1 \( -type f -o -type l \) -name 'libQt6Core*.so' -print -quit)"
            fi
            if [[ -z "${QT_CORE_LIBRARY}" || ! -e "${QT_CORE_LIBRARY}" ]]; then
              echo "Qt Android Core library was not found below ${QT_ANDROID_ROOT}/lib." >&2
              exit 1
            fi
            ln -sfn "${QT_CORE_LIBRARY}" "${QT_ANDROID_ROOT}/lib/libQt6Core.so"
          fi

          echo "QT_ANDROID_ROOT=${QT_ANDROID_ROOT}" >> "${GITHUB_ENV}"
          echo "QT_HOST_ROOT=${QT_HOST_ROOT}" >> "${GITHUB_ENV}"

      - name: Install Rust Android target
        shell: bash
        run: |
          rustup show
          rustup target add aarch64-linux-android

      - name: Capture native dependency metadata
        shell: bash
        run: |
          mkdir -p dist/android/diagnostics
          cargo fetch --locked --manifest-path rust/Cargo.toml
          CARGO_REGISTRY_HOME="${CARGO_HOME:-${HOME}/.cargo}"
          NUMKONG_DIR="$(find "${CARGO_REGISTRY_HOME}/registry/src" -maxdepth 3 -type d -name 'numkong-7.7.0' -print -quit)"
          if [[ -z "${NUMKONG_DIR}" ]]; then
            echo "numkong 7.7.0 source was not found after cargo fetch." >&2
            exit 1
          fi
          cp "${NUMKONG_DIR}/Cargo.toml" dist/android/diagnostics/numkong-Cargo.toml
          cp "${NUMKONG_DIR}/build.rs" dist/android/diagnostics/numkong-build.rs
          cargo tree \
            --locked \
            --manifest-path rust/Cargo.toml \
            --target aarch64-linux-android \
            -p mukei-bridge \
            --no-default-features \
            --features "shipping_native,android_keystore,runtime_hardening" \
            -i numkong \
            > dist/android/diagnostics/numkong-reverse-tree.txt 2>&1 || true

      - name: Build and validate APK
        shell: bash
        env:
          CARGO_TERM_COLOR: always
          CMAKE_BUILD_PARALLEL_LEVEL: "2"
        run: |
          mkdir -p dist/android
          set -o pipefail
          bash scripts/android/build-apk.sh 2>&1 | tee dist/android/build.log

      - name: Record APK checksums
        shell: bash
        run: |
          sha256sum dist/android/*.apk | tee dist/android/SHA256SUMS

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mukei-0.7.5-arm64-v8a-apk
          path: |
            dist/android/*.apk
            dist/android/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

      - name: Upload Android build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mukei-android-build-diagnostics
          path: |
            dist/android/build.log
            dist/android/diagnostics/**
          if-no-files-found: warn
          retention-days: 7
