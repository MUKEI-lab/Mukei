name: storage-finalizer-import-fix

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-finalizer-import-fix.yml
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

jobs:
  patch-finalizer:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Correct import patch
        shell: python
        run: |
          from pathlib import Path

          path = Path('.github/workflows/storage-quality-finalize.yml')
          source = path.read_text(encoding='utf-8')
          old = "'sync_channel, Receiver, SyncSender, TrySendError,'"
          new = "'sync_channel, Receiver, SyncSender, TryRecvError, TrySendError,'"
          if old not in source:
              if new in source:
                  raise SystemExit(0)
              raise SystemExit('Refusing to patch: finalizer import marker not found')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
      - name: Commit finalizer correction
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add .github/workflows/storage-quality-finalize.yml
          git diff --cached --check
          git commit -m "ci(storage): retain TryRecvError during quality fixes"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
      - name: Publish success status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'storage-finalizer-import-fix',
              description: 'Finalizer import patch corrected',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
