name: one-shot-copy-kotlin-frontend

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - '.github/workflows/one-shot-copy-kotlin-frontend.yml'

permissions:
  contents: write

concurrency:
  group: one-shot-copy-kotlin-frontend
  cancel-in-progress: false

jobs:
  copy-build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SOURCE_KOTLIN_SHA: 1396f71ea2dbbbadd3f7a33f133b8ad6cd928517
    steps:
      - name: Checkout target storage branch
        uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0

      - name: Copy exact UI/UX frontend from Kotlin
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin refs/heads/Kotlin:refs/remotes/origin/Kotlin
          actual_source="$(git rev-parse refs/remotes/origin/Kotlin)"
          test "$actual_source" = "$SOURCE_KOTLIN_SHA" || {
            echo "Kotlin moved: expected $SOURCE_KOTLIN_SHA, found $actual_source" >&2
            exit 1
          }

          files=(
            android/app/src/main/kotlin/ai/mukei/android/MainActivity.kt
            android/app/src/main/kotlin/ai/mukei/android/MukeiProductShell.kt
            android/core/designsystem/src/main/kotlin/ai/mukei/android/designsystem/MukeiTheme.kt
            android/core/designsystem/src/main/kotlin/ai/mukei/android/designsystem/MukeiTokens.kt
            android/core/designsystem/src/main/kotlin/ai/mukei/android/designsystem/MukeiIcons.kt
            android/core/designsystem/src/main/kotlin/ai/mukei/android/designsystem/MukeiNewChatIcon.kt
          )

          git checkout "$SOURCE_KOTLIN_SHA" -- "${files[@]}"

          # Every copied frontend file must now be byte-for-byte identical to Kotlin.
          git diff --cached --quiet "$SOURCE_KOTLIN_SHA" -- "${files[@]}"

          # Fail closed if anything outside the approved frontend surface changed.
          mapfile -t changed < <(git diff --cached --name-only | sort)
          for path in "${changed[@]}"; do
            allowed=false
            for expected in "${files[@]}"; do
              if [[ "$path" == "$expected" ]]; then allowed=true; break; fi
            done
            $allowed || { echo "Unexpected changed path: $path" >&2; exit 1; }
          done

          printf 'Kotlin frontend source: %s\n' "$SOURCE_KOTLIN_SHA"
          printf 'Frontend paths changed on target:\n'
          printf ' - %s\n' "${changed[@]}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Build copied frontend
        shell: bash
        run: |
          set -euo pipefail
          gradle -p android \
            :app:compileDebugKotlin \
            :app:lintDebug \
            :app:assembleDebug \
            :app:assembleOffline \
            --stacktrace

      - name: Commit frontend only after green build
        shell: bash
        run: |
          set -euo pipefail
          if git diff --cached --quiet; then
            echo 'Frontend already matched Kotlin; no commit required.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'feat(android): sync Kotlin UI UX frontend'
            git push origin HEAD:temp/universal-storage-workspace-v0.1
          fi
          {
            echo "kotlin_source_sha=$SOURCE_KOTLIN_SHA"
            echo "target_commit_sha=$(git rev-parse HEAD)"
          } | tee frontend-source.txt

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-frontend-build-${{ github.sha }}
          path: |
            frontend-source.txt
            android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 7
