name: storage-source-hygiene

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-writer-bound.yml

permissions:
  contents: write

concurrency:
  group: storage-source-hygiene
  cancel-in-progress: false

jobs:
  patch-clippy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0

      - name: Verify isolated branch
        shell: bash
        run: |
          set -euo pipefail
          branch="$(git branch --show-current)"
          test "$branch" = "temp/universal-storage-workspace-v0.1"
          test "$branch" != "Kotlin"

      - uses: dtolnay/rust-toolchain@1.82.0
        with:
          components: rustfmt, clippy

      - name: Elide needless indexing transaction lifetime
        shell: python
        run: |
          from pathlib import Path

          path = Path("rust/crates/mukei-core/src/rag/indexer.rs")
          text = path.read_text()
          old = "impl<'a> Drop for IndexingTransaction<'a> {"
          new = "impl Drop for IndexingTransaction<'_> {"
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit("indexing transaction Drop anchor not found")
          path.write_text(text)

      - name: Format and verify source hygiene
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --manifest-path rust/Cargo.toml
          changed="$(git diff --name-only)"
          test "$changed" = "rust/crates/mukei-core/src/rag/indexer.rs"
          cargo check --manifest-path rust/Cargo.toml --locked -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets
          cargo clippy --manifest-path rust/Cargo.toml --locked -p mukei-core --no-default-features --features std,tokio,rusqlite --all-targets -- -D warnings

      - name: Commit validated source fix
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Source hygiene fix already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rust/crates/mukei-core/src/rag/indexer.rs
          git commit -m "fix(rag): elide needless indexing transaction lifetime"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
