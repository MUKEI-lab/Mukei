name: bridge-qt-validation

on:
  push:
    branches: [ main, "agent/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1
  QT_VERSION: 6.5.3

jobs:
  apply-qml-test-source-staging-fix:
    name: apply QML QuickTest source staging fix
    if: github.event_name == 'pull_request' && github.head_ref == 'checkpoint/stabilization-2026-07-12'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Stage source QML cleanly for QuickTest
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("qml/CMakeLists.txt")
          text = path.read_text()

          marker = "qt_add_executable(tst_EventDispatcher\n"
          block = r'''# QuickTest executes QML directly from the filesystem. The production
# subdirectory qmldir files intentionally prefer the compiled qrc module, but
# those resources belong to the mukei executable and are not linked into the
# standalone test executables. Stage a test-only source tree without those
# redirects, then regenerate only the singleton declarations required by
# filesystem directory imports.
set(_MUKEI_QML_TEST_SOURCE_ROOT "${CMAKE_CURRENT_BINARY_DIR}/qml-test-source")
file(REMOVE_RECURSE "${_MUKEI_QML_TEST_SOURCE_ROOT}")
file(MAKE_DIRECTORY "${_MUKEI_QML_TEST_SOURCE_ROOT}")
file(COPY "${CMAKE_CURRENT_SOURCE_DIR}/"
    DESTINATION "${_MUKEI_QML_TEST_SOURCE_ROOT}"
    PATTERN "qmldir" EXCLUDE
    PATTERN "CMakeLists.txt" EXCLUDE
)
foreach(_singleton IN LISTS _MUKEI_QML_SINGLETONS)
    get_filename_component(_singleton_dir "${_singleton}" DIRECTORY)
    get_filename_component(_singleton_name "${_singleton}" NAME_WE)
    set(_singleton_qmldir
        "${_MUKEI_QML_TEST_SOURCE_ROOT}/${_singleton_dir}/qmldir"
    )
    file(APPEND "${_singleton_qmldir}"
        "singleton ${_singleton_name} 1.0 ${_singleton_name}.qml\n"
    )
endforeach()

'''
          if block not in text:
              count = text.count(marker)
              if count != 1:
                  raise SystemExit(f"expected one QuickTest insertion marker, found {count}")
              text = text.replace(marker, block + marker, 1)

          replacements = {
              'qt_add_executable(tst_QmlArchitecture\n    tests/tst_QmlArchitecture.cpp\n)':
                  'qt_add_executable(tst_QmlArchitecture\n    tests/tst_QmlArchitecture.cpp\n    qml.qrc\n)',
              'EVENT_DISPATCHER_QML_SOURCE_DIR="${CMAKE_CURRENT_SOURCE_DIR}/tests/tst_EventDispatcher.qml"':
                  'EVENT_DISPATCHER_QML_SOURCE_DIR="${_MUKEI_QML_TEST_SOURCE_ROOT}/tests/tst_EventDispatcher.qml"',
              'QML_ARCHITECTURE_TEST_SOURCE_DIR="${CMAKE_CURRENT_SOURCE_DIR}/tests"':
                  'QML_ARCHITECTURE_TEST_SOURCE_DIR="${_MUKEI_QML_TEST_SOURCE_ROOT}/tests"',
              'add_test(NAME tst_EventDispatcher COMMAND tst_EventDispatcher -platform offscreen -input ${CMAKE_CURRENT_SOURCE_DIR}/tests/tst_EventDispatcher.qml)':
                  'add_test(NAME tst_EventDispatcher COMMAND tst_EventDispatcher -platform offscreen -input ${_MUKEI_QML_TEST_SOURCE_ROOT}/tests/tst_EventDispatcher.qml)',
          }
          for old, new in replacements.items():
              if new in text:
                  continue
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one occurrence of {old!r}, found {count}")
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY
          git diff --check
      - name: Commit QuickTest source staging fix
        run: |
          if git diff --quiet; then
            echo "QuickTest source staging fix already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add qml/CMakeLists.txt
          git commit -m "fix: stage QML source modules for QuickTest"
          git push origin HEAD:${{ github.head_ref }}

  bridge-compile:
    name: bridge compile gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-bridge-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bridge-
      - name: cargo build -p mukei-bridge
        working-directory: rust
        run: cargo build -p mukei-bridge --features "sqlcipher,network"

  qml-runtime:
    name: qml configure-build-test gate
    runs-on: ubuntu-latest
    env:
      CMAKE_BUILD_DIR: /tmp/mukei-qml-build
      QT_QPA_PLATFORM: offscreen
      CXX_QT_EXPORT_DIR: ${{ github.workspace }}/rust/target/cxxqt-export
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Ensure CMake and Ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-qml-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-qml-
      - name: Build bridge library and export CXX-Qt headers
        working-directory: rust
        run: |
          cargo clean -p mukei-bridge
          env \
            CXX_QT_EXPORT_DIR="$CXX_QT_EXPORT_DIR" \
            'CXX_QT_EXPORT_CRATE_mukei-bridge=1' \
            cargo build -p mukei-bridge --features "sqlcipher,network"
      - name: Configure QML build
        working-directory: qml
        run: >-
          cmake -S . -B "$CMAKE_BUILD_DIR" -G Ninja
          -DMUKEI_USE_REAL_BRIDGE=ON
          -DMUKEI_BRIDGE_LIB="$GITHUB_WORKSPACE/rust/target/debug/libmukei_bridge.a"
          -DMUKEI_CXX_QT_EXPORT_DIR="$CXX_QT_EXPORT_DIR"
      - name: Build generated qmllint targets
        run: |
          cmake --build "$CMAKE_BUILD_DIR" --target help > /tmp/mukei-qml-targets.txt
          if grep -q 'all_qmllint' /tmp/mukei-qml-targets.txt; then
            cmake --build "$CMAKE_BUILD_DIR" --target all_qmllint
          else
            echo "Expected all_qmllint target was not generated." >&2
            exit 1
          fi
      - name: Capture QML build diagnostics
        id: qml-build
        continue-on-error: true
        run: cmake --build "$CMAKE_BUILD_DIR" > /tmp/mukei-qml-build.log 2>&1
      - name: Upload QML build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qml-build-diagnostics
          path: /tmp/mukei-qml-build.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce QML build result
        if: steps.qml-build.outcome == 'failure'
        run: exit 1
      - name: Capture CTest diagnostics
        id: ctest
        continue-on-error: true
        run: ctest --test-dir "$CMAKE_BUILD_DIR" --output-on-failure > /tmp/mukei-ctest.log 2>&1
      - name: Upload CTest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-diagnostics
          path: /tmp/mukei-ctest.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce CTest result
        if: steps.ctest.outcome == 'failure'
        run: exit 1
