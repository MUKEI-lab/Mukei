name: bridge-qt-validation

on:
  push:
    branches: [ main, "agent/**", "checkpoint/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1
  QT_VERSION: 6.5.3

jobs:
  bridge-compile:
    name: bridge compile gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-bridge-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bridge-
      - name: cargo build -p mukei-bridge
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo build -p mukei-bridge --features "sqlcipher,network" 2>&1 | tee /tmp/mukei-bridge-build.log
      - name: Upload bridge compile failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-compile-failure
          path: /tmp/mukei-bridge-build.log
          if-no-files-found: error
          retention-days: 1

  qml-runtime:
    name: qml configure-build-test gate
    runs-on: ubuntu-latest
    env:
      CMAKE_BUILD_DIR: /tmp/mukei-qml-build
      QT_QPA_PLATFORM: offscreen
      CXX_QT_EXPORT_DIR: ${{ github.workspace }}/rust/target/cxxqt-export
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Ensure CMake and Ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-qml-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-qml-
      - name: Build bridge library and export CXX-Qt headers
        working-directory: rust
        shell: bash
        run: |
          set -o pipefail
          cargo clean -p mukei-bridge
          env \
            CXX_QT_EXPORT_DIR="$CXX_QT_EXPORT_DIR" \
            'CXX_QT_EXPORT_CRATE_mukei-bridge=1' \
            cargo build -p mukei-bridge --features "sqlcipher,network" 2>&1 | tee /tmp/mukei-qml-bridge-build.log
      - name: Upload QML bridge build failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qml-bridge-build-failure
          path: /tmp/mukei-qml-bridge-build.log
          if-no-files-found: error
          retention-days: 1
      - name: Configure QML build
        working-directory: qml
        run: >-
          cmake -S . -B "$CMAKE_BUILD_DIR" -G Ninja
          -DMUKEI_USE_REAL_BRIDGE=ON
          -DMUKEI_BRIDGE_LIB="$GITHUB_WORKSPACE/rust/target/debug/libmukei_bridge.a"
          -DMUKEI_CXX_QT_EXPORT_DIR="$CXX_QT_EXPORT_DIR"
      - name: Build generated qmllint targets
        run: |
          cmake --build "$CMAKE_BUILD_DIR" --target help > /tmp/mukei-qml-targets.txt
          if ! grep -q 'all_qmllint' /tmp/mukei-qml-targets.txt; then
            echo "Expected all_qmllint target was not generated." >&2
            exit 1
          fi
          set +e
          cmake --build "$CMAKE_BUILD_DIR" --target all_qmllint 2>&1 | tee /tmp/mukei-qmllint.log
          lint_status=${PIPESTATUS[0]}
          set -e
          python3 qml/scripts/qmllint_allowlist_guard.py /tmp/mukei-qmllint.log
          exit "$lint_status"
      - name: Build QML and test targets
        run: cmake --build "$CMAKE_BUILD_DIR" -j2
      - name: Run CTest
        run: ctest --test-dir "$CMAKE_BUILD_DIR" --output-on-failure

  rag-authority-publish:
    name: temporary RAG authority publisher
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
      - name: Gate exact publisher commit
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          parent="$(git rev-parse HEAD^)"
          changed="$(git diff --name-only HEAD^ HEAD)"
          if [[ "$parent" == "33ebfe1ed9bbb76e51139f3396b804658bc49d1f" && "$changed" == ".github/workflows/bridge-qt-validation.yml" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No-op: publisher is bound to one exact workflow-edit commit."
          fi
      - name: Install stable toolchain
        if: steps.gate.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        if: steps.gate.outputs.run == 'true'
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        if: steps.gate.outputs.run == 'true'
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Capture baseline minimal tuple
        if: steps.gate.outputs.run == 'true'
        working-directory: rust
        shell: bash
        run: |
          set +e
          set -o pipefail
          cargo check -p mukei-bridge --no-default-features --features runtime_development 2>&1 | tee /tmp/rag-baseline-minimal.log
          echo "${PIPESTATUS[0]}" > /tmp/rag-baseline-status
          exit 0
      - name: Apply count-checked RAG authority patch
        if: steps.gate.outputs.run == 'true'
        run: python3 .github/remediation/rag-runtime-authority-slice.py
      - name: Format and validate exact source diff
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          (cd rust && cargo fmt --all)
          git diff --check
          mapfile -t changed < <({ git diff --name-only; git ls-files --others --exclude-standard; } | sort -u)
          expected=(
            rust/crates/mukei-bridge/src/agent_runtime.rs
            rust/crates/mukei-bridge/src/app_runtime.rs
            rust/crates/mukei-bridge/src/app_runtime/rag_runtime.rs
          )
          [[ "${changed[*]}" == "${expected[*]}" ]] || {
            printf 'Unexpected source diff:\n%s\n' "${changed[*]}" >&2
            exit 1
          }
      - name: Build bridge persistence tuple
        if: steps.gate.outputs.run == 'true'
        working-directory: rust
        run: cargo build -p mukei-bridge --features "sqlcipher,network"
      - name: Capture patched minimal tuple
        if: steps.gate.outputs.run == 'true'
        working-directory: rust
        shell: bash
        run: |
          set +e
          set -o pipefail
          cargo check -p mukei-bridge --no-default-features --features runtime_development 2>&1 | tee /tmp/rag-patched-minimal.log
          echo "${PIPESTATUS[0]}" > /tmp/rag-patched-status
          exit 0
      - name: Assert no minimal-tuple regression
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path('/tmp')
          baseline_status = (root / 'rag-baseline-status').read_text().strip()
          patched_status = (root / 'rag-patched-status').read_text().strip()
          if baseline_status != patched_status:
              raise SystemExit(
                  f'minimal tuple status changed: baseline={baseline_status}, patched={patched_status}'
              )

          ansi = re.compile(r'\x1b\[[0-9;]*[A-Za-z]')
          def diagnostics(path: pathlib.Path) -> list[str]:
              text = ansi.sub('', path.read_text(errors='replace'))
              return [
                  line for line in text.splitlines()
                  if line.startswith('error:') or 'could not compile' in line
              ]

          baseline = diagnostics(root / 'rag-baseline-minimal.log')
          patched = diagnostics(root / 'rag-patched-minimal.log')
          if baseline != patched:
              print('baseline diagnostics:', file=sys.stderr)
              print('\n'.join(baseline), file=sys.stderr)
              print('patched diagnostics:', file=sys.stderr)
              print('\n'.join(patched), file=sys.stderr)
              raise SystemExit('RAG authority slice changed minimal-tuple diagnostics')
          print(f'minimal tuple preserved: status={baseline_status}, diagnostics={len(baseline)}')
          PY
      - name: Run focused RAG authority test
        if: steps.gate.outputs.run == 'true'
        working-directory: rust
        run: cargo test -p mukei-bridge --lib --features "sqlcipher,network" rag_runtime
      - name: Commit only verified source files
        if: steps.gate.outputs.run == 'true'
        shell: bash
        env:
          BRANCH_NAME: checkpoint/stabilization-2026-07-12
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            rust/crates/mukei-bridge/src/agent_runtime.rs \
            rust/crates/mukei-bridge/src/app_runtime.rs \
            rust/crates/mukei-bridge/src/app_runtime/rag_runtime.rs
          mapfile -t staged < <(git diff --cached --name-only | sort)
          expected=(
            rust/crates/mukei-bridge/src/agent_runtime.rs
            rust/crates/mukei-bridge/src/app_runtime.rs
            rust/crates/mukei-bridge/src/app_runtime/rag_runtime.rs
          )
          [[ "${staged[*]}" == "${expected[*]}" ]] || exit 1
          git commit -m "feat: establish process-owned RAG runtime authority"
          remote_head="$(git ls-remote origin "refs/heads/$BRANCH_NAME" | cut -f1)"
          [[ "$remote_head" == "$GITHUB_SHA" ]] || {
            echo "Remote branch moved: expected $GITHUB_SHA, found $remote_head" >&2
            exit 1
          }
          git push origin "HEAD:refs/heads/$BRANCH_NAME"
