name: bridge-qt-validation

on:
  push:
    branches: [ main, "agent/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1
  QT_VERSION: 6.5.3

jobs:
  bridge-compile:
    name: bridge compile gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-bridge-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bridge-
      - name: cargo build -p mukei-bridge
        working-directory: rust
        run: cargo build -p mukei-bridge --features "sqlcipher,network"

  qml-runtime:
    name: qml configure-build-test gate
    runs-on: ubuntu-latest
    env:
      CMAKE_BUILD_DIR: /tmp/mukei-qml-build
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Ensure CMake and Ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-qml-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-qml-
      - name: Build bridge library for QML linkage
        working-directory: rust
        run: cargo build -p mukei-bridge --features "sqlcipher,network"
      - name: Configure QML build
        working-directory: qml
        run: >-
          cmake -S . -B "$CMAKE_BUILD_DIR" -G Ninja
          -DMUKEI_USE_REAL_BRIDGE=ON
          -DMUKEI_BRIDGE_LIB="$GITHUB_WORKSPACE/rust/target/debug/libmukei_bridge.so"
      - name: Build generated qmllint targets
        run: |
          cmake --build "$CMAKE_BUILD_DIR" --target help > /tmp/mukei-qml-targets.txt
          if grep -q 'all_qmllint' /tmp/mukei-qml-targets.txt; then
            cmake --build "$CMAKE_BUILD_DIR" --target all_qmllint
          else
            echo "Expected all_qmllint target was not generated." >&2
            exit 1
          fi
      - name: Build QML and test targets
        run: cmake --build "$CMAKE_BUILD_DIR"
      - name: Run CTest
        run: ctest --test-dir "$CMAKE_BUILD_DIR" --output-on-failure

  qml-module-topology-repair:
    name: align QML directory modules
    if: github.head_ref == 'agent/ci-green-final' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ci-green-final
      - name: Restore directory metadata and explicit cross-directory imports
        shell: python
        run: |
          from pathlib import Path
          import re

          root = Path("qml")
          groups = {
              "events": ["EventDispatcher"],
              "architecture": ["AppCoordinator", "AppStateHub", "IntentDispatcher", "PresentationPolicy", "SnapshotController"],
              "stores": [
                  "ContractStore", "LifecycleStore", "CapabilityStore", "ConversationStore", "NavigationStore",
                  "UiSessionStore", "ChatStore", "RecoveryStore", "ModelStore", "DownloadStore", "DocumentStore",
                  "StorageStore", "SettingsStore", "ResponsiveStore", "OperationStore", "ErrorStore",
                  "DiagnosticsStore", "AccessibilityStore"
              ],
              "shell": ["AppShell", "AdaptiveNavigation", "RouterHost", "BannerHost", "SnackbarHost", "OperationOverlayHost", "SheetHost", "DialogHost"],
              "theme": ["Theme", "Type", "Spacing", "Motion"],
              "components": [
                  "AccessibilityAnnouncer", "AIMessageBubble", "BranchSwitcherSheet", "ChatComposer", "ChatTimelineEvent",
                  "CodeBlockComponent", "ConfirmationDialog", "ConversationList", "CopyButton", "DestructiveButton",
                  "DestructiveConfirmDialog", "FontLoader", "FullScreenModal", "GhostButton", "HapticFeedback", "IconButton",
                  "LeftDrawer", "MarkdownRenderer", "MukeiIcon", "ModalSheet", "NetworkBanner", "PrimaryButton", "ProgressBar",
                  "PromptCard", "RAGChunkCard", "SearchField", "SecondaryButton", "SettingsTextField", "SkeletonLoader", "Spinner",
                  "StatusPill", "StoragePressureCard", "StreamingCaret", "ThinkingAccordion", "ToastNotification", "ToolResultCard",
                  "UserMessageBubble"
              ],
              "screens": [
                  "ChatScreen", "CompatibilityScreen", "DownloadsScreen", "DocumentsScreen", "DiagnosticsScreen", "EmptyChatScreen",
                  "ModelManagerScreen", "ModelPickerScreen", "RagRebuildPromptScreen", "RecoveryScreen", "SafeModeScreen",
                  "SettingsScreen", "StartupScreen", "ToolResultExpandedScreen", "VerificationScreen", "WelcomeScreen"
              ],
          }
          singleton_groups = {"events", "architecture", "stores", "theme"}
          module_names = {
              "events": "com.mukei.events",
              "architecture": "com.mukei.architecture",
              "stores": "Mukei.Stores",
              "shell": "com.mukei.shell",
              "theme": "com.mukei.theme",
              "components": "com.mukei.components",
              "screens": "com.mukei.screens",
          }

          for group, names in groups.items():
              lines = [f"module {module_names[group]}"]
              for name in names:
                  prefix = "singleton " if group in singleton_groups else ""
                  lines.append(f"{prefix}{name} 1.0 {name}.qml")
              (root / group / "qmldir").write_text("\n".join(lines) + "\n")

          module_files = [root / "MainWindow.qml"]
          for group in groups:
              module_files.extend(sorted((root / group).glob("*.qml")))

          for path in module_files:
              text = path.read_text()
              lines = text.splitlines()
              body = "\n".join(line for line in lines if not line.lstrip().startswith("import "))
              own_group = path.parent.name if path.parent != root else None
              wanted = []
              for group, names in groups.items():
                  if group == own_group:
                      continue
                  if any(re.search(rf"\b{re.escape(name)}\b", body) for name in names):
                      target = group if path.parent == root else f"../{group}"
                      wanted.append(f'import "{target}"')

              existing = {line.strip() for line in lines if line.strip().startswith("import ")}
              additions = [item for item in wanted if item not in existing]
              if not additions:
                  continue

              insert_at = 0
              while insert_at < len(lines) and (
                  lines[insert_at].startswith("pragma ")
                  or lines[insert_at].startswith("import ")
                  or lines[insert_at].strip() == ""
              ):
                  insert_at += 1
              lines[insert_at:insert_at] = additions
              path.write_text("\n".join(lines) + "\n")
      - name: Commit QML topology repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add qml
          git commit -m "fix(qml): align directory modules and explicit imports"
          git push origin HEAD:agent/ci-green-final
