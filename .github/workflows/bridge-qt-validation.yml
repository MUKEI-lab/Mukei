name: bridge-qt-validation

on:
  push:
    branches: [ main, "agent/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1
  QT_VERSION: 6.5.3

jobs:
  bridge-compile:
    name: bridge compile gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-bridge-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bridge-
      - name: cargo build -p mukei-bridge
        working-directory: rust
        run: cargo build -p mukei-bridge --features "sqlcipher,network"

  qml-runtime:
    name: qml configure-build-test gate
    runs-on: ubuntu-latest
    env:
      CMAKE_BUILD_DIR: /tmp/mukei-qml-build
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Ensure CMake and Ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-qml-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-qml-
      - name: Build bridge library for QML linkage
        working-directory: rust
        run: cargo build -p mukei-bridge --features "sqlcipher,network"
      - name: Configure QML build
        working-directory: qml
        run: >-
          cmake -S . -B "$CMAKE_BUILD_DIR" -G Ninja
          -DMUKEI_USE_REAL_BRIDGE=ON
          -DMUKEI_BRIDGE_LIB="$GITHUB_WORKSPACE/rust/target/debug/libmukei_bridge.a"
      - name: Build generated qmllint targets
        run: |
          cmake --build "$CMAKE_BUILD_DIR" --target help > /tmp/mukei-qml-targets.txt
          if grep -q 'all_qmllint' /tmp/mukei-qml-targets.txt; then
            cmake --build "$CMAKE_BUILD_DIR" --target all_qmllint
          else
            echo "Expected all_qmllint target was not generated." >&2
            exit 1
          fi
      - name: Build QML and test targets
        run: cmake --build "$CMAKE_BUILD_DIR"
      - name: Run CTest
        run: ctest --test-dir "$CMAKE_BUILD_DIR" --output-on-failure

  official-cxxqt-cmake-repair:
    name: adopt official CXX-Qt CMake import
    if: github.head_ref == 'agent/ci-green-final' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ci-green-final
      - name: Patch QML CMake bridge integration
        shell: python
        run: |
          from pathlib import Path

          path = Path("qml/CMakeLists.txt")
          text = path.read_text()

          old_setup = '''# Cargo bridge artifact selection. Android loads the `cdylib` .so;
          # desktop hosts link the `staticlib` archive so CXX-Qt generated QObject
          # constructors, vtables, and CXX bridge support symbols are part of the
          # final executable instead of relying on hidden cdylib symbol exports.

          if(ANDROID)
              set(_MUKEI_BRIDGE_DEFAULT
                  ${CMAKE_CURRENT_SOURCE_DIR}/../rust/target/aarch64-linux-android/release/libmukei_bridge.so
              )
          else()
              set(_MUKEI_BRIDGE_DEFAULT
                  ${CMAKE_CURRENT_SOURCE_DIR}/../rust/target/release/libmukei_bridge.a
              )
          endif()
          set(MUKEI_BRIDGE_LIB "${_MUKEI_BRIDGE_DEFAULT}"
              CACHE FILEPATH "Path to the Cargo-built mukei-bridge native library artifact"
          )
          '''

          new_setup = '''# Real bridge integration follows the native platform contract:
          # Android consumes the prebuilt `cdylib` .so, while desktop CMake uses
          # CXX-Qt's official Corrosion wrapper. The official import propagates
          # generated headers, native support libraries, Qt link metadata, and
          # initializer objects that cannot be recovered by linking Cargo's raw
          # static archive directly.
          if(ANDROID)
              set(_MUKEI_BRIDGE_DEFAULT
                  ${CMAKE_CURRENT_SOURCE_DIR}/../rust/target/aarch64-linux-android/release/libmukei_bridge.so
              )
              set(MUKEI_BRIDGE_LIB "${_MUKEI_BRIDGE_DEFAULT}"
                  CACHE FILEPATH "Path to the Cargo-built Android mukei-bridge shared library"
              )
          elseif(MUKEI_USE_REAL_BRIDGE)
              include(FetchContent)
              FetchContent_Declare(
                  CxxQt
                  GIT_REPOSITORY https://github.com/KDAB/cxx-qt-cmake.git
                  GIT_TAG fcc1dbfb97712f1253b52a6f565298dc7fd0a6e3
              )
              FetchContent_MakeAvailable(CxxQt)

              cxx_qt_import_crate(
                  MANIFEST_PATH ${CMAKE_CURRENT_SOURCE_DIR}/../rust/Cargo.toml
                  CRATES mukei-bridge
                  LOCKED
                  QT_MODULES Qt6::Core
              )
          endif()
          '''

          if old_setup not in text:
              raise SystemExit("Expected manual bridge artifact setup block not found")
          text = text.replace(old_setup, new_setup, 1)

          old_link = '''if(EXISTS ${MUKEI_BRIDGE_LIB})
              target_link_libraries(mukei PRIVATE ${MUKEI_BRIDGE_LIB})
          elseif(MUKEI_USE_REAL_BRIDGE)
              message(FATAL_ERROR "MUKEI_USE_REAL_BRIDGE=ON but MUKEI_BRIDGE_LIB does not exist: ${MUKEI_BRIDGE_LIB}")
          endif()

          if(MUKEI_USE_REAL_BRIDGE)
              target_compile_definitions(mukei PRIVATE MUKEI_USE_REAL_BRIDGE=1)

              # CXX-Qt emits the bridge and its support headers below hashed
              # Cargo build-output directories. Discover every cxxqtbuild/include
              # root so this works for debug/release, host builds, and target-
              # triple builds without hard-coding Cargo's hash directories.
              file(GLOB_RECURSE _MUKEI_CXXQT_GENERATED_HEADERS
                  LIST_DIRECTORIES FALSE
                  "${CMAKE_CURRENT_SOURCE_DIR}/../rust/target/*.h"
              )
              set(_MUKEI_CXXQT_INCLUDE_DIRS "")
              set(_MUKEI_BRIDGE_GENERATED_HEADER_FOUND FALSE)
              foreach(_MUKEI_CXXQT_HEADER IN LISTS _MUKEI_CXXQT_GENERATED_HEADERS)
                  if(_MUKEI_CXXQT_HEADER MATCHES "^(.*[/]cxxqtbuild[/]include)/.+[.]h$")
                      list(APPEND _MUKEI_CXXQT_INCLUDE_DIRS "${CMAKE_MATCH_1}")
                  endif()
                  if(_MUKEI_CXXQT_HEADER MATCHES "/mukei-bridge/src/lib[.]cxxqt[.]h$")
                      set(_MUKEI_BRIDGE_GENERATED_HEADER_FOUND TRUE)
                  endif()
              endforeach()
              list(REMOVE_DUPLICATES _MUKEI_CXXQT_INCLUDE_DIRS)

              if(NOT _MUKEI_BRIDGE_GENERATED_HEADER_FOUND)
                  message(FATAL_ERROR
                      "MUKEI_USE_REAL_BRIDGE=ON but the generated CXX-Qt header "
                      "mukei-bridge/src/lib.cxxqt.h was not found under rust/target. "
                      "Build mukei-bridge with Cargo before configuring QML.")
              endif()

              target_include_directories(mukei PRIVATE ${_MUKEI_CXXQT_INCLUDE_DIRS})
          endif()
          '''

          new_link = '''if(MUKEI_USE_REAL_BRIDGE)
              target_compile_definitions(mukei PRIVATE MUKEI_USE_REAL_BRIDGE=1)

              if(ANDROID)
                  if(EXISTS ${MUKEI_BRIDGE_LIB})
                      target_link_libraries(mukei PRIVATE ${MUKEI_BRIDGE_LIB})
                  else()
                      message(FATAL_ERROR
                          "MUKEI_USE_REAL_BRIDGE=ON but the Android bridge library does not exist: ${MUKEI_BRIDGE_LIB}")
                  endif()

                  # Android still consumes a Cargo-built cdylib, so its generated
                  # CXX-Qt headers are discovered from the Cargo target tree.
                  file(GLOB_RECURSE _MUKEI_CXXQT_GENERATED_HEADERS
                      LIST_DIRECTORIES FALSE
                      "${CMAKE_CURRENT_SOURCE_DIR}/../rust/target/*.h"
                  )
                  set(_MUKEI_CXXQT_INCLUDE_DIRS "")
                  set(_MUKEI_BRIDGE_GENERATED_HEADER_FOUND FALSE)
                  foreach(_MUKEI_CXXQT_HEADER IN LISTS _MUKEI_CXXQT_GENERATED_HEADERS)
                      if(_MUKEI_CXXQT_HEADER MATCHES "^(.*[/]cxxqtbuild[/]include)/.+[.]h$")
                          list(APPEND _MUKEI_CXXQT_INCLUDE_DIRS "${CMAKE_MATCH_1}")
                      endif()
                      if(_MUKEI_CXXQT_HEADER MATCHES "/mukei-bridge/src/lib[.]cxxqt[.]h$")
                          set(_MUKEI_BRIDGE_GENERATED_HEADER_FOUND TRUE)
                      endif()
                  endforeach()
                  list(REMOVE_DUPLICATES _MUKEI_CXXQT_INCLUDE_DIRS)

                  if(NOT _MUKEI_BRIDGE_GENERATED_HEADER_FOUND)
                      message(FATAL_ERROR
                          "MUKEI_USE_REAL_BRIDGE=ON but the generated CXX-Qt header "
                          "mukei-bridge/src/lib.cxxqt.h was not found under rust/target. "
                          "Build mukei-bridge with Cargo before configuring QML.")
                  endif()

                  target_include_directories(mukei PRIVATE ${_MUKEI_CXXQT_INCLUDE_DIRS})
              else()
                  if(NOT TARGET mukei_bridge)
                      message(FATAL_ERROR "CXX-Qt failed to import the mukei_bridge Cargo target")
                  endif()
                  target_link_libraries(mukei PRIVATE mukei_bridge)
              endif()
          endif()
          '''

          if old_link not in text:
              raise SystemExit("Expected manual bridge link/header block not found")
          path.write_text(text.replace(old_link, new_link, 1))
      - name: Commit official CXX-Qt CMake integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add qml/CMakeLists.txt
          git commit -m "fix(qml): use official CXX-Qt CMake import"
          git push origin HEAD:agent/ci-green-final
