name: bridge-qt-validation

on:
  push:
    branches: [ main, "agent/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1
  QT_VERSION: 6.5.3

jobs:
  apply-checkpoint-ci-repair:
    name: apply checkpoint CI repair
    if: github.event_name == 'pull_request' && github.head_ref == 'checkpoint/stabilization-2026-07-12'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply exact bridge compile fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          storage = Path("rust/crates/mukei-bridge/src/storage_bridge.rs")
          storage_text = storage.read_text()
          old = "mukei_core::storage::DEFAULT_MAX_MODEL_STORAGE_BYTES"
          new = "mukei_core::storage::quota::DEFAULT_MAX_MODEL_STORAGE_BYTES"
          if storage_text.count(old) != 1:
              raise SystemExit(f"expected exactly one quota constant reference, found {storage_text.count(old)}")
          storage.write_text(storage_text.replace(old, new, 1))

          bridge = Path("rust/crates/mukei-bridge/src/lib.rs")
          bridge_text = bridge.read_text()

          old_load = "mukei_core::storage::UiSessionRepository::load("
          new_load = "mukei_core::storage::UiSessionRepository::load_session("
          if bridge_text.count(old_load) != 1:
              raise SystemExit(f"expected exactly one UiSessionRepository::load call, found {bridge_text.count(old_load)}")
          bridge_text = bridge_text.replace(old_load, new_load, 1)

          old_complete = '''                        let status = format!("complete:{destination_token}");
                        let final_path_string = destination_token.clone();
                        let _ = qt_for_ev.queue(move |mut qobject| {
                            qobject.as_mut().event_emitted(event_json(BridgeEvent::new(
                                BridgeEventKind::DownloadCompleted {
                                    final_path: final_path_string.clone(),
                                    model_id: model_id.clone(),
                                },
                            )));'''
          new_complete = '''                        let status = format!("complete:{destination_token}");
                        let final_path_string = destination_token.clone();
                        let completed_model_id = model_id.clone();
                        let _ = qt_for_ev.queue(move |mut qobject| {
                            qobject.as_mut().event_emitted(event_json(BridgeEvent::new(
                                BridgeEventKind::DownloadCompleted {
                                    final_path: final_path_string.clone(),
                                    model_id: completed_model_id,
                                },
                            )));'''
          if bridge_text.count(old_complete) != 1:
              raise SystemExit(f"expected exactly one DownloadCompleted ownership block, found {bridge_text.count(old_complete)}")
          bridge.write_text(bridge_text.replace(old_complete, new_complete, 1))
          PY
          git diff --check
      - name: Commit repair to checkpoint branch
        run: |
          if git diff --quiet; then
            echo "Checkpoint repair already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rust/crates/mukei-bridge/src/lib.rs rust/crates/mukei-bridge/src/storage_bridge.rs
          git commit -m "fix: repair bridge compile regressions"
          git push origin HEAD:${{ github.head_ref }}

  bridge-compile:
    name: bridge compile gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-bridge-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bridge-
      - name: Capture bridge compiler diagnostics
        id: bridge-build
        continue-on-error: true
        working-directory: rust
        run: >-
          cargo build --quiet -p mukei-bridge --features "sqlcipher,network"
          --message-format=short > /tmp/mukei-bridge-build.log 2>&1
      - name: Upload bridge compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bridge-build-diagnostics
          path: /tmp/mukei-bridge-build.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce bridge build result
        if: steps.bridge-build.outcome == 'failure'
        run: exit 1

  qml-runtime:
    name: qml configure-build-test gate
    runs-on: ubuntu-latest
    env:
      CMAKE_BUILD_DIR: /tmp/mukei-qml-build
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Ensure CMake and Ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-qml-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-qml-
      - name: Build bridge library for QML linkage
        working-directory: rust
        run: cargo build -p mukei-bridge --features "sqlcipher,network"
      - name: Configure QML build
        working-directory: qml
        run: >-
          cmake -S . -B "$CMAKE_BUILD_DIR" -G Ninja
          -DMUKEI_USE_REAL_BRIDGE=ON
          -DMUKEI_BRIDGE_LIB="$GITHUB_WORKSPACE/rust/target/debug/libmukei_bridge.so"
      - name: Build generated qmllint targets
        run: |
          cmake --build "$CMAKE_BUILD_DIR" --target help > /tmp/mukei-qml-targets.txt
          if grep -q 'all_qmllint' /tmp/mukei-qml-targets.txt; then
            cmake --build "$CMAKE_BUILD_DIR" --target all_qmllint
          else
            echo "Expected all_qmllint target was not generated." >&2
            exit 1
          fi
      - name: Build QML and test targets
        run: cmake --build "$CMAKE_BUILD_DIR"
      - name: Run CTest
        run: ctest --test-dir "$CMAKE_BUILD_DIR" --output-on-failure
