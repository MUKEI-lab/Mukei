name: bridge-qt-validation

on:
  push:
    branches: [ main, "agent/**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1
  QT_VERSION: 6.5.3

jobs:
  apply-cxxqt-header-contract-fix:
    name: apply CXX-Qt header contract fix
    if: github.event_name == 'pull_request' && github.head_ref == 'checkpoint/stabilization-2026-07-12'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Align generated header contract
        run: |
          python - <<'PY'
          from pathlib import Path

          main = Path("qml/main.cpp")
          text = main.read_text()
          old = "mukei_bridge/src/lib.rs.h"
          new = "mukei_bridge/src/lib.rs.cxxqt.h"
          count = text.count(old)
          if count not in (0, 3):
              raise SystemExit(f"expected 0 or 3 legacy CXX-Qt header references in main.cpp, found {count}")
          if count == 3:
              main.write_text(text.replace(old, new))

          cmake = Path("qml/CMakeLists.txt")
          text = cmake.read_text()
          old = "${MUKEI_CXX_QT_INCLUDE_DIR}/mukei_bridge/src/lib.rs.h"
          new = "${MUKEI_CXX_QT_INCLUDE_DIR}/mukei_bridge/src/lib.rs.cxxqt.h"
          count = text.count(old)
          if count not in (0, 1):
              raise SystemExit(f"expected 0 or 1 legacy CXX-Qt preflight header reference, found {count}")
          if count == 1:
              cmake.write_text(text.replace(old, new, 1))
          PY
          git diff --check
      - name: Commit header contract fix
        run: |
          if git diff --quiet; then
            echo "CXX-Qt header contract fix already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add qml/main.cpp qml/CMakeLists.txt
          git commit -m "fix: use CXX-Qt generated QObject header"
          git push origin HEAD:${{ github.head_ref }}

  bridge-compile:
    name: bridge compile gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-bridge-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bridge-
      - name: cargo build -p mukei-bridge
        working-directory: rust
        run: cargo build -p mukei-bridge --features "sqlcipher,network"

  qml-runtime:
    name: qml configure-build-test gate
    runs-on: ubuntu-latest
    env:
      CMAKE_BUILD_DIR: /tmp/mukei-qml-build
      QT_QPA_PLATFORM: offscreen
      CXX_QT_EXPORT_DIR: ${{ github.workspace }}/rust/target/cxxqt-export
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Export Qt toolchain paths
        run: |
          echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
          echo "QMAKE=$QT_ROOT_DIR/bin/qmake" >> $GITHUB_ENV
      - name: Ensure CMake and Ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-qml-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-qml-
      - name: Build bridge library and export CXX-Qt headers
        working-directory: rust
        run: |
          cargo clean -p mukei-bridge
          env \
            CXX_QT_EXPORT_DIR="$CXX_QT_EXPORT_DIR" \
            'CXX_QT_EXPORT_CRATE_mukei-bridge=1' \
            cargo build -p mukei-bridge --features "sqlcipher,network"
      - name: Capture QML configure diagnostics
        id: qml-configure
        continue-on-error: true
        working-directory: qml
        run: >-
          cmake -S . -B "$CMAKE_BUILD_DIR" -G Ninja
          -DMUKEI_USE_REAL_BRIDGE=ON
          -DMUKEI_BRIDGE_LIB="$GITHUB_WORKSPACE/rust/target/debug/libmukei_bridge.so"
          -DMUKEI_CXX_QT_EXPORT_DIR="$CXX_QT_EXPORT_DIR"
          > /tmp/mukei-qml-configure.log 2>&1
      - name: Upload QML configure diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qml-configure-diagnostics
          path: /tmp/mukei-qml-configure.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce QML configure result
        if: steps.qml-configure.outcome == 'failure'
        run: exit 1
      - name: Capture generated qmllint diagnostics
        id: qmllint
        continue-on-error: true
        run: |
          cmake --build "$CMAKE_BUILD_DIR" --target help > /tmp/mukei-qml-targets.txt
          if ! grep -q 'all_qmllint' /tmp/mukei-qml-targets.txt; then
            echo "Expected all_qmllint target was not generated." > /tmp/mukei-qmllint.log
            exit 1
          fi
          cmake --build "$CMAKE_BUILD_DIR" --target all_qmllint > /tmp/mukei-qmllint.log 2>&1
      - name: Upload generated qmllint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qmllint-diagnostics
          path: /tmp/mukei-qmllint.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce generated qmllint result
        if: steps.qmllint.outcome == 'failure'
        run: exit 1
      - name: Capture QML build diagnostics
        id: qml-build
        continue-on-error: true
        run: cmake --build "$CMAKE_BUILD_DIR" > /tmp/mukei-qml-build.log 2>&1
      - name: Upload QML build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qml-build-diagnostics
          path: /tmp/mukei-qml-build.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce QML build result
        if: steps.qml-build.outcome == 'failure'
        run: exit 1
      - name: Run CTest
        run: ctest --test-dir "$CMAKE_BUILD_DIR" --output-on-failure
