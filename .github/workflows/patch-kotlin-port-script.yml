name: patch-kotlin-port-script

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/patch-kotlin-port-script.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - name: Remove reintroduced unused model accessor
        shell: python
        run: |
          from pathlib import Path
          path = Path('scripts/port_kotlin_selected.sh')
          text = path.read_text(encoding='utf-8')
          marker = "rm -f .github/workflows/kotlin-selective-port-audit.yml"
          patch = """python <<'PY'\nfrom pathlib import Path\n\nstate = Path('rust/crates/mukei-core/src/application_runtime/foundation_state.rs')\ntext = state.read_text(encoding='utf-8')\nunused_model = '''    fn model(&self, model_id: &str) -> Option<ModelProjection> {\n        self.models\n            .read()\n            .unwrap_or_else(|p| p.into_inner())\n            .get(model_id)\n            .cloned()\n    }\n\n'''\ntext = text.replace(unused_model, '', 1)\nstate.write_text(text, encoding='utf-8')\nPY\n\n"""
          if patch not in text:
              text = text.replace(marker, patch + marker, 1)
          path.write_text(text, encoding='utf-8')
      - name: Commit patched verifier script
        run: |
          git config user.name "mukei-storage-bot"
          git config user.email "mukei-storage-bot@users.noreply.github.com"
          git add scripts/port_kotlin_selected.sh
          git rm .github/workflows/patch-kotlin-port-script.yml
          git commit -m "fix(ci): preserve strict runtime dead-code cleanup during Kotlin port"
          git push origin HEAD:temp/universal-storage-workspace-v0.1
