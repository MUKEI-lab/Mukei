name: rag-embedder-runtime-diagnostic

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: rag-embedder-runtime-diagnostic-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

env:
  EXPECTED_BASE: c879e9cc6f3e1f6d7a4fe1ff1c98db706de06e8f

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Gate exact diagnostic commit
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD^)" == "$EXPECTED_BASE" ]]
          [[ "$(git diff --name-only HEAD^ HEAD)" == ".github/workflows/rag-embedder-runtime-diagnostic.yml" ]]

      - name: Reproduce patch and capture full traceback
        id: reproduce
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY' 2>&1 | tee /tmp/rag-embedder-patch-diagnostic.log
          import base64
          import traceback
          from pathlib import Path

          lines = Path('.github/workflows/rag-embedder-runtime-slice-runner.yml').read_text().splitlines()
          start = next(index for index, line in enumerate(lines) if line.strip() == 'PATCH_B64: >-') + 1
          end = next(index for index in range(start, len(lines)) if lines[index].strip() == 'run: |')
          payload = ''.join(line.strip() for line in lines[start:end])
          print(f'payload_chars={len(payload)}')
          script = base64.b64decode(payload, validate=True).decode('utf-8')
          print(f'script_chars={len(script)}')
          compile(script, '<rag-embedder-runtime-patch>', 'exec')
          try:
              exec(script, {'__name__': '__main__'})
          except BaseException:
              traceback.print_exc()
              raise
          PY
          status=${PIPESTATUS[0]}
          {
            echo
            echo '--- git status ---'
            git status --short
            echo '--- changed paths ---'
            git diff --name-only
          } | tee -a /tmp/rag-embedder-patch-diagnostic.log
          exit "$status"

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-embedder-patch-diagnostic
          path: /tmp/rag-embedder-patch-diagnostic.log
          if-no-files-found: error
          retention-days: 3
