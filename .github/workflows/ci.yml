# =====================================================================
# Mukei backend CI
# =====================================================================

name: ci

on:
  push:
    branches: [ main, "agent/**", "checkpoint/**" ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Generate rustfmt evidence
        working-directory: rust
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/rustfmt-evidence"
          cargo fmt --all
          git diff -- . > "${RUNNER_TEMP}/rustfmt-evidence/rustfmt.patch"
          if [[ -s "${RUNNER_TEMP}/rustfmt-evidence/rustfmt.patch" ]]; then
            cat "${RUNNER_TEMP}/rustfmt-evidence/rustfmt.patch"
            exit 1
          fi
      - name: Upload rustfmt evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-evidence
          path: ${{ runner.temp }}/rustfmt-evidence/rustfmt.patch
          if-no-files-found: error
          retention-days: 14

  clippy:
    name: clippy (mukei-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
      - name: cargo clippy
        working-directory: rust
        run: >-
          cargo clippy
          -p mukei-core
          --no-default-features
          --features std,tokio
          --lib --tests
          -- -D warnings

  test:
    name: test (mukei-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('rust/Cargo.lock', 'rust/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      - name: cargo test
        working-directory: rust
        run: >-
          cargo test
          -p mukei-core
          --no-default-features
          --features std,tokio
          --lib --tests

  qml-architecture:
    name: qml architecture guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Architecture boundary check
        run: python3 qml/scripts/qml_architecture_analyzer.py qml
      - name: Cross-language contract check
        run: python3 qml/scripts/qml_contract_guard.py qml
      - name: QML security check
        run: python3 qml/scripts/qml_security_analyzer.py qml
      - name: Interaction audit baseline
        run: >-
          python3 qml/scripts/qml_interaction_audit.py qml
          --report "${RUNNER_TEMP}/qml-interaction-audit.md"
      - name: Upload interaction audit
        uses: actions/upload-artifact@v4
        with:
          name: qml-interaction-audit
          path: ${{ runner.temp }}/qml-interaction-audit.md
          if-no-files-found: error
          retention-days: 14
