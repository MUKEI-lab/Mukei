          object_path.write_text(object_text, encoding='utf-8')

          storage_mod_path = Path('rust/crates/mukei-core/src/storage/mod.rs')
          storage_mod = storage_mod_path.read_text(encoding='utf-8')
          storage_mod = replace_once(
              storage_mod,
              'pub use object_store::{ImmutableObjectStore, ObjectCipher, ObjectStoreError, StoredObject};',
              'pub use object_store::{\n    Aes256GcmObjectCipher, ImmutableObjectStore, ObjectCipher, ObjectStoreError, StoredObject,\n};',
              'object cipher export',
          )
          storage_mod_path.write_text(storage_mod, encoding='utf-8')

          secure_path = Path('rust/crates/mukei-android-jni/src/secure_runtime_jni.rs')
          secure = secure_path.read_text(encoding='utf-8')
          secure = replace_once(
