        getrandom::getrandom(&mut key).map_err(|_| ())?;
        Ok::<_, ()>(super::to_java_bytes(env, &key))
    }))
    .ok()
    .and_then(Result::ok)
    .unwrap_or(std::ptr::null_mut());
    key.zeroize();
    result
}
''',
