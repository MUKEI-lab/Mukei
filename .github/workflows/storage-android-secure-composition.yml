          secure = secure.replace('install_security_boundary(app_data_root)', 'install_security_boundary(&app_data_root)', 1)
          secure = replace_once(
              secure,
              '''            if key_bytes.len() != 32 {
                key_bytes.zeroize();
                return 0;
            }

            let config_path = app_data_root.join("mukei.toml");''',
              '''            if key_bytes.len() != 32 {
                key_bytes.zeroize();
