    generate_32_byte_key(&mut env)
}

#[no_mangle]
pub extern "system" fn Java_ai_mukei_android_core_nativebridge_NativeBindings_generateObjectStoreKey(
    mut env: JNIEnv<'_>,
    _this: JObject<'_>,
