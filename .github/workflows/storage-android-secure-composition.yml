              'use std::panic::{catch_unwind, AssertUnwindSafe};\n',
              '''use std::panic::{catch_unwind, AssertUnwindSafe};

fn generate_32_byte_key(env: &mut JNIEnv<'_>) -> jbyteArray {
    let mut key = [0_u8; 32];
