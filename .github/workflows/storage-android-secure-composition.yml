name: storage-android-secure-composition

on:
  push:
    branches:
      - temp/universal-storage-workspace-v0.1
    paths:
      - .github/workflows/storage-android-secure-composition.yml
  workflow_dispatch:

permissions:
  contents: write
  statuses: write

env:
  CARGO_TERM_COLOR: never
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings

jobs:
  patch-verify-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          ref: temp/universal-storage-workspace-v0.1
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.82.0
          components: clippy,rustfmt
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Apply secure Android storage composition
        shell: python
        run: |
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if new in text:
                  return text
              if old not in text:
                  raise SystemExit(f"missing patch marker: {label}")
              return text.replace(old, new, 1)

          workspace_path = Path('rust/Cargo.toml')
          workspace = workspace_path.read_text(encoding='utf-8')
          workspace = replace_once(
              workspace,
              'subtle = "2.5"\n',
              'subtle = "2.5"\naes-gcm = "0.10.3"\n',
              'workspace aes-gcm dependency',
          )
          workspace_path.write_text(workspace, encoding='utf-8')

          core_manifest_path = Path('rust/crates/mukei-core/Cargo.toml')
          core_manifest = core_manifest_path.read_text(encoding='utf-8')
          core_manifest = replace_once(
              core_manifest,
              'subtle       = { workspace = true }\n',
              'subtle       = { workspace = true }\naes-gcm      = { workspace = true }\ngetrandom    = { workspace = true }\n',
              'core crypto dependencies',
          )
          core_manifest_path.write_text(core_manifest, encoding='utf-8')

          object_path = Path('rust/crates/mukei-core/src/storage/object_store.rs')
          object_text = object_path.read_text(encoding='utf-8')
          object_text = replace_once(
              object_text,
              'use crate::storage::universal::StorageObjectId;\nuse sha2::{Digest, Sha256};',
              'use crate::storage::universal::StorageObjectId;\nuse aes_gcm::{\n    aead::{Aead, Payload},\n    Aes256Gcm, KeyInit, Nonce,\n};\nuse sha2::{Digest, Sha256};',
              'object-store aes imports',
          )
          object_text = replace_once(
              object_text,
              'use std::path::{Path, PathBuf};\n',
              'use std::path::{Path, PathBuf};\nuse zeroize::{Zeroize, Zeroizing};\n',
              'object-store zeroize import',
          )
          object_text = replace_once(
              object_text,
              'const SHA256_LEN: usize = 32;\n',
              'const SHA256_LEN: usize = 32;\nconst AES_GCM_NONCE_LEN: usize = 12;\nconst AES_GCM_TAG_LEN: usize = 16;\nconst AES_GCM_CIPHER_VERSION: u32 = 1;\n',
              'object-store aes constants',
          )
          cipher_block = '''
/// AES-256-GCM object cipher backed by one process-resident data-encryption key.
///
/// Android production boot unwraps this key through Android Keystore and passes
/// the raw bytes across JNI exactly once. The key is zeroized when the runtime
/// drops; every object receives a fresh random 96-bit nonce and authenticates
/// the immutable object's digest/size/version metadata as associated data.
pub struct Aes256GcmObjectCipher {
    key: Zeroizing<[u8; 32]>,
}

impl Aes256GcmObjectCipher {
    pub fn new(key: [u8; 32]) -> Self {
        Self {
            key: Zeroizing::new(key),
        }
    }

    fn cipher(&self) -> Result<Aes256Gcm, String> {
        Aes256Gcm::new_from_slice(&*self.key)
            .map_err(|_| "invalid AES-256-GCM key length".to_string())
    }
}

impl ObjectCipher for Aes256GcmObjectCipher {
    fn version(&self) -> u32 {
        AES_GCM_CIPHER_VERSION
    }

    fn seal(&self, plaintext: &[u8], associated_data: &[u8]) -> Result<Vec<u8>, String> {
        let mut nonce_bytes = [0_u8; AES_GCM_NONCE_LEN];
        getrandom::getrandom(&mut nonce_bytes)
            .map_err(|_| "secure random nonce generation failed".to_string())?;
        let ciphertext = self
            .cipher()?
            .encrypt(
                Nonce::from_slice(&nonce_bytes),
                Payload {
                    msg: plaintext,
                    aad: associated_data,
                },
            )
            .map_err(|_| "AES-256-GCM encryption failed".to_string())?;
        let mut sealed = Vec::with_capacity(AES_GCM_NONCE_LEN + ciphertext.len());
        sealed.extend_from_slice(&nonce_bytes);
        sealed.extend_from_slice(&ciphertext);
        nonce_bytes.zeroize();
        Ok(sealed)
    }

    fn open(&self, ciphertext: &[u8], associated_data: &[u8]) -> Result<Vec<u8>, String> {
        if ciphertext.len() < AES_GCM_NONCE_LEN + AES_GCM_TAG_LEN {
            return Err("AES-256-GCM envelope is truncated".to_string());
        }
        let (nonce, encrypted) = ciphertext.split_at(AES_GCM_NONCE_LEN);
        self.cipher()?
            .decrypt(
                Nonce::from_slice(nonce),
                Payload {
                    msg: encrypted,
                    aad: associated_data,
                },
            )
            .map_err(|_| "AES-256-GCM authentication failed".to_string())
    }
}

'''
          object_text = replace_once(
              object_text,
              'pub struct ImmutableObjectStore<C> {\n',
              cipher_block + 'pub struct ImmutableObjectStore<C> {\n',
              'production object cipher',
          )
          cipher_tests = '''    #[test]
    fn aes_gcm_cipher_authenticates_ciphertext_and_associated_data() {
        let cipher = Aes256GcmObjectCipher::new([0x5a; 32]);
        let plaintext = b"workspace secret";
        let aad = b"object-metadata";
        let sealed = cipher.seal(plaintext, aad).unwrap();

        assert_ne!(sealed.as_slice(), plaintext);
        assert_eq!(cipher.open(&sealed, aad).unwrap(), plaintext);

        let mut tampered = sealed.clone();
        *tampered.last_mut().unwrap() ^= 0x01;
        assert!(cipher.open(&tampered, aad).is_err());
        assert!(cipher.open(&sealed, b"different-metadata").is_err());
    }

    #[test]
    fn aes_gcm_cipher_uses_fresh_nonce_per_publication() {
        let cipher = Aes256GcmObjectCipher::new([0x33; 32]);
        let first = cipher.seal(b"same", b"same-aad").unwrap();
        let second = cipher.seal(b"same", b"same-aad").unwrap();
        assert_ne!(&first[..AES_GCM_NONCE_LEN], &second[..AES_GCM_NONCE_LEN]);
        assert_ne!(first, second);
    }

'''
          object_text = replace_once(
              object_text,
              '    #[test]\n    fn publishes_ciphertext_and_deduplicates_without_overwrite() {\n',
