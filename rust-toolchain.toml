# Canonical Rust toolchain for the Kotlin/Android workspace.
#
# The workspace MSRV is declared as Rust 1.82 in rust/Cargo.toml, while
# production CI intentionally validates with Rust 1.86.0. Pinning the same
# compiler here keeps contributor formatting/check behavior deterministic and
# installs both Android ABIs emitted by the Gradle release configuration.
[toolchain]
channel = "1.86.0"
components = ["rustfmt", "clippy"]
targets = [
    "aarch64-linux-android",      # primary Android device ABI
    "x86_64-linux-android",       # Android emulator / CI release ABI
    "x86_64-unknown-linux-gnu",   # CI / dev sandbox
    "aarch64-apple-darwin",       # Apple Silicon development hosts
]
profile = "minimal"
