# Architect review GH #7: supply-chain gates (cargo-deny config).
#
# Run via `cargo deny check advisories sources licenses bans`.
#
# The matrix below intentionally errs on the strict side; loosen only
# with explicit sign-off — this is a privacy-critical, zero-telemetry,
# proprietary product and every dep is a supply-chain attack surface.

[graph]
# Only audit the targets Mukei actually ships for. This prevents
# target-only crates for unrelated platforms from poisoning the graph.
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-linux-android",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true
exclude-dev = true

[advisories]
# Pull the latest RustSec advisory db on every run.
db-urls       = ["https://github.com/rustsec/advisory-db"]
yanked        = "deny"
# New cargo-deny schema: these fields are scope selectors, not lint levels.
# We only gate unmaintained crates at the workspace boundary; transitive
# maintenance churn is tracked via explicit refresh work, not by breaking
# every PR on deep optional trees.
unmaintained  = "workspace"
# Unsound crates remain forbidden anywhere in the graph.
# cargo-deny removed the legacy `notice` severity key; notice advisories
# are errors by default now and must be handled via `ignore` if accepted.
unsound       = "all"

# Granular allow-list for advisories we knowingly accept (must include
# an issue link + an ETA for the swap). Empty by policy: any vendored
# crate that gains an advisory blocks the next release.
ignore = []

[licenses]
# Mukei itself uses a private custom SPDX identifier.
unused-allowed-license = "allow"
allow      = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    # Private first-party workspace crates.
    "LicenseRef-Mukei-Proprietary",
]
confidence-threshold = 0.93
private = { ignore = true }
exceptions = []

[bans]
# Block known-evil / unmaintained crates by name. Add aliases as we
# discover them in the dependency tree.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# Deny list — extend cautiously.
deny = [
    # `openssl-sys` is the classic supply-chain attack surface. We
    # standardise on rustls everywhere.
    { crate = "openssl-sys", reason = "TRD §11.5 — Mukei is rustls-only." },
]

# Skip duplicate-version warnings for these specific crates if a
# transitive needs the older line. Add entries with a justification.
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Whitelist for vendored git deps (intentionally empty in this repo —
# our llama.cpp lives via the prebuilt submodule, not as a cargo dep).
allow-git = []
